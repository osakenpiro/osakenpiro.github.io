<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>わのり — 使っても、減らない</title>
<style>
  :root{
    --gold:#d4a853;
    --gold-dim:rgba(212,168,83,.34);
    --gold-faint:rgba(212,168,83,.13);
    --void:#07070c;
    --void-2:#0c0c14;
    --ink:#e9e3d5;
    --ink-mute:#8c8474;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--void);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    min-height:100%;
    overflow-x:hidden;
    position:relative;
  }
  /* void + stars */
  #stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  #stars canvas{width:100%;height:100%;display:block}
  /* 金箔: 極薄の面。単色ゴールドのみ・虹禁止 */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background:
      radial-gradient(60% 45% at 50% 8%, rgba(212,168,83,.07), transparent 70%),
      radial-gradient(45% 40% at 88% 92%, rgba(212,168,83,.045), transparent 70%);
    mix-blend-mode:screen;
  }
  main{position:relative;z-index:2;max-width:940px;margin:0 auto;padding:34px 18px 70px}

  header{text-align:center;margin-bottom:6px}
  h1{
    font-size:2.6rem;letter-spacing:.5em;text-indent:.5em;font-weight:400;
    color:var(--gold);
    text-shadow:0 0 22px rgba(212,168,83,.28);
  }
  .sub{color:var(--ink-mute);letter-spacing:.28em;font-size:.82rem;margin-top:8px}

  .law{
    text-align:center;margin:22px auto 4px;font-size:.86rem;color:var(--ink-mute);
    letter-spacing:.1em;
  }
  .law b{color:var(--gold);font-weight:400;font-variant-numeric:tabular-nums;font-size:1.05rem}
  .law .note{color:var(--gold-dim)}

  .layout{display:grid;grid-template-columns:1fr 296px;gap:26px;margin-top:10px;align-items:start}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}

  .board-wrap{position:relative}
  svg#ring{width:100%;height:auto;display:block;touch-action:manipulation}
  .node-hit{cursor:pointer}
  .node-cup{fill:none;stroke:var(--gold-faint);stroke-width:1}
  .node-target{fill:none;stroke:var(--gold-dim);stroke-width:1.1;stroke-dasharray:2.5 3.5}
  .node-fill{fill:var(--gold);transition:r .28s cubic-bezier(.22,1,.36,1),opacity .28s}
  .node-sel{fill:none;stroke:var(--gold);stroke-width:1.4;opacity:.9}
  .node-val{fill:var(--ink-mute);font-size:9px;text-anchor:middle;font-family:ui-monospace,monospace}
  .node-val.hot{fill:var(--gold)}
  .ring-line{fill:none;stroke:var(--gold-faint);stroke-width:1}
  .core-txt{text-anchor:middle;fill:var(--ink-mute);font-size:10px;letter-spacing:.2em}
  .core-num{text-anchor:middle;fill:var(--gold);font-size:22px;font-family:ui-monospace,monospace}
  .spill-mark{fill:none;stroke:var(--gold);stroke-width:1.6;opacity:0}

  .panel{
    border:1px solid var(--gold-faint);border-radius:2px;padding:16px 16px 18px;
    background:linear-gradient(180deg, rgba(212,168,83,.035), rgba(212,168,83,.008));
  }
  .panel h2{
    font-size:.74rem;letter-spacing:.24em;color:var(--gold-dim);font-weight:400;
    border-bottom:1px solid var(--gold-faint);padding-bottom:7px;margin-bottom:12px;
  }
  .page-name{color:var(--gold);font-size:1.35rem;letter-spacing:.14em}
  .page-kana{color:var(--ink-mute);font-size:.68rem;letter-spacing:.2em;margin-left:8px}
  .hint{color:var(--ink-mute);font-size:.76rem;line-height:1.85;margin:10px 0 14px}

  .meter{margin:12px 0 6px}
  .meter-lab{display:flex;justify-content:space-between;font-size:.7rem;color:var(--ink-mute);letter-spacing:.14em}
  .meter-lab b{color:var(--gold);font-weight:400;font-family:ui-monospace,monospace}
  .bar{height:3px;background:rgba(212,168,83,.1);margin-top:6px;position:relative;overflow:hidden}
  .bar i{position:absolute;inset:0 auto 0 0;background:var(--gold);width:0;transition:width .3s}
  .bar .tick{position:absolute;top:-2px;bottom:-2px;width:1px;background:var(--gold-dim)}

  .sel-box{border-top:1px solid var(--gold-faint);margin-top:14px;padding-top:12px}
  .sel-line{font-size:.76rem;color:var(--ink-mute);letter-spacing:.1em;margin-bottom:9px}
  .sel-line b{color:var(--gold);font-weight:400;font-family:ui-monospace,monospace}
  input[type=range]{width:100%;accent-color:var(--gold);background:transparent;margin:2px 0 10px}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .btns .wide{grid-column:1/-1}
  button{
    font-family:inherit;font-size:.78rem;letter-spacing:.14em;color:var(--gold);
    background:transparent;border:1px solid var(--gold-dim);border-radius:2px;
    padding:9px 6px;cursor:pointer;transition:background .18s,border-color .18s;
  }
  button:hover:not(:disabled){background:rgba(212,168,83,.1);border-color:var(--gold)}
  button:disabled{opacity:.28;cursor:default}

  .pages{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;border-top:1px solid var(--gold-faint);padding-top:13px}
  .pg{
    width:34px;height:34px;display:grid;place-items:center;font-size:.82rem;
    border:1px solid var(--gold-faint);color:var(--ink-mute);cursor:pointer;border-radius:2px;
    transition:.18s;position:relative;
  }
  .pg:hover{border-color:var(--gold-dim);color:var(--gold)}
  .pg.on{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,.1)}
  .pg.lit::after{content:"";position:absolute;right:2px;bottom:2px;width:3px;height:3px;border-radius:50%;background:var(--gold)}
  .pg.full::after{box-shadow:0 0 5px 1px var(--gold)}

  .said{
    margin-top:13px;font-size:.72rem;color:var(--gold-dim);letter-spacing:.1em;
    min-height:2.4em;line-height:1.8;
  }
  footer{
    margin-top:44px;text-align:center;color:rgba(140,132,116,.6);font-size:.66rem;
    line-height:2;letter-spacing:.08em;
  }
  footer b{color:var(--gold-dim);font-weight:400}
</style>
</head>
<body>
<div id="stars"><canvas id="starcv"></canvas></div>

<main>
  <header>
    <h1>わのり</h1>
    <p class="sub">使っても、減らない</p>
  </header>

  <p class="law">総量 <b id="total">1.000</b> <span class="note">── <span id="lawnote">一度も変わっていない</span></span></p>

  <div class="layout">
    <div class="board-wrap">
      <svg id="ring" viewBox="0 0 480 480" aria-label="環状盤"></svg>
    </div>

    <aside class="panel">
      <h2>輪法辞典</h2>
      <div>
        <span class="page-name" id="pgName">均し</span><span class="page-kana" id="pgKana">ならし</span>
      </div>
      <p class="hint" id="pgHint"></p>

      <div class="meter">
        <div class="meter-lab"><span>一致度</span><b id="mVal">0.000</b></div>
        <div class="bar"><i id="mBar"></i><span class="tick" style="left:95%"></span></div>
      </div>
      <div class="meter">
        <div class="meter-lab"><span>手数</span><b id="mvVal">0</b></div>
      </div>

      <div class="sel-box">
        <p class="sel-line" id="selLine">節を選ぶ</p>
        <input type="range" id="amt" min="0" max="1" step="0.005" value="0" disabled>
        <div class="btns">
          <button id="bL" disabled>◀ 左へ送る</button>
          <button id="bR" disabled>右へ送る ▶</button>
          <button id="bS" class="wide" disabled>散らす（左右へ半分ずつ）</button>
          <button id="bReset" class="wide">この頁をはじめから</button>
        </div>
      </div>

      <div class="pages" id="pages"></div>
      <p class="said" id="said"></p>
    </aside>
  </div>

  <footer>
    <b>わのり</b> ── 使っても、減らない。保存Floatパズル（v0）<br>
    盤の物理は<b>可分砂山（divisible sandpile, Levine–Peres）</b>＝連続質量・保存・アーベル的の既知モデルに沿う。<br>
    アーベル性（落ち着き先が崩す順序によらない）は <b>Dhar 1990</b>。1次元環は厳密に解けて自明＝<b>臨界現象は起きない</b>ので、そう名乗らない。<br>
    <a href="https://osakenpiro.github.io/asobiba/" style="color:inherit">← あそびば（Boolean→Float Playground）</a>
  </footer>
</main>

<script>
/* ============================================================
   わのり v0 — engine
   輪の法: 総量は不変。呪文は消費ではなく移送。
   器を超えた節は超過分を左右へ半分ずつこぼす（連鎖）。
   参照モデル: divisible sandpile (Levine–Peres) / abelian property (Dhar 1990)
   ============================================================ */
const N = 12;          // 節の数
const CAP = 0.25;      // 器（節が抱えられる上限）
const TOTAL = 1.0;     // 総量（不変）
const EPS = 1e-9;

const sum = a => a.reduce((s, x) => s + x, 0);

/** 移送: 節 i から 隣 dir(-1|+1) へ q を送る。総量は変わらない。 */
function send(v, i, dir, q) {
  const a = v.slice();
  q = Math.min(q, a[i]);
  if (q <= 0) return a;
  const j = (i + dir + N) % N;
  a[i] -= q;
  a[j] += q;
  return a;
}

/** 散らし: 節 i の持ち分を左右へ半分ずつ。 */
function scatter(v, i) {
  const a = v.slice();
  const q = a[i];
  if (q <= 0) return a;
  a[i] = 0;
  a[(i - 1 + N) % N] += q / 2;
  a[(i + 1) % N] += q / 2;
  return a;
}

/** こぼれ 1回分。order='max'|'first'|index を指定（アーベル性の検証用）。 */
function spillOnce(v, cap = CAP, order = 'max') {
  const a = v.slice();
  let idx = -1;
  if (typeof order === 'number') {
    idx = (a[order] > cap + EPS) ? order : -1;
  } else if (order === 'first') {
    for (let i = 0; i < N; i++) if (a[i] > cap + EPS) { idx = i; break; }
  } else {
    let mx = cap + EPS;
    for (let i = 0; i < N; i++) if (a[i] > mx) { mx = a[i]; idx = i; }
  }
  if (idx < 0) return { v: a, toppled: -1 };
  const excess = a[idx] - cap;
  a[idx] = cap;
  a[(idx - 1 + N) % N] += excess / 2;
  a[(idx + 1) % N] += excess / 2;
  return { v: a, toppled: idx };
}

/** 落ち着くまでこぼす。アーベル: 崩す順序を変えても落ち着き先は同じ。 */
function stabilize(v, cap = CAP, order = 'max', maxSteps = 200000) {
  let a = v.slice(), steps = 0;
  while (steps < maxSteps) {
    const r = spillOnce(a, cap, order === 'random' ? randomUnstable(a, cap) : order);
    if (r.toppled < 0) break;
    a = r.v; steps++;
  }
  return { v: a, steps };
}
function randomUnstable(a, cap) {
  const idx = [];
  for (let i = 0; i < N; i++) if (a[i] > cap + EPS) idx.push(i);
  return idx.length ? idx[Math.floor(Math.random() * idx.length)] : 0;
}

/** 一致度 Float: 総和1.0の配分どうしのL1距離は最大2 → 1 - L1/2 ∈ [0,1] */
function matchFloat(v, t) {
  let l1 = 0;
  for (let i = 0; i < N; i++) l1 += Math.abs(v[i] - t[i]);
  return Math.max(0, 1 - l1 / 2);
}

const isStable = (v, cap = CAP) => v.every(x => x <= cap + EPS);

/* ---------- 輪法辞典（ステージ集） ---------- */
const eq = n => Array(N).fill(1 / N);
const mk = f => { const t = Array(N).fill(0); f(t); return t; };

const PAGES = [
  { n: '均し', k: 'ならし',
    hint: '四つの節が器いっぱいに抱えている。散らしを繰り返すと、輪はおのずと均る。 ── 減らしたのではない。ひろがっただけ。',
    start: mk(t => { t[0] = t[3] = t[6] = t[9] = .25; }),
    target: eq() },
  { n: '点', k: 'てん',
    hint: 'ひとつの節を器いっぱいに。ただし注ぎすぎた分は、こぼれて隣へ戻ってくる。',
    start: eq(),
    target: mk(t => { for (let i = 0; i < N; i++) t[i] = .75 / (N - 1); t[0] = .25; }) },
  { n: '対', k: 'つい',
    hint: '向かい合う二節を器いっぱいに。輪の反対側は、右回りでも左回りでも同じ遠さ。',
    start: eq(),
    target: mk(t => { for (let i = 0; i < N; i++) t[i] = .5 / (N - 2); t[0] = .25; t[6] = .25; }) },
  { n: '半', k: 'なかば',
    hint: '半分の節にすべてを寄せ、半分を空にする。送りは隣へしか届かない ── 遠い節の分は、節から節へ渡っていくしかない。',
    start: eq(),
    target: mk(t => { for (let i = 0; i < 6; i++) t[i] = 1 / 6; }) },
  { n: '空', k: 'うろ',
    hint: '三つの節を空に。残りは均しのまま。空けるとは、捨てることではない ── 余所へ預けること。',
    start: eq(),
    target: mk(t => { for (let i = 0; i < N; i++) t[i] = (i >= 3 && i <= 5) ? 0 : 1 / 9; }) },
  { n: '四', k: 'よつ',
    hint: '総量 1.0 は、器 0.25 の節 四つ より狭くはできない。 ── これが輪の法の底。ここまで寄せたら、それ以上は寄らない。',
    start: eq(),
    target: mk(t => { t[0] = t[3] = t[6] = t[9] = .25; }) },
];

/* ============================================================
   UI
   ============================================================ */
const $ = id => document.getElementById(id);
const SVG_NS = 'http://www.w3.org/2000/svg';
const CX = 240, CY = 240, RR = 168, RMAX = 36, RMIN = 3.2;

let page = 0, v = PAGES[0].start.slice(), sel = -1, moves = 0, busy = false;
let best = loadBest();

const nodePos = i => {
  const a = -Math.PI / 2 + i * 2 * Math.PI / N;
  return { x: CX + RR * Math.cos(a), y: CY + RR * Math.sin(a) };
};
const rOf = val => RMIN + (RMAX - RMIN) * Math.min(1, val / CAP);
const el = (t, at) => { const e = document.createElementNS(SVG_NS, t); for (const k in at) e.setAttribute(k, at[k]); return e; };
const f3 = x => (Math.abs(x) < 5e-4 ? 0 : x).toFixed(3);

function buildRing() {
  const svg = $('ring');
  svg.innerHTML = '';
  svg.appendChild(el('circle', { cx: CX, cy: CY, r: RR, class: 'ring-line' }));

  const core1 = el('text', { x: CX, y: CY - 6, class: 'core-txt' }); core1.textContent = '総量';
  const core2 = el('text', { x: CX, y: CY + 20, class: 'core-num', id: 'coreNum' }); core2.textContent = '1.000';
  svg.appendChild(core1); svg.appendChild(core2);

  for (let i = 0; i < N; i++) {
    const p = nodePos(i);
    const g = el('g', { class: 'node-hit', 'data-i': i });
    g.appendChild(el('circle', { cx: p.x, cy: p.y, r: RMAX, class: 'node-cup' }));
    g.appendChild(el('circle', { cx: p.x, cy: p.y, r: 0, class: 'node-target', id: 'tg' + i }));
    g.appendChild(el('circle', { cx: p.x, cy: p.y, r: 0, class: 'node-fill', id: 'fl' + i }));
    g.appendChild(el('circle', { cx: p.x, cy: p.y, r: RMAX + 5, class: 'node-sel', id: 'se' + i, opacity: 0 }));
    g.appendChild(el('circle', { cx: p.x, cy: p.y, r: RMAX, class: 'spill-mark', id: 'sp' + i }));
    const lp = { x: CX + (RR + RMAX + 15) * Math.cos(-Math.PI / 2 + i * 2 * Math.PI / N),
                 y: CY + (RR + RMAX + 15) * Math.sin(-Math.PI / 2 + i * 2 * Math.PI / N) + 3 };
    const tx = el('text', { x: lp.x, y: lp.y, class: 'node-val', id: 'vt' + i });
    g.appendChild(tx);
    g.appendChild(el('circle', { cx: p.x, cy: p.y, r: RMAX + 6, fill: 'transparent' }));
    g.addEventListener('click', () => { if (!busy) { sel = (sel === i ? -1 : i); draw(); } });
    svg.appendChild(g);
  }
}

function draw() {
  const P = PAGES[page];
  for (let i = 0; i < N; i++) {
    const fl = $('fl' + i);
    fl.setAttribute('r', rOf(v[i]));
    fl.setAttribute('opacity', 0.22 + 0.68 * Math.min(1, v[i] / CAP));
    $('tg' + i).setAttribute('r', P.target[i] > 1e-6 ? rOf(P.target[i]) : 0);
    $('se' + i).setAttribute('opacity', sel === i ? 1 : 0);
    const t = $('vt' + i);
    t.textContent = f3(v[i]);
    t.setAttribute('class', 'node-val' + (v[i] > CAP - 1e-6 ? ' hot' : ''));
  }
  const tot = sum(v);
  $('total').textContent = tot.toFixed(3);
  $('coreNum').textContent = tot.toFixed(3);
  $('lawnote').textContent = Math.abs(tot - TOTAL) < 1e-6 ? '一度も変わっていない' : '⚠ 法が破れている';

  const m = matchFloat(v, P.target);
  $('mVal').textContent = m.toFixed(3);
  $('mBar').style.width = (m * 100).toFixed(1) + '%';
  $('mvVal').textContent = moves;

  if (sel < 0) {
    $('selLine').textContent = '節を選ぶ';
    $('amt').disabled = true; $('amt').value = 0;
    ['bL', 'bR', 'bS'].forEach(b => $(b).disabled = true);
  } else {
    $('selLine').innerHTML = `節 <b>${String(sel).padStart(2, '0')}</b> ／ 持ち分 <b>${f3(v[sel])}</b> ／ 送り量 <b>${(+$('amt').value).toFixed(3)}</b>`;
    $('amt').max = Math.max(0.005, v[sel]).toFixed(3);
    $('amt').disabled = busy || v[sel] <= 0;
    ['bL', 'bR', 'bS'].forEach(b => $(b).disabled = busy || v[sel] <= 0);
  }
  const b = best[page];
  $('said').textContent = m >= 0.99 ? '満ちた。この頁は、もう輪が覚えている。'
    : m >= 0.95 ? '点った。 ── これ以上は、精度の話。'
    : b ? `この頁の最良 ${b.m.toFixed(3)}（${b.mv}手）`
    : '';
  drawPages();
}

function drawPages() {
  const w = $('pages'); w.innerHTML = '';
  PAGES.forEach((P, i) => {
    const d = document.createElement('div');
    d.className = 'pg' + (i === page ? ' on' : '') + (best[i] && best[i].m >= 0.95 ? ' lit' : '') + (best[i] && best[i].m >= 0.99 ? ' full' : '');
    d.textContent = P.n;
    d.title = P.n + '（' + P.k + '）';
    d.onclick = () => { if (!busy) load(i); };
    w.appendChild(d);
  });
}

function load(i) {
  page = i; v = PAGES[i].start.slice(); sel = -1; moves = 0;
  $('pgName').textContent = PAGES[i].n;
  $('pgKana').textContent = PAGES[i].k;
  $('pgHint').textContent = PAGES[i].hint;
  $('amt').value = 0;
  draw();
}

/* こぼれ連鎖を見せる（アーベルなので順序は問わない＝見せ方は自由） */
function runSpill(done) {
  if (isStable(v)) { done && done(); return; }
  busy = true;
  const tick = () => {
    const r = spillOnce(v, CAP, 'max');
    if (r.toppled < 0) { busy = false; draw(); done && done(); return; }
    const mark = $('sp' + r.toppled);
    mark.setAttribute('opacity', .95);
    mark.setAttribute('r', RMAX);
    setTimeout(() => { mark.setAttribute('opacity', 0); mark.setAttribute('r', RMAX + 14); }, 40);
    v = r.v; draw();
    setTimeout(tick, 90);
  };
  tick();
}

function afterMove() {
  moves++;
  sel = -1;
  draw();
  runSpill(() => {
    const m = matchFloat(v, PAGES[page].target);
    const b = best[page];
    if (!b || m > b.m + 1e-9 || (Math.abs(m - b.m) < 1e-9 && moves < b.mv)) {
      best[page] = { m, mv: moves }; saveBest();
    }
    draw();
  });
}

function loadBest() { try { return JSON.parse(localStorage.getItem('wanori.v0.best') || '{}'); } catch (e) { return {}; } }
function saveBest() { try { localStorage.setItem('wanori.v0.best', JSON.stringify(best)); } catch (e) {} }

/* ---------- events ---------- */
$('amt').addEventListener('input', draw);
$('bL').onclick = () => { if (sel < 0) return; const q = +$('amt').value; if (q <= 0) return; v = send(v, sel, -1, q); afterMove(); };
$('bR').onclick = () => { if (sel < 0) return; const q = +$('amt').value; if (q <= 0) return; v = send(v, sel, +1, q); afterMove(); };
$('bS').onclick = () => { if (sel < 0) return; v = scatter(v, sel); afterMove(); };
$('bReset').onclick = () => { if (!busy) load(page); };

/* ---------- stars (決定論seed・単色) ---------- */
(function stars() {
  const cv = $('starcv'), ctx = cv.getContext('2d');
  let s = 20260717;
  const rnd = () => (s = (s * 1664525 + 1013904223) % 4294967296) / 4294967296;
