<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆらぎ秤 — Boolean→Float 決定の秤</title>
<meta name="description" content="YesでもNoでもなく、0.5の重さを量る。二値の判断を連続値（0.00〜1.00）に置き換える決定支援ツール。">
<style>
  :root{
    --void:#0a0a0f; --void2:#12121b; --panel:#15151f;
    --gold:#d4a853; --gold-dim:#8a7038; --gold-soft:rgba(212,168,83,.14);
    --ink:#ece8df; --mist:#9a958c; --line:rgba(212,168,83,.18);
    --no:#6f6a78; --shadow:0 8px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1px 1px at 18% 24%, rgba(255,255,255,.55), transparent),
      radial-gradient(1px 1px at 72% 16%, rgba(255,255,255,.35), transparent),
      radial-gradient(1px 1px at 41% 67%, rgba(255,255,255,.30), transparent),
      radial-gradient(1px 1px at 88% 58%, rgba(255,255,255,.40), transparent),
      radial-gradient(1.2px 1.2px at 60% 82%, rgba(212,168,83,.45), transparent),
      radial-gradient(1px 1px at 9% 88%, rgba(255,255,255,.25), transparent),
      radial-gradient(900px 600px at 78% -8%, #16131d, transparent),
      var(--void);
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--gold)}
  button{font-family:inherit;cursor:pointer}

  .wrap{max-width:1080px;margin:0 auto;padding:28px 22px 64px}
  header.top{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:22px}
  .brand{font-size:30px;font-weight:700;letter-spacing:.04em;color:var(--gold);text-shadow:0 0 18px rgba(212,168,83,.25)}
  .brand small{display:block;font-size:11px;letter-spacing:.22em;color:var(--gold-dim);font-weight:600;margin-top:2px}
  .tagline{color:var(--mist);font-size:13.5px;line-height:1.5;max-width:520px}

  .app{display:grid;grid-template-columns:248px 1fr;gap:22px}
  @media(max-width:760px){.app{grid-template-columns:1fr}}

  /* sidebar */
  .side{display:flex;flex-direction:column;gap:10px}
  .side h2{font-size:11px;letter-spacing:.18em;color:var(--mist);margin:4px 2px 6px;font-weight:600}
  .qlist{display:flex;flex-direction:column;gap:6px}
  .qitem{
    text-align:left;background:var(--panel);border:1px solid transparent;border-radius:10px;
    padding:11px 12px;color:var(--ink);font-size:13.5px;line-height:1.35;transition:border-color .15s,background .15s;
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .qitem:hover{border-color:var(--line)}
  .qitem.active{border-color:var(--gold);background:linear-gradient(var(--gold-soft),var(--gold-soft)),var(--panel)}
  .qitem .qmini{font-variant-numeric:tabular-nums;font-size:12px;color:var(--gold);font-weight:700;flex:none}
  .qitem .qt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .btn{
    background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:10px;
    padding:10px 12px;font-size:13px;transition:.15s;
  }
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.gold{background:var(--gold);color:#1a1408;border-color:var(--gold);font-weight:700}
  .btn.gold:hover{filter:brightness(1.08);color:#1a1408}
  .btn.ghost{border-color:transparent;color:var(--mist)}
  .btn.ghost:hover{color:var(--gold);border-color:transparent}
  .side .foot{margin-top:8px;display:flex;flex-direction:column;gap:6px}

  /* main */
  .main{background:rgba(20,20,29,.55);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow)}
  .qtitle{
    width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);
    color:var(--ink);font-size:21px;font-weight:600;padding:6px 2px 10px;outline:none;letter-spacing:.01em;
  }
  .qtitle::placeholder{color:#5a5660}
  .qtitle:focus{border-color:var(--gold)}
  .hint{color:var(--mist);font-size:12px;margin:10px 2px 16px}

  .factors{display:flex;flex-direction:column;gap:12px;margin-bottom:6px}
  .factor{background:var(--panel);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:13px 14px}
  .frow1{display:flex;gap:10px;align-items:center;margin-bottom:11px}
  .fname{flex:1;background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.12);color:var(--ink);font-size:14.5px;padding:4px 2px;outline:none}
  .fname:focus{border-bottom-color:var(--gold)}
  .fname::placeholder{color:#5a5660}
  .wsel{display:flex;gap:3px;align-items:center;flex:none}
  .wsel .wlab{font-size:10px;letter-spacing:.12em;color:var(--mist);margin-right:4px}
  .wbtn{width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--mist);font-size:12px;font-weight:700;line-height:1;padding:0}
  .wbtn.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
  .fdel{flex:none;width:26px;height:26px;border-radius:6px;border:1px solid transparent;background:transparent;color:#6b6770;font-size:15px;line-height:1}
  .fdel:hover{color:var(--gold)}

  .frow2{display:flex;align-items:center;gap:14px}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:6px;outline:none;
    background:linear-gradient(90deg,var(--gold) 0%,var(--gold) var(--p,50%),#2a2a36 var(--p,50%),#2a2a36 100%);
  }
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);border:3px solid #1a1408;box-shadow:0 0 0 1px var(--gold),0 0 12px rgba(212,168,83,.5);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--gold);border:3px solid #1a1408;cursor:pointer}
  .fval{font-variant-numeric:tabular-nums;font-size:15px;font-weight:700;color:var(--gold);width:46px;text-align:right;flex:none}

  .addf{margin-top:14px}

  /* aggregate */
  .agg{margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
  .aggtop{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .bignum{font-variant-numeric:tabular-nums;font-size:62px;font-weight:700;line-height:.9;color:var(--gold);text-shadow:0 0 24px rgba(212,168,83,.3)}
  .bignum small{font-size:20px;color:var(--gold-dim);font-weight:600}
  .verdict{text-align:right}
  .verdict .vl{font-size:18px;font-weight:700}
  .verdict .vs{font-size:12.5px;color:var(--mist);margin-top:3px;max-width:240px}

  .gauge{position:relative;height:16px;border-radius:10px;background:#20202c;margin:18px 0 6px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
  .gfill{position:absolute;left:0;top:0;bottom:0;border-radius:10px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));box-shadow:0 0 16px rgba(212,168,83,.45);transition:width .18s cubic-bezier(.4,0,.2,1)}
  .gtick{position:absolute;top:-3px;bottom:-3px;width:2px;left:50%;background:rgba(236,232,223,.5)}
  .scale{display:flex;justify-content:space-between;font-size:10.5px;color:#6b6770;font-variant-numeric:tabular-nums;letter-spacing:.05em}
  .scale b{color:var(--mist);font-weight:600}

  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05)}

  .empty{color:var(--mist);text-align:center;padding:60px 20px;line-height:1.7}
  .empty b{color:var(--gold)}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--gold);color:#1a1408;padding:11px 20px;border-radius:10px;font-size:13.5px;font-weight:700;
    opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow);z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .philo{margin-top:30px;color:#6b6770;font-size:11.5px;line-height:1.7;text-align:center;letter-spacing:.02em}
  .philo b{color:var(--gold-dim)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">ゆらぎ秤<small>YURAGI-BAKARI · BOOLEAN→FLOAT</small></div>
    <div class="tagline">YesでもNoでもなく、0.5の重さを量る。<br>判断を二値で潰さず、各要因を 0.00〜1.00 の連続値で秤にかけ、重み付き平均で「傾き」を得る。</div>
  </header>

  <div class="app">
    <aside class="side">
      <h2>問いの一覧</h2>
      <div class="qlist" id="qlist"></div>
      <button class="btn gold" id="newQ">＋ 新しい問い</button>
      <div class="foot">
        <button class="btn ghost" id="importBtn">↧ JSONを読み込む</button>
        <button class="btn ghost" id="exportAll">↥ 全データを書き出す</button>
      </div>
    </aside>

    <main class="main" id="main"></main>
  </div>

  <div class="philo">
    <b>Boolean → Float</b> ／ 個別最適の規格化・規格の個別最適化<br>
    腐葉土設計：消した問いも履歴は栄養になる。完璧より、熱があるうちに。
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="application/json" style="display:none">

<script>
"use strict";
const LS_KEY = "yuragi-bakari-v1";
const STEP = 0.01;

/* ---------- model ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function newFactor(name, weight, value){
  return { id: uid(), name: name||"", weight: weight==null?3:weight, value: value==null?0.5:value };
}
function newQuestion(title){
  return {
    id: uid(),
    title: title||"",
    factors: [ newFactor("",3,0.5), newFactor("",3,0.5) ],
    updated: Date.now()
  };
}

let state = { questions: [], currentId: null };

/* ---------- compute (pure) ---------- */
function aggregate(factors){
  let wsum = 0, vsum = 0;
  for (const f of factors){
    const w = Number(f.weight) || 0;
    const v = Number(f.value)  || 0;
    wsum += w; vsum += w * v;
  }
  return wsum > 0 ? vsum / wsum : 0;
}
function verdict(x){
  if (x < 0.20) return { label:"ほぼ No", sub:"秤は深く沈んでいる。" };
  if (x < 0.40) return { label:"どちらかといえば No", sub:"傾きは No 寄り。覆す要因はあるか。" };
  if (x < 0.60) return { label:"ゆらぎ — 保留の重さ", sub:"0.5 周辺。最も情報量の多い、決めつけない場所。" };
  if (x < 0.80) return { label:"どちらかといえば Yes", sub:"傾きは Yes 寄り。だが断定はしない。" };
  return { label:"ほぼ Yes", sub:"秤は明確に傾いた。" };
}

/* ---------- persistence ---------- */
function save(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ /* private mode etc. */ }
}
function load(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw){ const s = JSON.parse(raw); if (s && Array.isArray(s.questions)) state = s; }
  } catch(e){}
}

/* ---------- share via URL hash ---------- */
function b64encode(obj){ return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
function b64decode(str){ return JSON.parse(decodeURIComponent(escape(atob(str)))); }

function shareLink(){
  const q = current();
  if (!q) return;
  const payload = { t:q.title, f:q.factors.map(f=>({n:f.name,w:f.weight,v:f.value})) };
  const hash = "#q=" + b64encode(payload);
  const url = location.origin + location.pathname + hash;
  copy(url, "共有リンクをコピーしました");
}
function tryImportFromHash(){
  if (!location.hash.startsWith("#q=")) return false;
  try{
    const payload = b64decode(location.hash.slice(3));
    const q = newQuestion(payload.t || "");
    q.factors = (payload.f||[]).map(o => newFactor(o.n, o.w, o.v));
    if (!q.factors.length) q.factors = [ newFactor("",3,0.5) ];
    state.questions.unshift(q);
    state.currentId = q.id;
    save();
    history.replaceState(null, "", location.pathname);
    return true;
  } catch(e){ return false; }
}

/* ---------- helpers ---------- */
function current(){ return state.questions.find(q => q.id === state.currentId) || null; }
function fmt(x){ return x.toFixed(2); }

function copy(text, msg){
  const done = () => toast(msg || "コピーしました");
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done, ()=>fallbackCopy(text,done));
  } else fallbackCopy(text, done);
}
function fallbackCopy(text, cb){
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta); cb && cb();
}
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1900);
}
function download(filename, text){
  const blob = new Blob([text], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 100);
}

/* ---------- render ---------- */
function renderSidebar(){
  const list = document.getElementById("qlist");
  list.innerHTML = "";
  if (!state.questions.length){
    const d = document.createElement("div");
    d.className = "hint"; d.style.padding="4px 2px";
    d.textContent = "まだ問いがありません。";
    list.appendChild(d); return;
  }
  for (const q of state.questions){
    const x = aggregate(q.factors);
    const b = document.createElement("button");
    b.className = "qitem" + (q.id===state.currentId ? " active" : "");
    const t = document.createElement("span");
    t.className = "qt"; t.textContent = q.title || "（無題の問い）";
    const m = document.createElement("span");
    m.className = "qmini"; m.textContent = fmt(x);
    b.appendChild(t); b.appendChild(m);
    b.addEventListener("click", ()=>{ state.currentId = q.id; render(); });
    list.appendChild(b);
  }
}

function setSliderFill(input, v){
  input.style.setProperty("--p", (v*100).toFixed(1) + "%");
}

function renderMain(){
  const main = document.getElementById("main");
  const q = current();
  if (!q){
    main.innerHTML = '<div class="empty">左の <b>＋ 新しい問い</b> から始めよう。<br>「やるべきか / やらざるべきか」を、Yes・No で潰す前に<br>各要因の重さを 0.00〜1.00 で量る。</div>';
    return;
  }
  main.innerHTML = "";

  const title = document.createElement("input");
  title.className = "qtitle"; title.value = q.title;
  title.placeholder = "問い —— 例: この企画を今やるべきか";
  title.addEventListener("input", ()=>{ q.title=title.value; q.updated=Date.now(); save();
    const active=document.querySelector(".qitem.active .qt"); if(active) active.textContent=q.title||"（無題の問い）"; });
  main.appendChild(title);

  const hint = document.createElement("div");
  hint.className = "hint";
  hint.textContent = "要因ごとに 重み（1〜5）と Float値（0.00〜1.00）を置く。下に重み付き平均＝総合の傾きが出る。";
  main.appendChild(hint);

  const factors = document.createElement("div");
  factors.className = "factors";
  q.factors.forEach(f => factors.appendChild(renderFactor(q, f)));
  main.appendChild(factors);

  const add = document.createElement("button");
  add.className = "btn addf"; add.textContent = "＋ 要因を追加";
  add.addEventListener("click", ()=>{ q.factors.push(newFactor("",3,0.5)); q.updated=Date.now(); save(); render(); });
  main.appendChild(add);

  main.appendChild(renderAgg(q));
  main.appendChild(renderActions(q));
}

function renderFactor(q, f){
  const wrap = document.createElement("div");
  wrap.className = "factor";

  const r1 = document.createElement("div");
  r1.className = "frow1";
  const name = document.createElement("input");
  name.className = "fname"; name.value = f.name; name.placeholder = "要因 —— 例: 時間に余裕があるか";
  name.addEventListener("input", ()=>{ f.name=name.value; q.updated=Date.now(); save(); });

  const wsel = document.createElement("div");
  wsel.className = "wsel";
  const wlab = document.createElement("span"); wlab.className="wlab"; wlab.textContent="重み"; wsel.appendChild(wlab);
  for (let i=1;i<=5;i++){
    const wb = document.createElement("button");
    wb.className = "wbtn" + (i===Number(f.weight)?" on":"");
    wb.textContent = i;
    wb.addEventListener("click", ()=>{ f.weight=i; q.updated=Date.now(); save(); render(); });
    wsel.appendChild(wb);
  }

  const del = document.createElement("button");
  del.className = "fdel"; del.textContent = "×"; del.title="この要因を削除";
  del.addEventListener("click", ()=>{
    q.factors = q.factors.filter(x=>x.id!==f.id);
    if (!q.factors.length) q.factors.push(newFactor("",3,0.5));
    q.updated=Date.now(); save(); render();
  });

  r1.appendChild(name); r1.appendChild(wsel); r1.appendChild(del);

  const r2 = document.createElement("div");
  r2.className = "frow2";
  const range = document.createElement("input");
  range.type="range"; range.min="0"; range.max="1"; range.step=String(STEP); range.value=String(f.value);
  setSliderFill(range, f.value);
  const val = document.createElement("span");
  val.className="fval"; val.textContent=fmt(Number(f.value));
  range.addEventListener("input", ()=>{
    f.value = Number(range.value);
    val.textContent = fmt(f.value);
    setSliderFill(range, f.value);
    updateAgg(q);
    q.updated=Date.now(); save();
  });
  r2.appendChild(range); r2.appendChild(val);

  wrap.appendChild(r1); wrap.appendChild(r2);
  return wrap;
}

function renderAgg(q){
  const agg = document.createElement("div");
  agg.className = "agg"; agg.id = "aggBox";

  const top = document.createElement("div");
  top.className = "aggtop";
  const big = document.createElement("div");
  big.className = "bignum"; big.id = "bignum";
  const v = document.createElement("div");
  v.className = "verdict";
  v.innerHTML = '<div class="vl" id="vl"></div><div class="vs" id="vs"></div>';
  top.appendChild(big); top.appendChild(v);

  const gauge = document.createElement("div");
  gauge.className = "gauge";
  gauge.innerHTML = '<div class="gfill" id="gfill"></div><div class="gtick"></div>';

  const scale = document.createElement("div");
  scale.className = "scale";
  scale.innerHTML = '<span>0.00 <b>No</b></span><span>0.50 <b>ゆらぎ</b></span><span><b>Yes</b> 1.00</span>';

  agg.appendChild(top); agg.appendChild(gauge); agg.appendChild(scale);
  setTimeout(()=>updateAgg(q), 0);
  return agg;
}

function updateAgg(q){
  const x = aggregate(q.factors);
  const big = document.getElementById("bignum");
  const fill = document.getElementById("gfill");
  const vl = document.getElementById("vl");
  const vs = document.getElementById("vs");
  if (!big) return;
  big.innerHTML = fmt(x) + ' <small>/ 1.00</small>';
  fill.style.width = (x*100).toFixed(1) + "%";
  const vd = verdict(x);
  vl.textContent = vd.label; vs.textContent = vd.sub;
  const mini = document.querySelector(".qitem.active .qmini");
  if (mini) mini.textContent = fmt(x);
}

function renderActions(q){
  const a = document.createElement("div");
  a.className = "actions";

  const share = document.createElement("button");
  share.className="btn"; share.textContent="🔗 共有リンク";
  share.addEventListener("click", shareLink);

  const json = document.createElement("button");
  json.className="btn"; json.textContent="⤓ この問いをJSON";
  json.addEventListener("click", ()=>{
    download((q.title||"yuragi").replace(/[^\w一-龠ぁ-んァ-ンー]+/g,"_").slice(0,40)+".json",
      JSON.stringify(q,null,2));
    toast("JSONを書き出しました");
  });

  const dup = document.createElement("button");
  dup.className="btn"; dup.textContent="⎘ 複製";
  dup.addEventListener("click", ()=>{
    const c = JSON.parse(JSON.stringify(q));
    c.id = uid(); c.title = (q.title||"問い")+"（複製）"; c.updated=Date.now();
    c.factors.forEach(f=>f.id=uid());
    state.questions.unshift(c); state.currentId=c.id; save(); render();
  });

  const del = document.createElement("button");
  del.className="btn ghost"; del.textContent="🗑 削除";
  del.addEventListener("click", ()=>{
    if (!confirm("この問いを削除する？（履歴は戻せない）")) return;
    state.questions = state.questions.filter(x=>x.id!==q.id);
    state.currentId = state.questions.length ? state.questions[0].id : null;
    save(); render();
  });

  a.appendChild(share); a.appendChild(dup); a.appendChild(json); a.appendChild(del);
  return a;
}

function render(){ renderSidebar(); renderMain(); save(); }

/* ---------- wire ---------- */
document.getElementById("newQ").addEventListener("click", ()=>{
  const q = newQuestion("");
  state.questions.unshift(q); state.currentId = q.id; render();
  const t = document.querySelector(".qtitle"); if (t) t.focus();
});
document.getElementById("exportAll").addEventListener("click", ()=>{
  download("yuragi-bakari-all.json", JSON.stringify(state,null,2));
  toast("全データを書き出しました");
});
document.getElementById("importBtn").addEventListener("click", ()=>document.getElementById("fileInput").click());
document.getElementById("fileInput").addEventListener("change", (e)=>{
  const file = e.target.files[0]; if(!file) return;
  const rdr = new FileReader();
  rdr.onload = ()=>{
    try{
      const data = JSON.parse(rdr.result);
      if (data && Array.isArray(data.questions)){
        for (const q of data.questions){ q.id=uid(); state.questions.unshift(q); }
        state.currentId = state.questions[0].id;
      } else if (data && Array.isArray(data.factors)){
        data.id=uid(); state.questions.unshift(data); state.currentId=data.id;
      } else { toast("読み込める形式ではありません"); return; }
      save(); render(); toast("読み込みました");
    }catch(err){ toast("JSONの解析に失敗しました"); }
  };
  rdr.readAsText(file);
  e.target.value = "";
});

/* ---------- boot ---------- */
load();
const imported = tryImportFromHash();
if (!state.currentId && state.questions.length) state.currentId = state.questions[0].id;
if (!state.questions.length && !imported){
  // seed one illustrative example so the秤 is never empty on first open
  const seed = newQuestion("この企画を、今夜やるべきか");
  seed.factors = [
    newFactor("熱があるうちか（衝動の温度）", 5, 0.8),
    newFactor("時間に余裕があるか", 3, 0.4),
    newFactor("失敗しても損が小さいか", 4, 0.7),
    newFactor("他にもっと優先すべきものは無いか", 4, 0.55)
  ];
  state.questions.push(seed); state.currentId = seed.id;
}
render();
</script>
</body>
