<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>osakenpiro — 集約LP v2</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="styles-d.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="variant-a.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>
<script type="text/babel" src="variant-c.jsx"></script>
<script type="text/babel" src="variant-d.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const DEFAULT_KNOBS = /*EDITMODE-BEGIN*/{
  "variant": "D",
  "density": 0.55,
  "orbital": 0.5,
  "drama": 0.6
}/*EDITMODE-END*/;

function App() {
  const [variant, setVariant] = useState(DEFAULT_KNOBS.variant);
  const [density, setDensity] = useState(DEFAULT_KNOBS.density);
  const [orbital, setOrbital] = useState(DEFAULT_KNOBS.orbital);
  const [drama, setDrama] = useState(DEFAULT_KNOBS.drama);
  const [tweakOn, setTweakOn] = useState(false);

  // edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweakOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweakOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (patch) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  const setV = (v) => { setVariant(v); persist({ variant: v }); };
  const setD = (v) => { setDensity(v); persist({ density: v }); };
  const setO = (v) => { setOrbital(v); persist({ orbital: v }); };
  const setR = (v) => { setDrama(v); persist({ drama: v }); };

  const knobs = { density, orbital, drama };

  return (
    <>
      <nav className="lp-chrome" data-screen-label="chrome">
        {['A','B','C','D'].map(k => (
          <button key={k} onClick={()=>setV(k)} className={variant===k?'on':''}>
            {k === 'A' ? '縦書き' : k === 'B' ? '非対称' : k === 'C' ? 'トランジション' : '統合 ★'}
          </button>
        ))}
      </nav>

      <div data-screen-label={`variant-${variant}`}>
        {variant === 'A' && <VariantA knobs={knobs} />}
        {variant === 'B' && <VariantB knobs={knobs} />}
        {variant === 'C' && <VariantC knobs={knobs} />}
        {variant === 'D' && <VariantD knobs={knobs} />}
      </div>

      {tweakOn && (
        <aside className="lp-tweaks">
          <button className="lp-tweaks-close" onClick={()=>setTweakOn(false)}>✕</button>
          <h4>◉ TWEAKS</h4>
          <label>
            <div className="lp-label-row"><span>情報密度</span><span>{density.toFixed(2)}</span></div>
            <input type="range" min="0" max="1" step="0.01" value={density} onChange={e=>setD(+e.target.value)}/>
          </label>
          <label>
            <div className="lp-label-row"><span>公転速度</span><span>{orbital.toFixed(2)}</span></div>
            <input type="range" min="0" max="1" step="0.01" value={orbital} onChange={e=>setO(+e.target.value)}/>
          </label>
          <label>
            <div className="lp-label-row"><span>タイポのドラマ</span><span>{drama.toFixed(2)}</span></div>
            <input type="range" min="0" max="1" step="0.01" value={drama} onChange={e=>setR(+e.target.value)}/>
          </label>
        </aside>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
