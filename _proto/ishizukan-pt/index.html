<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石の図鑑（仮）— ガラス窓の標本 / パストレーシング</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#06060a;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic Medium",system-ui,sans-serif;overflow-x:hidden}
  :root{--void:#06060a;--void-deep:#020203;--gold:#d4a853;--gold-edge:rgba(212,168,83,.45);--fg-1:#e8e0d0;--fg-2:#b8b0a0;--fg-3:#807868;--serif:"Cormorant Garamond","游明朝体","Yu Mincho","Hiragino Mincho ProN",serif}
  #sky{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;border-radius:50%;background:#e8e0d0;animation:tw 4s ease-in-out infinite}
  .star.g{background:var(--gold)}
  @keyframes tw{0%,100%{opacity:.12}50%{opacity:.75}}
  main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:40px 20px 60px;text-align:center}
  .eyebrow{font-size:.68rem;letter-spacing:.34em;color:var(--fg-3);text-transform:uppercase;margin-bottom:8px}
  .eyebrow b{color:var(--gold)}
  h1{font-family:var(--serif);font-weight:600;font-size:2rem;letter-spacing:.06em;color:var(--fg-1)}
  h1 small{display:block;font-size:.4em;letter-spacing:.2em;color:var(--fg-3);margin-top:8px;font-family:-apple-system,sans-serif;font-weight:400}
  .window{position:relative;max-width:440px;margin:30px auto 0;aspect-ratio:1/1.12;border-radius:14px;
    background:linear-gradient(145deg,rgba(212,168,83,.10),transparent 42%),radial-gradient(circle at 50% 40%,rgba(160,180,210,.05),transparent 60%),var(--void-deep);
    border:1px solid var(--gold-edge);box-shadow:0 24px 70px rgba(0,0,0,.6), inset 0 0 60px rgba(120,150,200,.05);overflow:hidden}
  .window::before{content:"";position:absolute;inset:12px;border:1px solid rgba(200,210,230,.12);border-radius:8px;pointer-events:none;z-index:3}
  .window::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;background:linear-gradient(118deg,transparent 30%,rgba(220,228,240,.07) 44%,rgba(220,228,240,.02) 50%,transparent 58%)}
  #stage{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2}
  .plate{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:14px 18px 16px;text-align:left;background:linear-gradient(0deg,rgba(6,6,10,.86),transparent);}
  .plate .no{font-family:var(--mono,"JetBrains Mono",monospace);font-size:.64rem;letter-spacing:.14em;color:var(--gold)}
  .plate .nm{font-family:var(--serif);font-size:1.15rem;color:var(--fg-1);letter-spacing:.05em;margin-top:2px}
  .plate .sub{font-size:.72rem;color:var(--fg-3);letter-spacing:.06em;margin-top:3px}
  .hint{position:absolute;top:10px;right:12px;z-index:5;font-size:.58rem;letter-spacing:.1em;color:var(--fg-3);opacity:.6}
  #status{position:absolute;top:10px;left:12px;z-index:5;font-size:.58rem;letter-spacing:.08em;color:var(--fg-3);opacity:.7}
  .cap{font-size:.75rem;color:var(--fg-3);letter-spacing:.06em;margin-top:22px;line-height:1.9}
  .cap b{color:var(--gold)}
</style>
</head>
<body>
<div id="errbox" style="position:fixed;left:0;right:0;top:0;z-index:99;background:#300;color:#fdd;font:11px/1.4 monospace;padding:8px;white-space:pre-wrap;display:none"></div>
<div id="sky"></div>
<main>
  <div class="eyebrow">石の図鑑 <b>パストレーシング</b> · 写真級検討</div>
  <h1>ガラス窓の標本<small>石をガラスに封じて、回して見る</small></h1>

  <div class="window">
    <canvas id="stage"></canvas>
    <div id="status">loading…</div>
    <div class="hint">drag · 離すと収束</div>
    <div class="plate">
      <div class="no">No.01 · QUARTZ</div>
      <div class="nm">石英（せきえい）</div>
      <div class="sub">SiO₂ ・ 六方晶 ・ モース硬度 7</div>
    </div>
  </div>

  <div class="cap">これは <b>写真級（GPUパストレーシング）</b> の検討版。<br>光を物理シミュレート＝本物の屈折・焦線・分散。<br><b>ドラッグで回す</b>と粗くなり、<b>離すと数秒で収束</b>して精細化する。</div>
</main>

<script>
  (function(){var sky=document.getElementById("sky");for(var i=0;i<60;i++){var s=document.createElement("div");s.className="star"+(Math.random()<0.16?" g":"");var z=(Math.random()*1.7+0.5).toFixed(2);s.style.width=z+"px";s.style.height=z+"px";s.style.left=(Math.random()*100).toFixed(2)+"%";s.style.top=(Math.random()*100).toFixed(2)+"%";s.style.animationDelay=(Math.random()*4).toFixed(2)+"s";sky.appendChild(s);}})();
  window.__ok=false;
  function showErr(m){document.title="ERR: "+m;var b=document.getElementById("errbox");if(b){b.style.display="block";b.textContent="ERR: "+m;}}
  window.addEventListener("error",function(e){showErr(((e&&e.message)||"unknown")+"  @"+(((e&&e.filename)||"").split('/').pop())+":"+((e&&e.lineno)||"")+":"+((e&&e.colno)||""));});
  window.addEventListener("unhandledrejection",function(e){showErr("PROMISE "+((e&&e.reason&&e.reason.message)||e.reason||"")+"\n"+((e&&e.reason&&e.reason.stack)||"").split('\n').slice(0,3).join('\n'));});
  setTimeout(function(){if(!window.__ok)document.title="TIMEOUT("+document.title+")";},8000);
</script>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
  "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
  "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.7.8?external=three",
  "three-gpu-pathtracer": "https://esm.sh/three-gpu-pathtracer@0.0.23?external=three,three-mesh-bvh"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { WebGLPathTracer } from 'three-gpu-pathtracer';

const canvas = document.getElementById('stage');
const wrap = canvas.parentElement;
const statusEl = document.getElementById('status');

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(1);                     // パストレはピクセル数がコスト=1で収束を優先
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
camera.position.set(0, 0.25, 6.6);

/* --- 環境: 明るい光源env(IBL=照明＆結晶が透かして見る先) と 暗いvoid背景env を分ける --- */
/* 手続きequirectを Float DataTexture 化(パストレーサはCanvasTexture不可=画像データ配列が要る)。明部をHDRブースト=強い光源。 */
function equirectData(w,h,paint,boost){
  boost=boost||1;
  const c=document.createElement('canvas');c.width=w;c.height=h;const g=c.getContext('2d');
  const blob=(x,y,r,col)=>{const rg=g.createRadialGradient(x,y,0,x,y,r);rg.addColorStop(0,col);rg.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=rg;g.fillRect(0,0,w,h);};
  paint(g,blob);
  const src=g.getImageData(0,0,w,h).data, n=w*h, data=new Float32Array(n*4);
  const s2l=(v)=>{v/=255;return v<=0.04045?v/12.92:Math.pow((v+0.055)/1.055,2.4);};
  for(let i=0;i<n;i++){
    let r=s2l(src[i*4]),gg=s2l(src[i*4+1]),b=s2l(src[i*4+2]);
    const lum=0.2126*r+0.7152*gg+0.0722*b, t=Math.max(0,Math.min(1,(lum-0.55)/0.45)), f=1+(boost-1)*(t*t*(3-2*t));
    data[i*4]=r*f; data[i*4+1]=gg*f; data[i*4+2]=b*f; data[i*4+3]=1;
  }
  const tex=new THREE.DataTexture(data,w,h,THREE.RGBAFormat,THREE.FloatType);
  tex.mapping=THREE.EquirectangularReflectionMapping; tex.colorSpace=THREE.NoColorSpace; tex.needsUpdate=true; return tex;
}
const envLight = equirectData(1024,512,(g,blob)=>{
  const grd=g.createLinearGradient(0,0,0,512);grd.addColorStop(0,'#6a5a2e');grd.addColorStop(0.42,'#181922');grd.addColorStop(1,'#070709');g.fillStyle=grd;g.fillRect(0,0,1024,512);
  blob(240,150,340,'rgba(255,226,172,1)'); blob(245,150,110,'rgba(255,252,240,1)');   // 金の主光＋白熱芯
  blob(770,120,210,'rgba(255,255,255,1)');  blob(786,124,52,'rgba(255,255,255,1)');    // 白のソフトボックス＋鋭い芯
  blob(900,360,190,'rgba(255,222,166,0.8)');                                            // 巻き込み
  blob(540,440,240,'rgba(150,178,230,0.6)');                                            // 冷フィル
  const bar=(x,y,w,h,a)=>{const rg=g.createLinearGradient(x,y,x,y+h);rg.addColorStop(0,'rgba(255,255,255,0)');rg.addColorStop(0.5,'rgba(255,255,255,'+a+')');rg.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=rg;g.fillRect(x,y,w,h);};
  bar(120,40,150,340,0.85); bar(650,50,120,300,0.7);                                    // 面に映る"窓"
  for(let i=0;i<24;i++) blob(Math.random()*1024,Math.random()*512,2+Math.random()*4,'rgba(255,244,220,1)');
}, 6.0);
const envBg = equirectData(1024,512,(g,blob)=>{
  const grd=g.createLinearGradient(0,0,0,512);grd.addColorStop(0,'#14110a');grd.addColorStop(0.5,'#08090e');grd.addColorStop(1,'#040406');g.fillStyle=grd;g.fillRect(0,0,1024,512);
  blob(300,300,300,'rgba(200,150,72,0.34)'); blob(300,300,90,'rgba(240,196,130,0.55)'); // 奥の金グロー
  blob(760,250,150,'rgba(200,214,240,0.24)');
  g.globalCompositeOperation='lighter';
  for(let i=0;i<150;i++){const gold=Math.random()<0.18;const a=(0.25+Math.random()*0.6).toFixed(2);g.fillStyle=gold?`rgba(212,168,83,${a})`:`rgba(232,224,208,${a})`;const s=Math.random()*1.5+0.4;g.beginPath();g.arc(Math.random()*1024,Math.random()*512,s,0,7);g.fill();}
}, 2.0);
scene.environment = envLight;   // 照明＆屈折で透ける先
scene.background  = envBg;      // 見える背景(暗いvoid+金)

/* --- 石英の結晶形: 六角柱＋両端の六角錐(両錐水晶)。これが"特徴"。 --- */
function quartzGeometry(rad, prismH, tipH){
  const prism = new THREE.CylinderGeometry(rad, rad, prismH, 6, 1);
  const top = new THREE.ConeGeometry(rad, tipH, 6, 1); top.translate(0, prismH/2 + tipH/2, 0);
  const bot = new THREE.ConeGeometry(rad, tipH, 6, 1); bot.rotateX(Math.PI); bot.translate(0, -(prismH/2 + tipH/2), 0);
  const geo = mergeGeometries([prism, top, bot], false).toNonIndexed();
  geo.computeVertexNormals();
  return geo;
}
/* 石英の縦条線(striation)＝プリズム面の横縞＝同定の決め手 */
function makeStriationNormal(){
  const s=512,c=document.createElement('canvas');c.width=c.height=s;const g=c.getContext('2d');
  const img=g.createImageData(s,s),d=img.data;
  for(let y=0;y<s;y++){const ridge=Math.sin(y*0.55)*0.5+Math.sin(y*0.17+1.3)*0.3+Math.sin(y*1.9)*0.12;
    for(let x=0;x<s;x++){const n=Math.sin(x*0.3+y*0.1)*0.04,i=(y*s+x)*4;d[i]=128+n*127;d[i+1]=128+ridge*46;d[i+2]=255;d[i+3]=255;}}
  g.putImageData(img,0,0);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.NoColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(3,2);return t;
}

const quartzMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.0,
  roughness: 0.02,
  normalMap: makeStriationNormal(),
  normalScale: new THREE.Vector2(0.08, 0.08),
  transmission: 1.0,
  thickness: 1.4,
  ior: 1.55,
  dispersion: 0.6,           // パストレは分散(虹)を物理で出せる=強めでも自然
  attenuationColor: 0xecf2ff,
  attenuationDistance: 4.0,
  clearcoat: 1.0,
  clearcoatRoughness: 0.02,
  transparent: true
});

const crystal = new THREE.Group();
crystal.add(new THREE.Mesh(quartzGeometry(0.46, 1.5, 0.62), quartzMat));
const comp = new THREE.Mesh(quartzGeometry(0.19, 0.7, 0.30), quartzMat);
comp.position.set(0.52, -0.55, 0.18); comp.rotation.set(0.12, 0.3, 0.5); crystal.add(comp);
const comp2 = new THREE.Mesh(quartzGeometry(0.12, 0.5, 0.22), quartzMat);
comp2.position.set(-0.42, -0.62, 0.0); comp2.rotation.set(-0.1, 0.6, -0.42); crystal.add(comp2);
crystal.rotation.set(0.10, 0.5, 0.14);
scene.add(crystal);

/* --- 操作: 自動回転なし。ドラッグで動かし、離すと収束(damping切=即静止) --- */
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = false;
controls.enablePan = false;
controls.enableZoom = true; controls.minDistance = 4.8; controls.maxDistance = 8.6;
controls.minPolarAngle = Math.PI*0.24; controls.maxPolarAngle = Math.PI*0.76;
controls.target.set(0,0,0);

/* --- パストレーサ --- */
const pathTracer = new WebGLPathTracer(renderer);
pathTracer.renderScale = 1.0;
pathTracer.tiles.set(2, 2);
pathTracer.bounces = 6;
pathTracer.transmissiveBounces = 12;      // 硝子内で多数回屈折=深い透明
pathTracer.multipleImportanceSampling = true;
pathTracer.dynamicLowRes = true;          // 動作中は低解像→軽い
pathTracer.lowResScale = 0.3;
pathTracer.minSamples = 3;

function resize(){
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
  pathTracer.updateCamera();
}
window.addEventListener('resize', resize);

pathTracer.setScene(scene, camera);
resize();
controls.addEventListener('change', ()=> pathTracer.updateCamera());

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  pathTracer.renderSample();
  if(!window.__ok){ window.__ok = true; document.title = 'OKRENDER'; }
  const s = pathTracer.samples || 0;
  if(statusEl) statusEl.textContent = s < 1 ? 'rendering…' : (s < 60 ? ('収束中 ' + (s|0) + ' spp') : ('収束 ' + (s|0) + ' spp'));
}
animate();
</script>
</body>
</html>
