<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石の図鑑（仮）— ガラス窓の標本 / プロトタイプ</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#06060a;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic Medium",system-ui,sans-serif;overflow-x:hidden}
  :root{--void:#06060a;--void-deep:#020203;--gold:#d4a853;--gold-edge:rgba(212,168,83,.45);--gold-glow:rgba(212,168,83,.28);--fg-1:#e8e0d0;--fg-2:#b8b0a0;--fg-3:#807868;--serif:"Cormorant Garamond","游明朝体","Yu Mincho","Hiragino Mincho ProN",serif}
  #sky{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;border-radius:50%;background:#e8e0d0;animation:tw 4s ease-in-out infinite}
  .star.g{background:var(--gold)}
  @keyframes tw{0%,100%{opacity:.12}50%{opacity:.75}}
  main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:40px 20px 60px;text-align:center}
  .eyebrow{font-size:.68rem;letter-spacing:.34em;color:var(--fg-3);text-transform:uppercase;margin-bottom:8px}
  .eyebrow b{color:var(--gold)}
  h1{font-family:var(--serif);font-weight:600;font-size:2rem;letter-spacing:.06em;color:var(--fg-1)}
  h1 small{display:block;font-size:.4em;letter-spacing:.2em;color:var(--fg-3);margin-top:8px;font-family:-apple-system,sans-serif;font-weight:400}

  /* ガラス窓の標本フレーム */
  .window{position:relative;max-width:440px;margin:30px auto 0;aspect-ratio:1/1.12;
    border-radius:14px;
    background:
      linear-gradient(145deg,rgba(212,168,83,.10),transparent 42%),
      radial-gradient(circle at 50% 40%,rgba(160,180,210,.05),transparent 60%),
      var(--void-deep);
    border:1px solid var(--gold-edge);
    box-shadow:0 24px 70px rgba(0,0,0,.6), inset 0 0 60px rgba(120,150,200,.05);
    overflow:hidden}
  /* 窓ガラスの内枠(二重枠＝額装) */
  .window::before{content:"";position:absolute;inset:12px;border:1px solid rgba(200,210,230,.12);border-radius:8px;pointer-events:none;z-index:3}
  /* ガラス面の斜め反射ハイライト */
  .window::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;
    background:linear-gradient(118deg,transparent 30%,rgba(220,228,240,.08) 44%,rgba(220,228,240,.02) 50%,transparent 58%)}
  #stage{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2}
  .plate{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:14px 18px 16px;text-align:left;
    background:linear-gradient(0deg,rgba(6,6,10,.86),transparent);}
  .plate .no{font-family:var(--mono,"JetBrains Mono",monospace);font-size:.64rem;letter-spacing:.14em;color:var(--gold)}
  .plate .nm{font-family:var(--serif);font-size:1.15rem;color:var(--fg-1);letter-spacing:.05em;margin-top:2px}
  .plate .sub{font-size:.72rem;color:var(--fg-3);letter-spacing:.06em;margin-top:3px}
  .cap{font-size:.75rem;color:var(--fg-3);letter-spacing:.06em;margin-top:22px;line-height:1.9}
  .cap b{color:var(--gold)}
  .hint{position:absolute;top:10px;right:12px;z-index:5;font-size:.6rem;letter-spacing:.12em;color:var(--fg-3);opacity:.6}
</style>
</head>
<body>
<div id="sky"></div>
<main>
  <div class="eyebrow">石の図鑑 <b>プロトタイプ</b> · スタイル検討</div>
  <h1>ガラス窓の標本<small>石をガラスに封じて、回して見る</small></h1>

  <div class="window">
    <canvas id="stage"></canvas>
    <div class="hint">drag to rotate</div>
    <div class="plate">
      <div class="no">No.01 · QUARTZ</div>
      <div class="nm">石英（せきえい）</div>
      <div class="sub">SiO₂ ・ 六方晶 ・ モース硬度 7</div>
    </div>
  </div>

  <div class="cap">これは <b>石のクオリティ検討用</b> のプロトタイプ。<br>「ガラスの窓に封じた標本を、回して眺める」方向。<br>実物の透明感・屈折・虹の分散がこの路線で良ければ、図鑑フォーマットを組む。</div>
</main>

<script>
  /* 星空(CSSページ背景・窓の外側にも散る) */
  (function(){var sky=document.getElementById("sky");for(var i=0;i<60;i++){var s=document.createElement("div");s.className="star"+(Math.random()<0.16?" g":"");var z=(Math.random()*1.7+0.5).toFixed(2);s.style.width=z+"px";s.style.height=z+"px";s.style.left=(Math.random()*100).toFixed(2)+"%";s.style.top=(Math.random()*100).toFixed(2)+"%";s.style.animationDelay=(Math.random()*4).toFixed(2)+"s";sky.appendChild(s);}})();
  /* 検証ハーネス: 初回描画でtitleを OKRENDER に。失敗はERR / 5秒沈黙はTIMEOUT。 */
  window.__ok=false;
  window.addEventListener("error",function(e){document.title="ERR: "+((e&&e.message)||(e&&e.error)||"unknown");});
  window.addEventListener("unhandledrejection",function(e){document.title="ERR: "+((e&&e.reason&&e.reason.message)||"promise");});
  setTimeout(function(){if(!window.__ok)document.title="TIMEOUT("+document.title+")";},5000);
</script>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

const canvas = document.getElementById('stage');
const wrap = canvas.parentElement;

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.18;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
camera.position.set(0, 0.25, 6.6);

/* --- 反射用の環境マップ(void+金の単一暖色・鋭い白グリント)。equirectを手続き生成しPMREM化。 --- */
function makeEquirectEnv(){
  const c=document.createElement('canvas'); c.width=1024; c.height=512; const g=c.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,512);
  grd.addColorStop(0,'#4a4020'); grd.addColorStop(0.42,'#12131b'); grd.addColorStop(1,'#050507');
  g.fillStyle=grd; g.fillRect(0,0,1024,512);
  const blob=(x,y,r,col)=>{const rg=g.createRadialGradient(x,y,0,x,y,r);rg.addColorStop(0,col);rg.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=rg;g.fillRect(0,0,1024,512);};
  blob(240,150,320,'rgba(255,224,170,1)');       // 金の主光(大・強)
  blob(245,150,96,'rgba(255,250,236,1)');         // その芯(白熱)
  blob(770,120,190,'rgba(255,255,255,0.95)');     // 白の艶(大)
  blob(786,124,46,'rgba(255,255,255,1)');         // 鋭い白グリント
  blob(900,360,180,'rgba(255,220,160,0.6)');      // 右の巻き込み光(面がまわると閃く)
  blob(540,430,220,'rgba(130,160,215,0.42)');     // 冷たい下反射
  const bar=(x,y,w,h,a)=>{const rg=g.createLinearGradient(x,y,x,y+h);rg.addColorStop(0,'rgba(255,255,255,0)');rg.addColorStop(0.5,'rgba(255,255,255,'+a+')');rg.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=rg;g.fillRect(x,y,w,h);};
  blob(512,210,470,'rgba(255,252,246,0.26)');     // 広い中性フィル=結晶がクリアに読める(琥珀化を抑える)
  bar(120,50,150,320,0.5);                         // 縦ソフトボックス左(面に映る"窓"=写真っぽさ)
  bar(650,60,120,280,0.42);                        // 縦ソフトボックス右
  for(let i=0;i<20;i++) blob(Math.random()*1024, Math.random()*512, 2+Math.random()*4, 'rgba(255,242,214,1)'); // 微光点(鋭い星)
  const t=new THREE.CanvasTexture(c); t.mapping=THREE.EquirectangularReflectionMapping; t.colorSpace=THREE.SRGBColorSpace; return t;
}
const pmrem = new THREE.PMREMGenerator(renderer);
const envTex = makeEquirectEnv();
scene.environment = pmrem.fromEquirectangular(envTex).texture;
envTex.dispose(); pmrem.dispose();

/* --- 背景の額(不透明メッシュ=結晶が"屈折して映す"対象)。void+金グロー+星。 --- */
function makeBackdropTexture(){
  const c=document.createElement('canvas'); c.width=1024; c.height=1024; const g=c.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,1024);
  grd.addColorStop(0,'#131109'); grd.addColorStop(0.5,'#08090e'); grd.addColorStop(1,'#040406');
  g.fillStyle=grd; g.fillRect(0,0,1024,1024);
  const blob=(x,y,r,col)=>{const rg=g.createRadialGradient(x,y,0,x,y,r);rg.addColorStop(0,col);rg.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=rg;g.fillRect(0,0,1024,1024);};
  blob(330,300,380,'rgba(230,175,85,0.62)');  // 金グロー(奥の光源)
  blob(330,300,110,'rgba(255,232,182,0.95)');  // 芯
  blob(760,250,160,'rgba(220,232,255,0.5)');   // 白青の遠光
  blob(512,780,440,'rgba(150,120,70,0.34)');   // 下の灯った台(結晶の足元が光る)
  blob(560,830,300,'rgba(70,100,160,0.2)');    // 冷フィル
  g.globalCompositeOperation='lighter';
  for(let i=0;i<140;i++){const gold=Math.random()<0.18;const a=(0.25+Math.random()*0.6).toFixed(2);g.fillStyle=gold?`rgba(212,168,83,${a})`:`rgba(232,224,208,${a})`;const s=Math.random()*1.6+0.4;g.beginPath();g.arc(Math.random()*1024,Math.random()*1024,s,0,7);g.fill();}
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}
const backdrop = new THREE.Mesh(
  new THREE.PlaneGeometry(20,20),
  new THREE.MeshBasicMaterial({ map: makeBackdropTexture() })
);
backdrop.position.z = -4.5;
scene.add(backdrop);

/* 結晶の奥の柔らかな発光核=背光。結晶がこれを透かして"光って"見える(硝子の撮り方)。 */
function makeHaloTex(){
  const s=256,c=document.createElement('canvas');c.width=c.height=s;const g=c.getContext('2d');
  g.fillStyle='#06070c'; g.fillRect(0,0,s,s);
  const rg=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  rg.addColorStop(0,'rgba(255,245,226,1)'); rg.addColorStop(0.34,'rgba(230,188,122,0.72)'); rg.addColorStop(1,'rgba(6,7,12,1)');
  g.fillStyle=rg; g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}
const halo = new THREE.Mesh(new THREE.CircleGeometry(1.7,48), new THREE.MeshBasicMaterial({ map: makeHaloTex() }));
halo.position.set(0,0,-1.9); scene.add(halo);

/* --- ライト: 面の鋭いきらめき用。フィルは環境マップが担う。 --- */
const key = new THREE.DirectionalLight(0xffe6b4, 3.4); key.position.set(3.2,4.0,3.0); scene.add(key);
const rim = new THREE.DirectionalLight(0xbcd0ff, 1.8); rim.position.set(-3.4,1.2,-1.5); scene.add(rim);
/* 近距離の鋭い点光源=面が回ると熱いグリントが走る(石英の艶の主役) */
const glint = new THREE.PointLight(0xfff0d6, 42, 30, 2); glint.position.set(1.7,2.2,3.2); scene.add(glint);
/* 背光: 結晶の後ろから前へ=縁が光り、透過が"光って"見える */
const back = new THREE.DirectionalLight(0xfff0e0, 2.6); back.position.set(-0.6,0.6,-3.5); scene.add(back);

/* --- 石英の結晶形: 六角柱＋両端の六角錐(両錐水晶)。これが"特徴"そのもの。 --- */
function quartzGeometry(rad, prismH, tipH){
  const prism = new THREE.CylinderGeometry(rad, rad, prismH, 6, 1);
  const top = new THREE.ConeGeometry(rad, tipH, 6, 1); top.translate(0, prismH/2 + tipH/2, 0);
  const bot = new THREE.ConeGeometry(rad, tipH, 6, 1); bot.rotateX(Math.PI); bot.translate(0, -(prismH/2 + tipH/2), 0);
  const geo = mergeGeometries([prism, top, bot], false).toNonIndexed();
  geo.computeVertexNormals();   // 非インデックス化で各面が独立=結晶らしい明快なファセット
  return geo;
}

/* 石英の縦条線(striation)=プリズム面に走る横縞。石英同定の決め手＝"特徴"。法線マップで表現。 */
function makeStriationNormal(){
  const s=512,c=document.createElement('canvas');c.width=c.height=s;const g=c.getContext('2d');
  const img=g.createImageData(s,s),d=img.data;
  for(let y=0;y<s;y++){
    const ridge=Math.sin(y*0.55)*0.5+Math.sin(y*0.17+1.3)*0.3+Math.sin(y*1.9)*0.12;
    for(let x=0;x<s;x++){
      const n=Math.sin(x*0.3+y*0.1)*0.04, i=(y*s+x)*4;
      d[i]=128+n*127; d[i+1]=128+ridge*46; d[i+2]=255; d[i+3]=255;
    }
  }
  g.putImageData(img,0,0);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.NoColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(3,2); return t;
}
/* 表面の微かな拭き跡・埃=完璧すぎるCG感を消す。roughnessを揺らす。 */
function makeSmudgeRough(){
  const s=256,c=document.createElement('canvas');c.width=c.height=s;const g=c.getContext('2d');
  g.fillStyle='#e6e6e6'; g.fillRect(0,0,s,s);
  for(let i=0;i<26;i++){const x=Math.random()*s,y=Math.random()*s,r=8+Math.random()*26;const rg=g.createRadialGradient(x,y,0,x,y,r);rg.addColorStop(0,Math.random()<0.5?'rgba(255,255,255,0.5)':'rgba(140,140,140,0.4)');rg.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=rg;g.fillRect(0,0,s,s);}
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.NoColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}

/* 透明な結晶: transmissionで背景を実屈折・dispersionで縁に虹・striation法線で石英の縦条線 */
const quartzMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.0,
  roughness: 0.05,
  roughnessMap: makeSmudgeRough(),
  normalMap: makeStriationNormal(),
  normalScale: new THREE.Vector2(0.10, 0.10),
  transmission: 0.98,        // ほぼクリア。存在は背光＋反射ハイライトで見せる
  thickness: 1.4,
  ior: 1.55,                 // 石英の実屈折率
  dispersion: 0.45,          // 縁の虹(r162+)
  attenuationColor: 0xeaf1ff,
  attenuationDistance: 3.5,  // 厚い所にごく淡い芯
  clearcoat: 1.0,
  clearcoatRoughness: 0.02,
  specularIntensity: 1.0,
  specularColor: 0xffffff,
  envMapIntensity: 1.6,      // 反射を強く=面が閃く
  transparent: true
});

const crystal = new THREE.Group();
const main = new THREE.Mesh(quartzGeometry(0.46, 1.5, 0.62), quartzMat);
crystal.add(main);
/* 寄り添う小結晶(クラスタ=これも石英の特徴) */
const comp = new THREE.Mesh(quartzGeometry(0.19, 0.7, 0.30), quartzMat);
comp.position.set(0.52, -0.55, 0.18); comp.rotation.set(0.12, 0.3, 0.5); crystal.add(comp);
const comp2 = new THREE.Mesh(quartzGeometry(0.12, 0.5, 0.22), quartzMat);
comp2.position.set(-0.42, -0.62, 0.0); comp2.rotation.set(-0.1, 0.6, -0.42); crystal.add(comp2);

crystal.rotation.set(0.10, 0.5, 0.14);
scene.add(crystal);

/* --- 操作: OrbitControlsで回す。慣性・自動回転・上下制限。 --- */
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.enableZoom = true; controls.minDistance = 4.8; controls.maxDistance = 8.6;
controls.autoRotate = true; controls.autoRotateSpeed = 0.9;
controls.minPolarAngle = Math.PI*0.24; controls.maxPolarAngle = Math.PI*0.76;
controls.target.set(0,0,0);
controls.addEventListener('start', ()=>{ controls.autoRotate = false; });

function resize(){
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  if(!window.__ok){ window.__ok = true; document.title = 'OKRENDER'; }
}
animate();
</script>
</body>
</html>
