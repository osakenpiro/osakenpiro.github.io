<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石の図鑑（仮）— ガラス窓の標本 / プロトタイプ</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#06060a;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic Medium",system-ui,sans-serif;overflow-x:hidden}
  :root{--void:#06060a;--void-deep:#020203;--gold:#d4a853;--gold-edge:rgba(212,168,83,.45);--gold-glow:rgba(212,168,83,.28);--fg-1:#e8e0d0;--fg-2:#b8b0a0;--fg-3:#807868;--serif:"Cormorant Garamond","游明朝体","Yu Mincho","Hiragino Mincho ProN",serif}
  #sky{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;border-radius:50%;background:#e8e0d0;animation:tw 4s ease-in-out infinite}
  .star.g{background:var(--gold)}
  @keyframes tw{0%,100%{opacity:.12}50%{opacity:.75}}
  main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:40px 20px 60px;text-align:center}
  .eyebrow{font-size:.68rem;letter-spacing:.34em;color:var(--fg-3);text-transform:uppercase;margin-bottom:8px}
  .eyebrow b{color:var(--gold)}
  h1{font-family:var(--serif);font-weight:600;font-size:2rem;letter-spacing:.06em;color:var(--fg-1)}
  h1 small{display:block;font-size:.4em;letter-spacing:.2em;color:var(--fg-3);margin-top:8px;font-family:-apple-system,sans-serif;font-weight:400}

  /* ガラス窓の標本フレーム */
  .window{position:relative;max-width:440px;margin:30px auto 0;aspect-ratio:1/1.12;
    border-radius:14px;
    background:
      linear-gradient(145deg,rgba(212,168,83,.10),transparent 42%),
      radial-gradient(circle at 50% 40%,rgba(160,180,210,.05),transparent 60%),
      var(--void-deep);
    border:1px solid var(--gold-edge);
    box-shadow:0 24px 70px rgba(0,0,0,.6), inset 0 0 60px rgba(120,150,200,.05);
    overflow:hidden}
  /* 窓ガラスの内枠(二重枠＝額装) */
  .window::before{content:"";position:absolute;inset:12px;border:1px solid rgba(200,210,230,.12);border-radius:8px;pointer-events:none;z-index:3}
  /* ガラス面の斜め反射ハイライト */
  .window::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;
    background:linear-gradient(118deg,transparent 30%,rgba(220,228,240,.10) 44%,rgba(220,228,240,.02) 50%,transparent 58%)}
  #stage{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2}
  .plate{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:14px 18px 16px;text-align:left;
    background:linear-gradient(0deg,rgba(6,6,10,.86),transparent);}
  .plate .no{font-family:var(--mono,"JetBrains Mono",monospace);font-size:.64rem;letter-spacing:.14em;color:var(--gold)}
  .plate .nm{font-family:var(--serif);font-size:1.15rem;color:var(--fg-1);letter-spacing:.05em;margin-top:2px}
  .plate .sub{font-size:.72rem;color:var(--fg-3);letter-spacing:.06em;margin-top:3px}
  .cap{font-size:.75rem;color:var(--fg-3);letter-spacing:.06em;margin-top:22px;line-height:1.9}
  .cap b{color:var(--gold)}
</style>
</head>
<body>
<div id="sky"></div>
<main>
  <div class="eyebrow">石の図鑑 <b>プロトタイプ</b> · スタイル検討</div>
  <h1>ガラス窓の標本<small>石をガラスに封じて、回して見る</small></h1>

  <div class="window">
    <canvas id="stage"></canvas>
    <div class="plate">
      <div class="no">No.01 · QUARTZ</div>
      <div class="nm">石英（せきえい）</div>
      <div class="sub">SiO₂ ・ 六方晶 ・ モース硬度 7</div>
    </div>
  </div>

  <div class="cap">これは <b>石のクオリティ検討用</b> のプロトタイプ。<br>「ガラスの窓に封じた標本を、回して眺める」方向。<br>石の質感・ガラスの反射・金の額装がこの路線で良ければ、図鑑フォーマットを組む。</div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  "use strict";
  /* 星空 */
  var sky=document.getElementById("sky");
  for(var i=0;i<60;i++){var s=document.createElement("div");s.className="star"+(Math.random()<0.16?" g":"");var z=(Math.random()*1.7+0.5).toFixed(2);s.style.width=z+"px";s.style.height=z+"px";s.style.left=(Math.random()*100).toFixed(2)+"%";s.style.top=(Math.random()*100).toFixed(2)+"%";s.style.animationDelay=(Math.random()*4).toFixed(2)+"s";sky.appendChild(s);}

  var canvas=document.getElementById("stage");
  var wrap=canvas.parentElement;
  var scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x020204,0.09);
  var camera=new THREE.PerspectiveCamera(38,1,0.1,100);
  camera.position.set(0,0.2,6.2);
  camera.lookAt(0,0,0);
  var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.15;
  renderer.outputEncoding=THREE.sRGBEncoding;
  function resize(){var w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}

  /* --- 手続き的スタジオ環境(envMap): 面に周囲が映り込むと結晶が一気に"本物"になる。
         キャンバスにグラデ＋暖色/白のブライトスポットを描き、PMREMで環境マップ化する。 --- */
  var envTex=(function(){
    var c=document.createElement("canvas");c.width=256;c.height=128;var g=c.getContext("2d");
    var grd=g.createLinearGradient(0,0,0,128);
    grd.addColorStop(0,"#3a3320");grd.addColorStop(0.45,"#12131a");grd.addColorStop(1,"#050507");
    g.fillStyle=grd;g.fillRect(0,0,256,128);
    function blob(x,y,r,col){var rg=g.createRadialGradient(x,y,0,x,y,r);rg.addColorStop(0,col);rg.addColorStop(1,"rgba(0,0,0,0)");g.fillStyle=rg;g.fillRect(0,0,256,128);}
    blob(66,38,58,"rgba(255,232,185,0.95)");   // 金の主光(窓)
    blob(200,28,42,"rgba(255,255,255,0.9)");    // 白の艶
    blob(150,112,52,"rgba(120,150,205,0.5)");   // 冷たい下反射
    var t=new THREE.CanvasTexture(c);t.mapping=THREE.EquirectangularReflectionMapping;return t;
  })();
  var pmrem=new THREE.PMREMGenerator(renderer);
  var envRT=pmrem.fromEquirectangular(envTex);
  scene.environment=envRT.texture;
  envTex.dispose();pmrem.dispose();

  /* ライティング: 金の主光源＋中性フィル＋白リム(ガラスの艶) */
  scene.add(new THREE.AmbientLight(0x30343f,0.7));
  var goldKey=new THREE.PointLight(0xd4a853,1.35,26,2);goldKey.position.set(2.8,3.0,3.6);scene.add(goldKey);
  var coolFill=new THREE.PointLight(0xbcc8dc,0.72,26,2);coolFill.position.set(-3.2,-0.4,2.8);scene.add(coolFill);
  var whiteRim=new THREE.PointLight(0xffffff,0.95,24,2);whiteRim.position.set(-2.0,2.8,-3.2);scene.add(whiteRim);
  /* 結晶の艶を出す鋭いハイライト光(小範囲・近距離＝面がキラッと光る) */
  var spec=new THREE.PointLight(0xffffff,1.25,6,2);spec.position.set(1.3,1.9,2.5);scene.add(spec);

  var rig=new THREE.Group();scene.add(rig);

  /* --- ガラス板(封入媒体): 半透明＋clearcoatで艶。r128はtransmission非対応なので
         透明opacity＋clearcoat＋白リムで"ガラス"を作る。 --- */
  var glassGeo=new THREE.BoxGeometry(2.7,3.1,0.6);
  var glassMat=new THREE.MeshPhysicalMaterial({
    color:0xb6c2d4, metalness:0.0, roughness:0.03, transparent:true, opacity:0.07,
    clearcoat:1.0, clearcoatRoughness:0.02, ior:1.5, envMapIntensity:1.2, side:THREE.DoubleSide, depthWrite:false
  });
  var glass=new THREE.Mesh(glassGeo,glassMat);
  rig.add(glass);
  /* ガラスの稜線を金で(額の内側の光) */
  var glassEdge=new THREE.LineSegments(new THREE.EdgesGeometry(glassGeo),
    new THREE.LineBasicMaterial({color:0xd4a853,transparent:true,opacity:0.35}));
  rig.add(glassEdge);

  /* --- 石英クリスタル: 六角柱＋両端の六角錐(石英の典型形)。封入体の中心。 --- */
  var crystal=new THREE.Group();
  /* 透き通ったカット結晶: clearcoatで艶、弱emissiveで内側から光が透ける感、低roughnessで面がキラッと */
  var xMat=new THREE.MeshPhysicalMaterial({
    color:0xf0f4fa, metalness:0.0, roughness:0.04, transparent:true, opacity:0.60,
    clearcoat:1.0, clearcoatRoughness:0.02, ior:1.54, reflectivity:0.6,
    envMapIntensity:1.5, emissive:0x0e1626, emissiveIntensity:0.35, flatShading:true
  });
  var prism=new THREE.Mesh(new THREE.CylinderGeometry(0.46,0.46,1.5,6,1),xMat);
  crystal.add(prism);
  var tip1=new THREE.Mesh(new THREE.ConeGeometry(0.46,0.62,6,1),xMat);tip1.position.y=1.06;crystal.add(tip1);
  var tip2=new THREE.Mesh(new THREE.ConeGeometry(0.46,0.62,6,1),xMat);tip2.position.y=-1.06;tip2.rotation.x=Math.PI;crystal.add(tip2);
  /* 寄り添う小結晶(クラスタ感) */
  var small=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.8,6,1),xMat);
  small.position.set(0.5,-0.25,0.15);small.rotation.z=0.5;crystal.add(small);
  var stip=new THREE.Mesh(new THREE.ConeGeometry(0.2,0.3,6,1),xMat);stip.position.set(0.62,0.28,0.15);stip.rotation.z=0.5;crystal.add(stip);
  /* 面の稜線をくっきり(カット結晶＝ゲームアイテムの明快なエッジ) */
  [prism,tip1,tip2,small,stip].forEach(function(m){
    var e=new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),
      new THREE.LineBasicMaterial({color:0xeef4fb,transparent:true,opacity:0.30}));
    e.position.copy(m.position);e.rotation.copy(m.rotation);e.scale.copy(m.scale);crystal.add(e);
  });
  /* 内部の淡い金の滲み(封じ込めた光) */
  var glow=new THREE.Mesh(new THREE.IcosahedronGeometry(0.5,0),new THREE.MeshBasicMaterial({color:0xd4a853,transparent:true,opacity:0.05}));
  crystal.add(glow);
  crystal.rotation.set(0.15,0.4,0.22);
  crystal.position.z=0.02;
  rig.add(crystal);

  /* 回転(慣性ドラッグ＋自動) */
  var rotY=-0.35,rotX=0.02,velY=0,velX=0,drag=false,lx=0,ly=0,spin=true;
  function dn(x,y){drag=true;lx=x;ly=y;spin=false;velY=0;velX=0;}
  function mv(x,y){if(!drag)return;var dx=x-lx,dy=y-ly;velY=dx*0.006;velX=dy*0.004;rotY+=velY;rotX=Math.max(-0.5,Math.min(0.5,rotX+velX));lx=x;ly=y;}
  function up(){drag=false;}
  canvas.addEventListener("mousedown",function(e){dn(e.clientX,e.clientY);});
  window.addEventListener("mousemove",function(e){mv(e.clientX,e.clientY);});
  window.addEventListener("mouseup",up);
  canvas.addEventListener("touchstart",function(e){var t=e.touches[0];dn(t.clientX,t.clientY);},{passive:true});
  canvas.addEventListener("touchmove",function(e){var t=e.touches[0];mv(t.clientX,t.clientY);},{passive:true});
  canvas.addEventListener("touchend",up);

  var clock=new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    if(spin)rotY+=0.003;
    if(!drag){rotY+=velY;velY*=0.94;if(Math.abs(velY)<1e-4)velY=0;rotX+=velX;velX*=0.94;if(Math.abs(velX)<1e-4)velX=0;rotX=Math.max(-0.5,Math.min(0.5,rotX));}
    rig.rotation.y=rotY;rig.rotation.x=rotX;
    /* 結晶だけ僅かに逆回転させて封入体が"浮いてる"感 */
    crystal.rotation.y=0.4-rotY*0.3;
    var t=clock.elapsedTime;
    goldKey.position.set(Math.cos(t*0.3)*3.4,3.0+Math.sin(t*0.24)*0.5,Math.sin(t*0.3)*3.4);
    glow.material.opacity=0.04+Math.sin(t*0.9)*0.02;
    renderer.render(scene,camera);
  }
  window.addEventListener("resize",resize);
  resize();animate();
})();
</script>
</body>
</html>
