<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#08080e;
  --debris:#c8b8a0;
  --gold:#d4a853;
  --dim:#3a3530;
  --glow-gold:rgba(212,168,83,0.3);
}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:var(--void);color:var(--debris);
}

/* === STARFIELD === */
canvas#stars{position:fixed;inset:0;z-index:0}

/* === ORBIT SCENE === */
.scene{
  position:fixed;inset:0;z-index:1;
  display:flex;align-items:center;justify-content:center;
  perspective:800px;
}

/* === CORE (The Emptyfall) === */
.core{
  position:absolute;
  width:150px;height:150px;
  z-index:10;
  cursor:pointer;
}
.core-avatar{
  width:150px;height:150px;
  border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #1f1a28 0%, #0c0c14 70%);
  border:1px solid rgba(200,184,160,0.15);
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 0 40px rgba(212,168,83,0.08),
    0 0 80px rgba(212,168,83,0.03),
    inset 0 0 30px rgba(0,0,0,0.5);
  transition:box-shadow 0.5s, transform 0.3s;
}
.core:hover .core-avatar{
  box-shadow:
    0 0 60px rgba(212,168,83,0.15),
    0 0 120px rgba(212,168,83,0.06),
    inset 0 0 30px rgba(0,0,0,0.5);
  transform:scale(1.05);
}
.core-glyph{
  font-family:'Cormorant Garamond',serif;
  font-size:3.4rem;font-weight:300;font-style:italic;
  color:var(--gold);opacity:0.5;
  animation:breathe 6s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:0.35}50%{opacity:0.7}}

/* Orbit ring visuals */
.orbit-ring{
  position:absolute;
  border:1px solid rgba(200,184,160,0.04);
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

/* === SATELLITES === */
.satellite{
  position:absolute;
  width:64px;height:64px;
  transform:translate(-50%,-50%);
  cursor:pointer;
  z-index:5;
  transition:filter 0.3s;
}
.satellite:hover{filter:brightness(1.3);z-index:20}
.satellite:hover .sat-label{opacity:1;transform:translateX(-50%) translateY(0)}
.satellite:hover .sat-body{
  box-shadow:0 0 20px var(--glow-gold);
  border-color:rgba(212,168,83,0.4);
}

.sat-body{
  width:64px;height:64px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  border:1px solid rgba(200,184,160,0.12);
  transition:all 0.3s;
  position:relative;
}
/* Natural planets (organic) */
.sat-body.organic{
  background:radial-gradient(circle at 35% 30%, #2a2035 0%, #12111a 80%);
}
/* Artificial satellites (mechanical) */
.sat-body.mechanical{
  background:radial-gradient(circle at 35% 30%, #1a2025 0%, #0e1118 80%);
  border-style:dashed;
  border-color:rgba(140,160,180,0.2);
}
/* Moon — larger, lunar glow */
.sat-body.moon{
  width:90px;height:90px;font-size:0;
  background:radial-gradient(circle at 35% 35%,#e8e8e0,#b0b0a8 40%,#808078 70%,#58584f);
  box-shadow:0 0 30px rgba(200,200,180,0.2),0 0 60px rgba(200,200,180,0.08);
  border:none;
}
.sat-body.moon::after{
  content:'🌙';font-size:2.2rem;
}

.sat-label{
  position:absolute;
  top:calc(100% + 6px);left:50%;
  transform:translateX(-50%) translateY(4px);
  white-space:nowrap;
  font-size:0.6rem;
  letter-spacing:0.08em;
  color:var(--debris);
  opacity:0;
  transition:all 0.3s;
  pointer-events:none;
  text-align:center;
  line-height:1.4;
}
.sat-sublabel{
  color:rgba(200,184,160,0.4);
  font-size:0.5rem;
}

/* === INFO PANEL === */
.info-panel{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:100;
  background:linear-gradient(to top, rgba(8,8,14,0.95) 0%, rgba(8,8,14,0.8) 70%, transparent 100%);
  padding:1.5rem 1rem 2rem;
  text-align:center;
  pointer-events:none;
  transition:opacity 0.5s;
}
.info-name{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;font-weight:300;
  letter-spacing:0.15em;
  margin-bottom:0.2rem;
}
.info-tagline{
  font-size:0.65rem;
  letter-spacing:0.25em;
  color:var(--dim);
  text-transform:uppercase;
}
.info-bio{
  font-size:0.72rem;
  color:rgba(200,184,160,0.4);
  margin-top:0.5rem;
  line-height:1.7;
}
.info-footer{
  margin-top:0.8rem;
  font-family:'Cormorant Garamond',serif;
  font-size:0.55rem;
  font-style:italic;
  color:rgba(200,184,160,0.2);
  letter-spacing:0.1em;
}

/* === TOOLTIP on click === */
.tooltip{
  position:fixed;
  z-index:200;
  background:rgba(15,15,22,0.95);
  border:1px solid rgba(200,184,160,0.15);
  border-radius:6px;
  padding:0.8rem 1rem;
  max-width:260px;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s;
  backdrop-filter:blur(10px);
}
.tooltip.active{opacity:1;pointer-events:auto}
.tooltip-title{
  font-size:0.8rem;font-weight:400;
  color:var(--debris);margin-bottom:0.2rem;
}
.tooltip-desc{
  font-size:0.65rem;color:rgba(200,184,160,0.5);
  line-height:1.5;margin-bottom:0.5rem;
}
.tooltip-link{
  display:inline-block;
  font-size:0.65rem;
  color:var(--gold);
  text-decoration:none;
  letter-spacing:0.05em;
  transition:opacity 0.2s;
}
.tooltip-link:hover{opacity:0.7}
.tooltip-close{
  position:absolute;top:0.4rem;right:0.6rem;
  font-size:0.7rem;color:var(--dim);
  cursor:pointer;background:none;border:none;
  padding:0.2rem;
}

/* === SCROLL HINT === */
.scroll-hint{
  position:fixed;bottom:0;left:0;right:0;
  z-index:50;text-align:center;
  padding-bottom:0.5rem;
  pointer-events:none;
}
.scroll-arrow{
  font-size:0.7rem;color:var(--dim);
  animation:bob 2s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* === LIST VIEW (scroll down) === */
.list-view{
  position:fixed;inset:0;z-index:80;
  background:var(--void);
  overflow-y:auto;
  padding:2rem 1rem 4rem;
  opacity:0;pointer-events:none;
  transition:opacity 0.5s;
}
.list-view.active{opacity:1;pointer-events:auto}
.list-back{
  position:sticky;top:0;z-index:90;
  background:linear-gradient(to bottom, var(--void) 60%, transparent);
  padding:0.5rem 0 1.5rem;
  text-align:center;
}
.list-back button{
  background:none;border:1px solid var(--dim);
  color:var(--debris);padding:0.4rem 1.2rem;
  border-radius:20px;font-size:0.7rem;
  letter-spacing:0.1em;cursor:pointer;
  font-family:inherit;
  transition:border-color 0.3s;
}
.list-back button:hover{border-color:var(--gold)}

.list-section{margin-bottom:2rem;max-width:500px;margin-left:auto;margin-right:auto}
.list-section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:0.65rem;letter-spacing:0.3em;
  text-transform:uppercase;color:var(--dim);
  margin-bottom:0.6rem;padding-left:1rem;
}
.list-item{
  display:flex;align-items:center;gap:0.8rem;
  padding:0.7rem 1rem;
  text-decoration:none;color:var(--debris);
  border-bottom:1px solid rgba(200,184,160,0.04);
  transition:background 0.3s;
}
.list-item:hover{background:rgba(255,255,255,0.02)}
.list-item .li-icon{font-size:1rem;width:1.5rem;text-align:center;flex-shrink:0}
.list-item .li-body{flex:1}
.list-item .li-title{font-size:0.8rem}
.list-item .li-desc{font-size:0.6rem;color:rgba(200,184,160,0.35);margin-top:0.1rem}

/* Mobile tweaks */
#bgLabel{
  position:fixed;top:8vh;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,14vw,12rem);font-weight:300;font-style:italic;
  color:rgba(200,184,160,0);white-space:nowrap;pointer-events:none;z-index:3;
  transition:color 0.4s ease,letter-spacing 0.5s ease,text-shadow 0.4s ease;letter-spacing:0.02em;
  text-shadow:0 0 60px rgba(212,168,83,0);
}
#bgLabel.show{
  color:rgba(200,184,160,0.32);letter-spacing:0.08em;
  text-shadow:0 0 60px rgba(212,168,83,0.15), 0 0 200px rgba(212,168,83,0.06);
}
@media(max-width:500px){
  .core{width:110px;height:110px}
  .core-avatar{width:110px;height:110px}
  .core-glyph{font-size:2.2rem}
  .satellite{width:52px;height:52px}
  .sat-body{width:52px;height:52px;font-size:1.1rem}
  .sat-body.moon{width:68px;height:68px}
  .info-name{font-size:1.2rem}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="scene" id="scene">
  <div id="bgLabel"></div>
  <!-- Core -->
  <div class="core" id="core">
    <div class="core-avatar">
      <span class="core-glyph">空</span>
    </div>
  </div>
  <!-- Orbit rings (visual only) -->
  <!-- Satellites injected by JS -->
</div>

<!-- Info Panel -->
<div class="info-panel">
  <div class="info-name">osakenpiro</div>
  <div class="info-tagline">全部がぼく</div>
  <div class="info-bio">哲学 · 漫画 · 小説 · コード · 音楽<br>AI×東アジア哲学 論文8本 · Kindle『パンダと哲学とAI』</div>
  <div class="info-footer">the center is empty; the circulation constitutes existence</div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <button class="tooltip-close" id="tooltip-close">✕</button>
  <div class="tooltip-title" id="tt-title"></div>
  <div class="tooltip-desc" id="tt-desc"></div>
  <a class="tooltip-link" id="tt-link" href="#" target="_blank" rel="noopener">開く →</a>
</div>

<!-- List View -->
<div class="list-view" id="listView"></div>

<script>
// === SATELLITE DATA ===
const SATELLITES = [
  // Inner orbit — 読む (organic planets)
  {id:'note',icon:'📝',title:'note',desc:'エッセイ・連載・地面の言葉',url:'https://note.com/osakenpiro',type:'organic',orbit:1,speed:0.4},
  {id:'panda',icon:'📕',title:'パンダと哲学とAI',desc:'Kindle ¥980 / KU無料 / ペーパーバック ¥1,480',url:'#',type:'organic',orbit:1,speed:0.35},
  {id:'kakuyomu',icon:'📖',title:'星は知らない',desc:'カクヨム — 8編構成SF長編',url:'https://kakuyomu.jp/users/osakenpiro',type:'organic',orbit:1,speed:0.45},
  
  // Middle orbit — 学問 + 月
  {id:'zenodo',icon:'🔬',title:'論文 8本',desc:'Zenodo プレプリント・DOI付き',url:'https://zenodo.org/search?q=metadata.creators.person_or_org.name%3A%22Osada%2C%20Kenshiro%22',type:'mechanical',orbit:2,speed:0.25},
  {id:'moon',icon:'🌙',title:'月',desc:'全ツール一覧 — 可視化・哲学・ユーティリティ',url:'https://osakenpiro.github.io/moon/',type:'moon',orbit:2,speed:0.12},
  {id:'mission',icon:'🛰',title:'Mission Control',desc:'全チャット共有タスクボード',url:'https://www.notion.so/Mission-Control-Claude-3282b7e543e0815db7c0d5afdae9ae76',type:'mechanical',orbit:2,speed:0.22},
  {id:'orcid',icon:'🆔',title:'ORCID',desc:'0009-0004-9167-3186',url:'https://orcid.org/0009-0004-9167-3186',type:'mechanical',orbit:2,speed:0.28},

  // Outer orbit — 観る + 聴く + つながる
  {id:'x',icon:'𝕏',title:'X',desc:'日常哲学 / 論文告知',url:'https://twitter.com/kenpiro7',type:'mechanical',orbit:3,speed:0.18},
  {id:'tiktok',icon:'▶',title:'TikTok',desc:'30秒哲学 / PEACE PIECE',url:'https://www.tiktok.com/@panio54',type:'mechanical',orbit:3,speed:0.22},
  {id:'ig',icon:'◻',title:'Instagram',desc:'Reels / カルーセル',url:'https://www.instagram.com/osakenpiro/',type:'mechanical',orbit:3,speed:0.15},
  {id:'yt',icon:'△',title:'YouTube',desc:'SATORI / 総集編',url:'https://www.youtube.com/channel/UCdvMT7OAZQuWBln8D3GrFBQ',type:'mechanical',orbit:3,speed:0.2},
  {id:'pixiv',icon:'✦',title:'pixiv',desc:'PEACE PIECE まとめ読み',url:'https://www.pixiv.net/users/11085694',type:'organic',orbit:3,speed:0.17},
  {id:'spotify',icon:'♪',title:'Spotify',desc:'オリジナル作詞',url:'https://open.spotify.com/intl-ja/artist/6QtgEcJeDSxhatNDzxGm8v',type:'mechanical',orbit:3,speed:0.23},
  {id:'booth',icon:'🏪',title:'BOOTH',desc:'アイコン・素材',url:'https://osakenpiro.booth.pm/',type:'mechanical',orbit:3,speed:0.19},
];

// Orbit radii
const isMobile = window.innerWidth < 500;
const RADII = isMobile ? [100, 170, 250] : [160, 260, 370];
const TILT = 0.35; // orbital tilt (0 = flat, 1 = edge-on)

// === STARFIELD ===
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let starList = [];

function initStars(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  starList = [];
  for(let i=0;i<120;i++){
    starList.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*1.2+0.3,
      phase:Math.random()*Math.PI*2,
      speed:0.3+Math.random()*0.8
    });
  }
}

function drawStars(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const s of starList){
    const a = 0.15 + 0.35 * Math.sin(s.phase + t*0.001*s.speed);
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,190,170,${a})`;
    ctx.fill();
  }
}

// === CREATE SATELLITE ELEMENTS ===
const scene = document.getElementById('scene');
const satEls = [];

// Orbit rings
for(let i=0;i<3;i++){
  const ring = document.createElement('div');
  ring.className='orbit-ring';
  const r = RADII[i];
  ring.style.width = r*2+'px';
  ring.style.height = r*2*TILT+'px';
  scene.appendChild(ring);
}

// Satellite elements
SATELLITES.forEach((sat,i) => {
  const el = document.createElement('div');
  el.className='satellite';
  el.dataset.idx = i;
  el.innerHTML = `
    <div class="sat-body ${sat.type}">
      <span>${sat.icon}</span>
    </div>
    <div class="sat-label">
      ${sat.title}
      <div class="sat-sublabel">${sat.type==='organic'?'●':sat.type==='moon'?'☽':'◆'}</div>
    </div>
  `;
  scene.appendChild(el);
  satEls.push(el);

  // Click handler
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    showTooltip(sat, el);
  });
  // Hover: show big background label + constellation
  el.addEventListener('mouseenter', () => {
    const bgLabel = document.getElementById('bgLabel');
    bgLabel.textContent = sat.title;
    bgLabel.classList.add('show');
    showConstellation(sat.title);
  });
  el.addEventListener('mouseleave', () => {
    const bgLabel = document.getElementById('bgLabel');
    bgLabel.classList.remove('show');
    hideConstellation();
  });
});

// Evenly distribute initial angles per orbit
const orbitCounts = [0,0,0];
const orbitAngles = SATELLITES.map(s => {
  const oi = s.orbit - 1;
  const count = SATELLITES.filter(x=>x.orbit===s.orbit).length;
  const idx = orbitCounts[oi]++;
  return (idx / count) * Math.PI * 2;
});

// === ANIMATION LOOP ===
let time = 0;
let paused = false;

function animate(ts){
  if(!paused) time = ts;
  drawStars(time);

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2 - 30;

  SATELLITES.forEach((sat, i) => {
    const r = RADII[sat.orbit - 1];
    const angle = orbitAngles[i] + time * 0.001 * sat.speed * 0.3;
    
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r * TILT;
    const z = Math.sin(angle); // -1 to 1, for depth

    const el = satEls[i];
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    
    // Depth: scale and opacity
    const scale = 0.7 + 0.3 * (z + 1) / 2; // 0.7 to 1.0
    const opacity = 0.5 + 0.5 * (z + 1) / 2; // 0.5 to 1.0
    el.style.transform = `translate(-50%,-50%) scale(${scale})`;
    el.style.opacity = opacity;
    el.style.zIndex = Math.round(z * 10) + 10;
  });

  requestAnimationFrame(animate);
}

// === TOOLTIP ===
const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttDesc = document.getElementById('tt-desc');
const ttLink = document.getElementById('tt-link');

function showTooltip(sat, el){
  ttTitle.textContent = sat.title;
  ttDesc.textContent = sat.desc;
  ttLink.href = sat.url;
  
  const rect = el.getBoundingClientRect();
  let tx = rect.left + rect.width/2;
  let ty = rect.top - 10;
  
  // Position above satellite, clamped to viewport
  tooltip.style.left = Math.min(Math.max(tx - 130, 10), window.innerWidth - 270) + 'px';
  tooltip.style.top = Math.max(ty - 120, 10) + 'px';
  
  tooltip.classList.add('active');
}

document.getElementById('tooltip-close').addEventListener('click', () => {
  tooltip.classList.remove('active');
});

document.addEventListener('click', (e) => {
  if(!e.target.closest('.satellite') && !e.target.closest('.tooltip')){
    tooltip.classList.remove('active');
  }
});

// === CORE CLICK → LIST VIEW ===
const core = document.getElementById('core');
const listView = document.getElementById('listView');

function buildListView(){
  const sections = {
    '読む — Read': SATELLITES.filter(s=>['note','panda','kakuyomu'].includes(s.id)),
    '論文 — Papers': SATELLITES.filter(s=>['zenodo','orcid'].includes(s.id)),
    '観る — Watch': SATELLITES.filter(s=>['tiktok','ig','yt','pixiv'].includes(s.id)),
    '触る — Interact': SATELLITES.filter(s=>['satori','tools','materials','booth'].includes(s.id)),
    '聴く — Listen': SATELLITES.filter(s=>['spotify'].includes(s.id)),
    'つながる — Connect': SATELLITES.filter(s=>['x'].includes(s.id)),
  };

  let html = `<div class="list-back"><button id="listBack">⟵ 惑星に戻る</button></div>`;
  
  for(const[title, items] of Object.entries(sections)){
    if(!items.length) continue;
    html += `<div class="list-section"><div class="list-section-title">${title}</div>`;
    for(const s of items){
      html += `<a class="list-item" href="${s.url}" target="_blank" rel="noopener">
        <span class="li-icon">${s.icon}</span>
        <div class="li-body">
          <div class="li-title">${s.title}</div>
          <div class="li-desc">${s.desc}</div>
        </div>
      </a>`;
    }
    html += `</div>`;
  }
  
  html += `<div style="text-align:center;padding:2rem 0;font-size:0.55rem;color:var(--dim);font-style:italic;font-family:'Cormorant Garamond',serif">
    the center is empty; the circulation constitutes existence
    <br><a href="mailto:kenpikenpi64@gmail.com" style="color:var(--dim);text-decoration:none">contact</a>
  </div>`;
  
  listView.innerHTML = html;
  
  document.getElementById('listBack').addEventListener('click', () => {
    listView.classList.remove('active');
  });
}

core.addEventListener('click', () => {
  buildListView();
  listView.classList.add('active');
});

// === CONSTELLATION EFFECT (SVG-based — no DPR issues) ===
let constellationEl = null;
let constellationStars = [];
let constellationFadeTimer = null;

function seededRandom(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return function() { h = (h * 16807 + 0) % 2147483647; return (h & 0x7fffffff) / 2147483647; };
}

function generateStars(title) {
  const rand = seededRandom(title);
  const w = window.innerWidth;
  const h = window.innerHeight;
  const stars = [];
  const count = 25 + Math.floor(rand() * 10);

  const cx = w * 0.5;
  const cy = h * 0.13;
  const spreadX = w * 0.4;
  const spreadY = h * 0.12;

  for (let i = 0; i < count; i++) {
    stars.push({
      x: cx + (rand() - 0.5) * spreadX * 2,
      y: cy + (rand() - 0.5) * spreadY * 2,
      r: 1.2 + rand() * 1.3,
      brightness: 0.5 + rand() * 0.5,
      phase: rand() * Math.PI * 2,
    });
  }
  stars.sort((a, b) => a.x - b.x);
  return stars;
}

function buildConstellationSVG(stars) {
  const w = window.innerWidth;
  const h = window.innerHeight;
  let lines = '';
  let dots = '';
  const maxDist = 200;

  // Chain: connect sorted neighbors
  for (let i = 0; i < stars.length - 1; i++) {
    const s1 = stars[i], s2 = stars[i+1];
    const dist = Math.hypot(s1.x-s2.x, s1.y-s2.y);
    if (dist < maxDist * 1.3) {
      const a = Math.max(0.05, (1 - dist/(maxDist*1.3)) * 0.3);
      lines += `<line x1="${s1.x}" y1="${s1.y}" x2="${s2.x}" y2="${s2.y}" stroke="rgba(200,184,160,${a})" stroke-width="0.7"/>`;
    }
  }
  // Proximity: skip-1 connections for web density
  for (let i = 0; i < stars.length; i++) {
    for (let j = i+2; j < Math.min(i+5, stars.length); j++) {
      const s1 = stars[i], s2 = stars[j];
      const dist = Math.hypot(s1.x-s2.x, s1.y-s2.y);
      if (dist < maxDist) {
        const a = (1 - dist/maxDist) * 0.2;
        lines += `<line x1="${s1.x}" y1="${s1.y}" x2="${s2.x}" y2="${s2.y}" stroke="rgba(200,184,160,${a})" stroke-width="0.5"/>`;
      }
    }
  }
  // Star dots with glow
  stars.forEach(s => {
    dots += `<circle cx="${s.x}" cy="${s.y}" r="${s.r*3}" fill="rgba(212,168,83,${s.brightness*0.15})" class="c-glow"/>`;
    dots += `<circle cx="${s.x}" cy="${s.y}" r="${s.r}" fill="rgba(230,210,180,${s.brightness*0.8})" class="c-star"/>`;
  });

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="position:fixed;top:0;left:0;pointer-events:none;z-index:2;">${lines}${dots}</svg>`;
}

function showConstellation(title) {
  hideConstellation();
  constellationStars = generateStars(title);
  const el = document.createElement('div');
  el.id = 'constellationWrap';
  el.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:0;transition:opacity 0.4s ease;';
  el.innerHTML = buildConstellationSVG(constellationStars);
  document.body.appendChild(el);
  constellationEl = el;
  requestAnimationFrame(() => { el.style.opacity = '1'; });
}

function hideConstellation() {
  if (constellationEl) {
    constellationEl.style.opacity = '0';
    const old = constellationEl;
    constellationEl = null;
    setTimeout(() => { if (old.parentNode) old.parentNode.removeChild(old); }, 500);
  }
}
