 "章タイトルを動詞（逃げる・選ぶ・忘れる）にするとその章で読者が主体性を感じる。", "出典": "コピーライティング・文芸構成", "媒体": "タイトル", "技法": ["体言止め", "視点ずらし"], "Source": "", "なぜ刺さるか": "動詞そのものをタイトルに置くと、読者がその行為の主語になる。名詞タイトルが観察者を作るのに対し、動詞タイトルは当事者を作る。", "短い引用": "", "概念(Float)": ["Boolean→Float種"], "出典リンク": "", "タイトル・通称": "動詞タイトルの牽引力（行為を先に置く型）"}, {"創作転用": "メンターが主人公に放つ台詞を命令形から問いに変えると、読者が一緒に答えを出す構造になる。", "出典": "修辞法（反語）", "媒体": "名セリフ", "技法": ["語り手の肉声", "落差・反転"], "Source": "", "なぜ刺さるか": "命令より問いの形のほうが聞き手を能動化する。「やれ」はBoolean的命令、「やらないのか」はFloat的自己決断を引き出す。", "短い引用": "それでも君は、やらないのか。", "概念(Float)": ["Boolean→Float種", "反転で効く"], "出典リンク": "", "タイトル・通称": "反語の力「〜ではないか」（問いかけ反語型）"}, {"創作転用": "群衆シーンで主人公の名を一人が呼ぶと、その場の「ざわめき」がゼロに落ちる演出。", "出典": "コピーライティング・心理学", "媒体": "名セリフ", "技法": ["固有名詞", "沈黙・余白"], "Source": "", "なぜ刺さるか": "固有名詞で呼ばれた瞬間、自分だけのための言葉になる。普遍的なメッセージを0/1の「俺への言葉か否か」に変換する固有名詞の力。", "短い引用": "", "概念(Float)": ["二項分解", "Boolean→Float種"], "出典リンク": "", "タイトル・通称": "名前を呼ぶ効果（カクテルパーティ現象応用）"}, {"創作転用": "タイトル＝問いかけ型。読者を「あなた」と名指しして巻き込むタイトル設計の見本。三重がけ命名と相性。", "出典": "吉野源三郎『君たちはどう生きるか」", "媒体": "タイトル", "技法": ["二人称", "沈黙・余白"], "Source": "Clc", "なぜ刺さるか": "タイトルそのものが読者への直接の問い。二人称「君」で距離を一気に詰め、答えを与えず余白で考えさせる。", "短い引用": "", "概念(Float)": ["三重がけ種", "Hopepunk種"], "出典リンク": "https://ja.wikipedia.org/wiki/君たちはどう生きるか", "タイトル・通称": "君たちはどう生きるか（タイトル）"}, {"創作転用": "非人間視点キャラの導入。断定→即否定の二段構えで語り手の性格を一文で見せる。", "出典": "夏目漱石『吾輩は猫である」冲頭文", "媒体": "書き出し", "技法": ["視点ずらし", "落差・反転"], "Source": "Clc", "なぜ刺さるか": "名乗りを「ある」と言い切りながら「名前はまだない」と即座に裏切る落差。猫の一人称という視点設定そのものがフック。", "短い引用": "「吾輩は猫である。名前はまだない」", "概念(Float)": ["反転で効く"], "出典リンク": "https://ja.wikipedia.org/wiki/吾輩は猫である", "タイトル・通称": "吾輩は猫であるの書き出し"}, {"創作転用": "心拍数・時刻・歩数などを具体値で書くと、読者がその数値を体感する。", "出典": "コピーライティング・文芸技法", "媒体": "キャッチコピー", "技法": ["詳細描写", "具体と抽象"], "Source": "", "なぜ刺さるか": "「高い熱」より「37.5度」のほうが信憑性と体感が増す。具体数値は曖昧さをゼロにし、読者に追体験させる。Float的精度がBoolean的「熱あり/なし」に勝る。", "短い引用": "37.5度の涙", "概念(Float)": ["Boolean→Float種"], "出典リンク": "", "タイトル・通称": "数字の一点突破（Specificity効果）"}, {"創作転用": "説明しすぎない描写訓練。表面の7割を削り、残り3割で水面下を示唆する。", "出典": "ヘミングウェイの文体論（氷山説）", "媒体": "タイトル", "技法": ["沈黙・余白", "具体と抽象"], "Source": "Clc", "なぜ刺さるか": "「何を言わないか」で語る手法。重要な事実をあえて伏せ、読者に推論させる。余白が情報量を生む。", "短い引用": "", "概念(Float)": ["Boolean→Float種"], "出典リンク": "https://en.wikipedia.org/wiki/Iceberg_theory", "タイトル・通称": "氷山理論（海面下を語らない）"}, {"創作転用": "三重がけ命名の実装例。「魔女×0.5」「星×知らない」のような衝突を組む。", "出典": "造語・造語タイトルの一般手法（構造のみ）", "媒体": "タイトル", "技法": ["落差・反転", "具体と抽象"], "Source": "Clc", "なぜ刺さるか": "異質な二語をぶつけて新しい意味を生む造語。聴いた瞬間に意味を推測させる為、記憶に強く残る。", "短い引用": "", "概念(Float)": ["三重がけ種"], "出典リンク": "", "タイトル・通称": "異質の二語連結タイトル（造語）"}, {"創作転用": "腐葉土＝歴史の厚みを冒頭で背負わせる型。叙事の重力。", "出典": "平家物語 冒頭（作者未詳・13世紀）", "媒体": "書き出し", "技法": ["リズム・韻", "具体と抽象"], "Source": "種足し 2026-06-03", "なぜ刺さるか": "鐘の“音”から“諸行無常”の抽象へ一息で跳ぶ。冒頭で時間の厚みと滅びの予感を据える。", "短い引用": "祇園精舎の鐘の声、諸行無常の響きあり", "概念(Float)": ["腐葉土種"], "出典リンク": "", "タイトル・通称": "祇園精舎の鐘の声（平家物語 書き出し）"}, {"創作転用": "状況を説明せず「欠落」を提示して読者に埋めさせる冲頭。IMASICAの謎提示に。", "出典": "ミステリ小説一般の冲頭型（構造のみ）", "媒体": "書き出し", "技法": ["沈黙・余白", "視点ずらし"], "Source": "Clc", "なぜ刺さるか": "一文で「記憶喜失」という大設定を提示し、読者を不安と謎に一気に巻き込む。状況説明をしないことで加速する。", "短い引用": "", "概念(Float)": ["三重がけ種"], "出典リンク": "", "タイトル・通称": "記憶喜失型の書き出し（構造）"}, {"創作転用": "IMASICAのシーン転換で「境界を抜ける一文」手法。異世界・別ステージへの入り口に。", "出典": "川端康成『雪国』冲頭文", "媒体": "書き出し", "技法": ["時制操作", "視点ずらし", "体言止め"], "Source": "Clc", "なぜ刺さるか": "トンネルを抜ける一文で読者を物理的に雪国へ「移動」させる。暗黒→白への視覚的落差。主語を置かず読者の視点をそのまま車窓にする。", "短い引用": "「国境の長いトンネルを抜けると雪国であった」", "概念(Float)": ["三重がけ種"], "出典リンク": "https://ja.wikipedia.org/wiki/雪国_(小説)", "タイトル・通称": "雪国の書き出し"}, {"創作転用": "章の冲頭一文を末尾で反復し、意味を反転させる。連載の回収演出に。", "出典": "修辞技法一般（epanalepsis / 首尾煩法）", "媒体": "書き出し", "技法": ["反復", "落差・反転"], "Source": "Clc", "なぜ刺さるか": "同じ語句を冲頭と末尾に配してループを閉じる。状況は変わらないのに意味が反転している余韻を生む。", "短い引用": "", "概念(Float)": ["腐葉土種", "反転で効く"], "出典リンク": "https://en.wikipedia.org/wiki/Epanalepsis", "タイトル・通称": "首尾煩法（冲頭と末尾を揃える）"}];

function axisValues(key){const s=new Set();DATA.forEach(d=>{const v=d[key];if(Array.isArray(v))v.forEach(x=>s.add(x));else if(v)s.add(v);});return [...s].sort();}
function buildAxes(){const host=$("#axes");CONFIG.axes.forEach(([key])=>{const div=document.createElement("div");div.className="axis";div.innerHTML='<span class="lbl">'+key+'</span>';axisValues(key).forEach(v=>{const c=document.createElement("span");c.className="chip";c.textContent=v;c.onclick=()=>{state.sel[key].has(v)?state.sel[key].delete(v):state.sel[key].add(v);c.classList.toggle("on");render();};div.appendChild(c);});host.appendChild(div);});}
function match(d){const q=state.q.trim().toLowerCase();if(q){const blob=Object.values(d).flat().join(" ").toLowerCase();if(!blob.includes(q))return false;}

function card(d,i){const tags=[];CONFIG.axes.forEach(([key])=>{const v=d[key];(Array.isArray(v)?v:v?[v]:[]).forEach(x=>tags.push(x));});

h+='<div class="tags">'+tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div></div>';return h;}
let view=[];
function render(){view=DATA.filter(match);$("#list").innerHTML=view.map((d,i)=>card(d,i)).join("");$("#count").textContent=view.length+" / "+DATA.length+" 件";
document.querySelectorAll(".copy").forEach(b=>b.onclick=e=>{const i=+e.target.closest(".card").dataset.i;navigator.clipboard.writeText(copyText(view[i]));e.target.textContent="✓";setTimeout(()=>e.target.textContent="写",900);});}
$("#q").addEventListener("input",e=>{state.q=e.target.value;render();});
$("#rand").onclick=()=>{if(!view.length)return;const i=Math.floor(Math.random()*view.length);const el=document.querySelectorAll(".card")[i];el.scrollIntoView({behavior:"smooth",block:"center"});el.classList.add("flash");setTimeout(()=>el.classList.remove("flash"),1600);};
$("#clear").onclick=()=>{state.q="";$("#q").value="";Object.values(state.sel).forEach(s=>s.clear());document.querySelectorAll(".chip.on").forEach(c=>c.classList.remove("on"));render();};
$("#meta").textContent=DATA.length+"件 ／ 最終同期 "+CONFIG.synced;
buildAxes();render();
</script>
</body>
</html>
