name: Orb Countdown Sync

on:
  schedule:
    # 毎朝 7:05 JST = 22:05 UTC (前日)。mood-sync(22:00)の直後＝PostBoy cron相乗り
    - cron: '5 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: orb-countdown-sync
  cancel-in-progress: false

jobs:
  countdown:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Recompute countdown
        run: |
          python projects/orb/widget/update_countdown.py

      - name: Commit countdown if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet projects/orb/widget/countdown.md 2>/dev/null; then
            git add projects/orb/widget/countdown.md
            git commit -m "chore(orb): auto-update countdown 残日数 [skip ci]"
            git push origin main
          else
            echo "No countdown changes"
          fi
