<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shukan — Float Habit Tracker</title>
<style>
  /* ── osakenpiro design system inline ── */
  :root {
    --osk-void:       #0a0a0f;
    --osk-void-deep:  #06060a;
    --osk-surface:    #15141a;
    --osk-surface-hi: #1c1a23;
    --osk-gold:       #d4a853;
    --osk-parchment:  #c8b8a0;
    --osk-violet:     #a78bfa;
    --osk-debris-1:   #6b6b80;
    --osk-debris-2:   #3a3530;
    --osk-fg-1:       #e8e0d0;
    --osk-fg-2:       #b8b0a0;
    --osk-fg-3:       #807868;
    --osk-dim:        #5a5448;
    --osk-border:     rgba(200,184,160,0.06);
    --osk-border-h:   rgba(212,168,83,0.20);
    --radius:         8px;
    --radius-lg:      14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--osk-void-deep);
    color: var(--osk-fg-1);
    font-family: "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── stars background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(212,168,83,0.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 34% 72%, rgba(212,168,83,0.12) 0%, transparent 100%),
      radial-gradient(1px 1px at 58% 31%, rgba(200,184,160,0.10) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 55%, rgba(212,168,83,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 14%, rgba(200,184,160,0.08) 0%, transparent 100%),
      radial-gradient(1px 1px at 47% 88%, rgba(212,168,83,0.10) 0%, transparent 100%),
      radial-gradient(1px 1px at 23% 45%, rgba(200,184,160,0.07) 0%, transparent 100%),
      radial-gradient(1px 1px at 66% 92%, rgba(212,168,83,0.09) 0%, transparent 100%);
    pointer-events: none;
  }

  /* ── layout ── */
  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px; }

  /* ── header ── */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--osk-border);
    margin-bottom: 32px;
  }
  header h1 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: 2.6rem;
    letter-spacing: 0.08em;
    color: var(--osk-gold);
  }
  header .sub {
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--osk-fg-3);
    margin-top: 6px;
  }

  /* ── nav tabs ── */
  .tabs {
    display: flex; gap: 4px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--osk-border);
    padding-bottom: 0;
  }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    color: var(--osk-fg-3);
    font-size: 0.82rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 10px 18px;
    border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
  }
  .tab-btn.active { color: var(--osk-gold); border-bottom-color: var(--osk-gold); }
  .tab-btn:hover { color: var(--osk-parchment); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ── today panel ── */
  .date-label {
    font-size: 0.75rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--osk-fg-3);
    margin-bottom: 20px;
  }

  .habit-card {
    background: var(--osk-surface);
    border: 1px solid var(--osk-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: border-color .2s;
  }
  .habit-card:hover { border-color: var(--osk-border-h); }

  .habit-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  .habit-name {
    font-size: 1rem; color: var(--osk-fg-1);
    font-weight: 500; min-width: 120px;
  }
  .habit-emoji { margin-right: 6px; }

  /* float display */
  .float-val {
    font-family: "JetBrains Mono", "SF Mono", monospace;
    font-size: 1.6rem; font-weight: 700;
    color: var(--osk-gold);
    min-width: 52px; text-align: right;
  }

  /* step buttons */
  .step-btns {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .step-btn {
    background: var(--osk-surface-hi);
    border: 1px solid var(--osk-border);
    border-radius: 6px;
    color: var(--osk-fg-2);
    font-family: "JetBrains Mono", "SF Mono", monospace;
    font-size: 0.82rem;
    padding: 6px 10px; cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .step-btn:hover { background: var(--osk-debris-2); color: var(--osk-parchment); border-color: var(--osk-border-h); }
  .step-btn.selected {
    background: var(--osk-gold);
    color: var(--osk-void-deep);
    border-color: var(--osk-gold);
    font-weight: 700;
  }

  /* slider */
  .float-slider-wrap {
    display: flex; align-items: center; gap: 10px; flex: 1; min-width: 160px;
  }
  .float-slider {
    -webkit-appearance: none; appearance: none;
    flex: 1; height: 4px;
    border-radius: 2px;
    background: linear-gradient(
      to right,
      var(--osk-gold) 0%,
      var(--osk-gold) var(--pct, 0%),
      var(--osk-surface-hi) var(--pct, 0%),
      var(--osk-surface-hi) 100%
    );
    outline: none; cursor: pointer;
  }
  .float-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--osk-gold);
    border: 2px solid var(--osk-void);
  }
  .float-slider::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--osk-gold); border: 2px solid var(--osk-void);
  }

  .slider-label {
    font-size: 0.7rem; color: var(--osk-fg-3);
    text-align: center; min-width: 28px;
  }

  /* today summary bar */
  .today-summary {
    background: var(--osk-surface);
    border: 1px solid var(--osk-border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-top: 20px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .today-summary .lbl { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--osk-fg-3); }
  .today-summary .val { font-size: 1.3rem; font-family: "JetBrains Mono","SF Mono",monospace; color: var(--osk-gold); font-weight:700; }
  .today-summary .sep { width:1px; height:32px; background: var(--osk-border); }

  /* ── heatmap panel ── */
  .heatmap-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; flex-wrap: wrap; gap: 8px;
  }
  .habit-select {
    background: var(--osk-surface-hi); color: var(--osk-fg-1);
    border: 1px solid var(--osk-border); border-radius: var(--radius);
    padding: 7px 12px; font-size: 0.85rem; cursor: pointer;
  }
  .habit-select:focus { outline: none; border-color: var(--osk-border-h); }

  .month-nav { display:flex; gap:8px; align-items:center; }
  .month-nav button {
    background: var(--osk-surface-hi); border: 1px solid var(--osk-border);
    border-radius: 6px; color: var(--osk-fg-2); padding: 5px 10px;
    cursor: pointer; font-size: 0.9rem;
  }
  .month-nav button:hover { border-color: var(--osk-border-h); color: var(--osk-gold); }
  .month-label { font-size: 0.85rem; color: var(--osk-fg-2); letter-spacing: 0.1em; min-width: 90px; text-align:center; }

  /* calendar grid */
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-dow {
    font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--osk-dim); text-align: center; padding: 4px 0 8px;
  }
  .cal-cell {
    aspect-ratio: 1; border-radius: 5px;
    position: relative; cursor: default;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; color: var(--osk-fg-3);
    transition: transform .1s;
  }
  .cal-cell:hover .cal-tooltip { display: block; }
  .cal-cell.empty { background: transparent; }
  .cal-cell.future { background: var(--osk-surface); opacity: 0.3; }
  .cal-cell.no-data { background: var(--osk-surface); }

  /* tooltip */
  .cal-tooltip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--osk-surface-hi); border: 1px solid var(--osk-border-h);
    border-radius: 6px; padding: 6px 10px; white-space: nowrap;
    font-size: 0.72rem; color: var(--osk-fg-1); z-index: 10;
    pointer-events: none;
  }

  /* legend */
  .heatmap-legend {
    display: flex; align-items: center; gap: 4px;
    margin-top: 14px; font-size: 0.68rem; color: var(--osk-fg-3);
  }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; }

  /* ── stats panel ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--osk-surface); border: 1px solid var(--osk-border);
    border-radius: var(--radius-lg); padding: 18px 20px;
  }
  .stat-card .sc-name { font-size: 0.82rem; color: var(--osk-fg-3); margin-bottom: 10px; }
  .stat-card .sc-val { font-size: 2rem; font-family: "JetBrains Mono","SF Mono",monospace; color: var(--osk-gold); font-weight: 700; }
  .stat-card .sc-sub { font-size: 0.72rem; color: var(--osk-fg-3); margin-top: 4px; }
  .trend-bar-wrap { margin-top: 8px; height: 4px; background: var(--osk-surface-hi); border-radius: 2px; }
  .trend-bar { height: 4px; border-radius: 2px; background: var(--osk-gold); }

  /* 7-day chart */
  .week-chart {
    display: flex; align-items: flex-end; gap: 5px; height: 60px; margin-top: 8px;
  }
  .wc-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .wc-bar-wrap { flex: 1; width: 100%; background: var(--osk-surface-hi); border-radius: 3px 3px 0 0; position: relative; overflow: hidden; min-height: 4px; }
  .wc-bar { position: absolute; bottom: 0; left: 0; right: 0; background: var(--osk-gold); transition: height .3s; }
  .wc-label { font-size: 0.55rem; color: var(--osk-dim); }

  /* factual summary */
  .summary-box {
    background: var(--osk-surface); border: 1px solid var(--osk-border);
    border-radius: var(--radius-lg); padding: 20px 24px; margin-top: 4px;
  }
  .summary-box h3 {
    font-family: "Cormorant Garamond", Georgia, serif; font-style: italic;
    font-weight: 300; color: var(--osk-gold); font-size: 1.2rem; margin-bottom: 14px;
  }
  .summary-line {
    font-size: 0.85rem; color: var(--osk-fg-2); line-height: 1.7;
    padding: 6px 0; border-bottom: 1px solid var(--osk-border);
  }
  .summary-line:last-child { border-bottom: none; }
  .summary-line .hl { color: var(--osk-parchment); font-family: "JetBrains Mono","SF Mono",monospace; }

  /* ── manage panel ── */
  .manage-list { margin-bottom: 24px; }
  .manage-item {
    background: var(--osk-surface); border: 1px solid var(--osk-border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }
  .manage-item .mi-drag { color: var(--osk-dim); cursor: grab; font-size: 1rem; }
  .manage-item .mi-name { flex: 1; font-size: 0.92rem; color: var(--osk-fg-1); }
  .manage-item .mi-emoji { font-size: 1.1rem; }
  .manage-item .mi-del {
    background: none; border: 1px solid rgba(167,139,250,0.25); border-radius:5px;
    color: var(--osk-violet); padding: 4px 10px; cursor: pointer; font-size:0.75rem;
  }
  .manage-item .mi-del:hover { background: rgba(167,139,250,0.12); }

  .add-form {
    background: var(--osk-surface); border: 1px solid var(--osk-border);
    border-radius: var(--radius-lg); padding: 20px 22px;
  }
  .add-form h3 { font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--osk-fg-3); margin-bottom: 14px; }
  .add-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .add-row input, .add-row select {
    background: var(--osk-void); color: var(--osk-fg-1);
    border: 1px solid var(--osk-border); border-radius: var(--radius);
    padding: 9px 12px; font-size: 0.88rem;
  }
  .add-row input:focus, .add-row select:focus { outline: none; border-color: var(--osk-border-h); }
  .add-row input.name-inp { flex: 1; min-width: 160px; }
  .add-row input.emoji-inp { width: 60px; text-align: center; }
  .add-btn {
    background: var(--osk-gold); color: var(--osk-void-deep); border: none;
    border-radius: var(--radius); padding: 9px 20px; font-weight: 700; cursor: pointer;
    font-size: 0.88rem; white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.88; }

  .input-mode-toggle {
    display: flex; gap: 4px; margin-bottom: 4px;
  }
  .imt-btn {
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--osk-surface-hi); border: 1px solid var(--osk-border);
    border-radius: 5px; color: var(--osk-fg-3); padding: 4px 10px; cursor: pointer;
  }
  .imt-btn.active { background: var(--osk-debris-2); color: var(--osk-parchment); border-color: var(--osk-border-h); }

  /* ── util ── */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--osk-fg-3); font-size: 0.9rem; }
  .empty-state .eso { font-size: 2rem; margin-bottom: 10px; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.9rem; }
    .step-btns { gap: 4px; }
    .step-btn { padding: 5px 7px; font-size: 0.75rem; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">

  <header>
    <h1>Shukan</h1>
    <div class="sub">Float Habit Tracker &nbsp;·&nbsp; Boolean → Float</div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="today">今日</button>
    <button class="tab-btn" data-tab="heatmap">ヒートマップ</button>
    <button class="tab-btn" data-tab="stats">統計</button>
    <button class="tab-btn" data-tab="manage">習慣管理</button>
  </nav>

  <!-- TODAY -->
  <section class="panel active" id="panel-today">
    <div class="date-label" id="today-label"></div>
    <div id="today-list"></div>
    <div class="today-summary" id="today-summary"></div>
  </section>

  <!-- HEATMAP -->
  <section class="panel" id="panel-heatmap">
    <div class="heatmap-header">
      <select class="habit-select" id="heatmap-select"></select>
      <div class="month-nav">
        <button id="prev-month">&#8249;</button>
        <span class="month-label" id="month-label"></span>
        <button id="next-month">&#8250;</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="heatmap-legend" id="heatmap-legend"></div>
  </section>

  <!-- STATS -->
  <section class="panel" id="panel-stats">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="summary-box" id="summary-box"></div>
  </section>

  <!-- MANAGE -->
  <section class="panel" id="panel-manage">
    <div class="manage-list" id="manage-list"></div>
    <div class="add-form">
      <h3>習慣を追加</h3>
      <div class="input-mode-toggle">
        <button class="imt-btn active" id="mode-steps">ステップ (0/0.25/…)</button>
        <button class="imt-btn" id="mode-slider">スライダー</button>
      </div>
      <div class="add-row">
        <input class="name-inp" id="new-name" type="text" placeholder="習慣名（例：ウォーキング）" maxlength="40">
        <input class="emoji-inp" id="new-emoji" type="text" placeholder="🚶" maxlength="4">
        <button class="add-btn" id="add-habit-btn">追加</button>
      </div>
    </div>
  </section>

</div><!-- .app -->

<script>
/* ── State ── */
const LS_KEY = 'shukan_v1';
const STEPS = [0, 0.25, 0.5, 0.75, 1.0];
const DOW_LABELS = ['日','月','火','水','木','金','土'];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { habits: [], logs: {} };
}

function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

let state = loadState();

// seed defaults if empty
if (!state.habits || state.habits.length === 0) {
  state.habits = [
    { id: 'h1', name: 'サプリ', emoji: '💊', mode: 'steps' },
    { id: 'h2', name: 'ウォーキング', emoji: '🚶', mode: 'steps' },
    { id: 'h3', name: 'カフェイン断ち', emoji: '☕', mode: 'steps' },
    { id: 'h4', name: 'アルコール断ち', emoji: '🍺', mode: 'steps' },
  ];
  saveState();
}

/* ── Helpers ── */
function fmtFloat(v) {
  if (v === null || v === undefined) return '—';
  return v.toFixed(2);
}

function floatToColor(v) {
  if (v === null || v === undefined) return 'var(--osk-surface)';
  // void-deep → gold gradient
  const r1=10, g1=10, b1=15;   // void-deep
  const r2=212,g2=168,b2=83;  // gold
  const r = Math.round(r1 + (r2-r1)*v);
  const g = Math.round(g1 + (g2-g1)*v);
  const b = Math.round(b1 + (b2-b1)*v);
  const a = 0.25 + v * 0.55;
  return `rgba(${r},${g},${b},${a})`;
}

function getLog(habitId, dateStr) {
  return (state.logs[dateStr] && state.logs[dateStr][habitId] !== undefined)
    ? state.logs[dateStr][habitId] : null;
}

function setLog(habitId, dateStr, val) {
  if (!state.logs[dateStr]) state.logs[dateStr] = {};
  state.logs[dateStr][habitId] = val;
  saveState();
}

function genId() {
  return 'h' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

/* ── Weekly moving average ── */
function weeklyAvg(habitId, endDateStr, days = 7) {
  const end = new Date(endDateStr);
  const vals = [];
  for (let i = 0; i < days; i++) {
    const d = new Date(end); d.setDate(d.getDate() - i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const v = getLog(habitId, ds);
    if (v !== null) vals.push(v);
  }
  if (!vals.length) return null;
  return vals.reduce((a,b) => a+b, 0) / vals.length;
}

/* ── TODAY panel ── */
let inputMode = 'steps'; // global for new habits; per-habit stored in state

function renderToday() {
  const today = todayStr();
  const d = new Date();
  const opts = { year:'numeric', month:'long', day:'numeric', weekday:'short' };
  document.getElementById('today-label').textContent = d.toLocaleDateString('ja-JP', opts);

  const list = document.getElementById('today-list');
  list.innerHTML = '';

  if (state.habits.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="eso">＋</div>「習慣管理」タブから習慣を追加してください。</div>';
    document.getElementById('today-summary').innerHTML = '';
    return;
  }

  state.habits.forEach(h => {
    const val = getLog(h.id, today);
    const mode = h.mode || 'steps';
    const card = document.createElement('div');
    card.className = 'habit-card';

    const row = document.createElement('div');
    row.className = 'habit-row';

    const nameEl = document.createElement('div');
    nameEl.className = 'habit-name';
    nameEl.innerHTML = `<span class="habit-emoji">${h.emoji||'◆'}</span>${h.name}`;

    const valEl = document.createElement('div');
    valEl.className = 'float-val';
    valEl.textContent = val !== null ? val.toFixed(2) : '—';

    if (mode === 'steps') {
      const btns = document.createElement('div');
      btns.className = 'step-btns';
      STEPS.forEach(s => {
        const b = document.createElement('button');
        b.className = 'step-btn' + (val === s ? ' selected' : '');
        b.textContent = s.toFixed(2);
        b.onclick = () => {
          setLog(h.id, today, s);
          renderToday();
        };
        btns.appendChild(b);
      });
      row.appendChild(nameEl);
      row.appendChild(btns);
      row.appendChild(valEl);
    } else {
      const wrap = document.createElement('div');
      wrap.className = 'float-slider-wrap';
      const minL = document.createElement('span');
      minL.className = 'slider-label'; minL.textContent = '0';
      const slider = document.createElement('input');
      slider.type = 'range'; slider.min = 0; slider.max = 1; slider.step = 0.01;
      slider.className = 'float-slider';
      const pct = ((val !== null ? val : 0) * 100).toFixed(1) + '%';
      slider.style.setProperty('--pct', pct);
      slider.value = val !== null ? val : 0;
      slider.oninput = () => {
        const v = parseFloat(slider.value);
        slider.style.setProperty('--pct', (v*100).toFixed(1)+'%');
        valEl.textContent = v.toFixed(2);
        setLog(h.id, today, v);
      };
      const maxL = document.createElement('span');
      maxL.className = 'slider-label'; maxL.textContent = '1';
      wrap.appendChild(minL); wrap.appendChild(slider); wrap.appendChild(maxL);
      row.appendChild(nameEl);
      row.appendChild(wrap);
      row.appendChild(valEl);
    }

    card.appendChild(row);
    list.appendChild(card);
  });

  // today summary
  const todayLogs = state.habits.map(h => getLog(h.id, today)).filter(v => v !== null);
  const avg = todayLogs.length ? (todayLogs.reduce((a,b)=>a+b,0)/todayLogs.length) : null;
  const filled = todayLogs.length;
  const total = state.habits.length;
  const wa7 = state.habits.length ? (() => {
    const avgs = state.habits.map(h => weeklyAvg(h.id, today, 7)).filter(v=>v!==null);
    return avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : null;
  })() : null;

  const sum = document.getElementById('today-summary');
  sum.innerHTML = `
    <div>
      <div class="lbl">今日の平均</div>
      <div class="val">${avg !== null ? avg.toFixed(2) : '—'}</div>
    </div>
    <div class="sep"></div>
    <div>
      <div class="lbl">入力済</div>
      <div class="val">${filled}/${total}</div>
    </div>
    <div class="sep"></div>
    <div>
      <div class="lbl">7日移動平均</div>
      <div class="val">${wa7 !== null ? wa7.toFixed(2) : '—'}</div>
    </div>
  `;
}

/* ── HEATMAP panel ── */
let hmHabitIdx = 0;
let hmYear = new Date().getFullYear();
let hmMonth = new Date().getMonth(); // 0-based

function renderHeatmap() {
  // select
  const sel = document.getElementById('heatmap-select');
  sel.innerHTML = '';
  state.habits.forEach((h, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `${h.emoji||''} ${h.name}`;
    if (i === hmHabitIdx) o.selected = true;
    sel.appendChild(o);
  });

  const hab = state.habits[hmHabitIdx];
  document.getElementById('month-label').textContent =
    `${hmYear}年${hmMonth+1}月`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  DOW_LABELS.forEach(d => {
    const c = document.createElement('div');
    c.className = 'cal-dow'; c.textContent = d;
    grid.appendChild(c);
  });

  const firstDay = new Date(hmYear, hmMonth, 1).getDay();
  const daysInMonth = new Date(hmYear, hmMonth+1, 0).getDate();
  const todayD = new Date();
  const todayStr_ = todayStr();

  for (let i = 0; i < firstDay; i++) {
    const c = document.createElement('div'); c.className = 'cal-cell empty';
    grid.appendChild(c);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${hmYear}-${String(hmMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cellDate = new Date(hmYear, hmMonth, d);
    const c = document.createElement('div');
    c.className = 'cal-cell';

    const isFuture = cellDate > todayD && ds !== todayStr_;
    if (isFuture) {
      c.classList.add('future');
      c.textContent = d;
    } else {
      const v = hab ? getLog(hab.id, ds) : null;
      if (v === null) {
        c.classList.add('no-data');
        c.style.background = 'var(--osk-surface)';
        c.textContent = d;
      } else {
        c.style.background = floatToColor(v);
        c.textContent = d;
        const tt = document.createElement('div');
        tt.className = 'cal-tooltip';
        tt.textContent = `${hmYear}/${hmMonth+1}/${d}  →  ${v.toFixed(2)}`;
        c.appendChild(tt);
      }
    }
    grid.appendChild(c);
  }

  // legend
  const leg = document.getElementById('heatmap-legend');
  leg.innerHTML = '<span style="margin-right:6px">低</span>';
  [0, 0.25, 0.5, 0.75, 1.0].forEach(v => {
    const b = document.createElement('div');
    b.className = 'legend-box';
    b.style.background = floatToColor(v);
    leg.appendChild(b);
  });
  leg.innerHTML += '<span style="margin-left:6px">高</span>';
}

/* ── STATS panel ── */
function renderStats() {
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  const today = todayStr();

  if (state.habits.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="eso">▲</div>習慣がありません。</div>';
    document.getElementById('summary-box').innerHTML = '';
    return;
  }

  state.habits.forEach(h => {
    const wa7 = weeklyAvg(h.id, today, 7);
    const wa30 = weeklyAvg(h.id, today, 30);

    // 7-day series
    const days7 = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today); d.setDate(d.getDate() - i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const v = getLog(h.id, ds);
      days7.push({ ds, v, label: DOW_LABELS[d.getDay()] });
    }

    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `
      <div class="sc-name">${h.emoji||'◆'} ${h.name}</div>
      <div class="sc-val">${wa7 !== null ? wa7.toFixed(2) : '—'}</div>
      <div class="sc-sub">7日移動平均 &nbsp;·&nbsp; 30日: ${wa30 !== null ? wa30.toFixed(2) : '—'}</div>
      <div class="trend-bar-wrap"><div class="trend-bar" style="width:${wa7 !== null ? (wa7*100).toFixed(1) : 0}%"></div></div>
      <div class="week-chart" id="wc-${h.id}"></div>
    `;
    grid.appendChild(card);

    // fill week chart after insert
    const wcEl = card.querySelector(`#wc-${h.id}`);
    days7.forEach(({v, label}) => {
      const col = document.createElement('div');
      col.className = 'wc-col';
      const bwrap = document.createElement('div'); bwrap.className = 'wc-bar-wrap';
      const bar = document.createElement('div'); bar.className = 'wc-bar';
      bar.style.height = v !== null ? (v*100).toFixed(1)+'%' : '0%';
      if (v === null) bar.style.opacity = '0.2';
      bwrap.appendChild(bar);
      const lbl = document.createElement('div'); lbl.className = 'wc-label'; lbl.textContent = label;
      col.appendChild(bwrap); col.appendChild(lbl);
      wcEl.appendChild(col);
    });
  });

  // factual summary
  const sumBox = document.getElementById('summary-box');
  const lines = [];
  state.habits.forEach(h => {
    const wa7 = weeklyAvg(h.id, today, 7);
    const wa30 = weeklyAvg(h.id, today, 30);
    const todayV = getLog(h.id, today);
    let txt = `${h.emoji||''} ${h.name}`;
    if (wa7 !== null && wa30 !== null) {
      const diff = wa7 - wa30;
      const diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(2);
      txt += `  7日平均 <span class="hl">${wa7.toFixed(2)}</span>  30日比 <span class="hl">${diffStr}</span>`;
    } else if (wa7 !== null) {
      txt += `  7日平均 <span class="hl">${wa7.toFixed(2)}</span>`;
    } else {
      txt += `  データなし`;
    }
    if (todayV !== null) txt += `  ·  今日 <span class="hl">${todayV.toFixed(2)}</span>`;
    lines.push(`<div class="summary-line">${txt}</div>`);
  });

  sumBox.innerHTML = `<h3>事実ベースサマリ</h3>${lines.join('')}`;
}

/* ── MANAGE panel ── */
function renderManage() {
  const list = document.getElementById('manage-list');
  list.innerHTML = '';

  if (state.habits.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="eso">＋</div>まだ習慣がありません。</div>';
  }

  state.habits.forEach((h, i) => {
    const item = document.createElement('div');
    item.className = 'manage-item';
    item.innerHTML = `
      <span class="mi-drag">⠿</span>
      <span class="mi-emoji">${h.emoji||'◆'}</span>
      <span class="mi-name">${h.name} <span style="font-size:0.7rem;color:var(--osk-dim)">[${h.mode||'steps'}]</span></span>
      <button class="mi-del" data-idx="${i}">削除</button>
    `;
    list.appendChild(item);
  });

  list.querySelectorAll('.mi-del').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.idx);
      if (confirm(`「${state.habits[idx].name}」を削除しますか？ 記録データは残ります。`)) {
        state.habits.splice(idx, 1);
        saveState();
        renderManage();
        renderToday();
        renderStats();
        renderHeatmap();
      }
    };
  });
}

/* input mode toggle */
document.getElementById('mode-steps').onclick = () => {
  inputMode = 'steps';
  document.getElementById('mode-steps').classList.add('active');
  document.getElementById('mode-slider').classList.remove('active');
};
document.getElementById('mode-slider').onclick = () => {
  inputMode = 'slider';
  document.getElementById('mode-slider').classList.add('active');
  document.getElementById('mode-steps').classList.remove('active');
};

document.getElementById('add-habit-btn').onclick = () => {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { document.getElementById('new-name').focus(); return; }
  const emoji = document.getElementById('new-emoji').value.trim() || '◆';
  state.habits.push({ id: genId(), name, emoji, mode: inputMode });
  saveState();
  document.getElementById('new-name').value = '';
  document.getElementById('new-emoji').value = '';
  renderManage();
  renderToday();
  renderStats();
  renderHeatmap();
};

/* ── Tabs ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'heatmap') renderHeatmap();
    if (btn.dataset.tab === 'stats') renderStats();
    if (btn.dataset.tab === 'manage') renderManage();
  };
});

/* ── Heatmap nav ── */
document.getElementById('heatmap-select').onchange = e => {
  hmHabitIdx = parseInt(e.target.value);
  renderHeatmap();
};
document.getElementById('prev-month').onclick = () => {
  hmMonth--; if (hmMonth < 0) { hmMonth = 11; hmYear--; }
  renderHeatmap();
};
document.getElementById('next-month').onclick = () => {
  hmMonth++; if (hmMonth > 11) { hmMonth = 0; hmYear++; }
  renderHeatmap();
};

/* ── Init ── */
renderToday();
renderManage();
</script>
</body>
</html>
