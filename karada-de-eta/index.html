<script>
"use strict";
/* 体でえた / KARADA-DE-ETA v2
   実解剖メッシュ(BodyParts3D+Z-Anatomy,467)を青フレネル発光。
   種目→筋群Float発光 ＋ クリックで筋の同定/起始停止/作用。
   分類・座標変換・情報DB は BodyExplorer(MIT) から移植。 */

/* 1. 筋群分類 (classifyMuscleGroup 移植) */
function classifyMuscleGroup(name){
  const n=name.toLowerCase();
  if(n.includes('sternocleidomastoid')||n.includes('platysma')||n.includes('digastric')||n.includes('mylohyoid')||n.includes('sternohyoid')||n.includes('omohyoid')||n.includes('thyrohyoid')||n.includes('stylohyoid')||n.includes('splenius')||n.includes('longus colli')||n.includes('rectus capitis')||n.includes('levator palpebrae')||n.includes('oblique arytenoid')||n.includes('cricothyroid')||n.includes('levator veli')||n.includes('tensor veli')||n.includes('arytenoid')||n.includes('vocal')||n.includes('scalenus')||n.includes('geniohyoid')||n.includes('sternothyroid')||n.includes('longus capitis')||n.includes('crico-arytenoid')||n.includes('cricoarytenoid')||n.includes('thyro-arytenoid')||n.includes('thyroarytenoid')||n.includes('transverse arytenoid')||n.includes('frontalis')||n.includes('orbicularis oculi')||n.includes('orbicularis oris')||n.includes('zygomaticus')||n.includes('levator labii')||n.includes('depressor labii')||n.includes('depressor anguli')||n.includes('risorius')||n.includes('mentalis')||n.includes('procerus')||n.includes('nasalis')||n.includes('corrugator supercilii')||n.includes('temporalis')||n.includes('masseter')||n.includes('pterygoid')) return 'HEAD_NECK';
  if(n.includes('lateral rectus')||n.includes('medial rectus')||n.includes('superior rectus')||n.includes('inferior rectus')||n.includes('superior oblique')||n.includes('inferior oblique')) return 'HEAD_NECK';
  if(n.includes('deltoid')||n.includes('supraspinatus')||n.includes('infraspinatus')||n.includes('subscapularis')||n.includes('teres')||n.includes('levator scapulae')||n.includes('subclavius')) return 'SHOULDER';
  if(n.includes('pectoralis')||n.includes('serratus anterior')) return 'CHEST';
  if(n.includes('trapezius')||n.includes('latissimus')||n.includes('rhomboid')||n.includes('serratus posterior')||n.includes('erector')||n.includes('levatores costarum')||n.includes('iliocostalis')||n.includes('longissimus')||n.includes('spinalis')||n.includes('semispinalis')||n.includes('interspinal')||n.includes('intertransversar')||n.includes('multifidus')||n.includes('rotatores')||n.includes('thoracolumbar fascia')||n.includes('quadratus lumborum')) return 'BACK';
  if(n.includes('biceps brachii')||n.includes('triceps brachii')||(n.includes('brachialis')&&!n.includes('brachioradialis'))||n.includes('coracobrachialis')||n.includes('anconeus')) return 'UPPER_ARM';
  if(n.includes('brachioradialis')||n.includes('pronator')||n.includes('supinator')||n.includes('flexor carpi')||n.includes('extensor carpi')||(n.includes('flexor digitorum')&&!n.includes('foot'))||(n.includes('extensor digitorum')&&!n.includes('longus'))||n.includes('extensor indicis')||n.includes('extensor pollicis')||(n.includes('flexor pollicis')&&n.includes('hand'))||n.includes('abductor pollicis longus')||n.includes('extensor digiti minimi')||n.includes('flexor pollicis longus')||n.includes('palmaris')||(n.includes('interosseous membrane')&&n.includes('forearm'))) return 'FOREARM';
  if((n.includes('of')&&n.includes('hand'))||(n.includes('interossei')&&n.includes('hand'))||(n.includes('lumbricals')&&n.includes('hand'))||n.includes('opponens pollicis')||(n.includes('opponens digiti')&&n.includes('hand'))||n.includes('abductor pollicis brevis')||n.includes('flexor pollicis brevis')||n.includes('adductor pollicis')||(n.includes('retinaculum')&&n.includes('wrist'))||(n.includes('flexor digiti minimi')&&n.includes('hand'))||(n.includes('abductor digiti minimi')&&n.includes('hand'))) return 'HAND';
  if(n.includes('external oblique')||n.includes('internal oblique')||n.includes('rectus abdominis')||n.includes('transversus abdominis')) return 'ABDOMEN';
  if(n.includes('intercostal')||n.includes('diaphragm')||n.includes('transversus thoracis')) return 'TRUNK';
  if(n.includes('gluteus')||n.includes('piriformis')||n.includes('obturator')||n.includes('iliacus')||n.includes('psoas')||n.includes('quadratus femoris')||n.includes('tensor fasciae')||n.includes('gemellus')||n.includes('pectineus')||n.includes('coccygeus')||n.includes('iliococcygeus')||n.includes('pubococcygeus')||n.includes('puborectalis')||n.includes('levator ani')||n.includes('anal sphincter')) return 'HIP';
  if(n.includes('rectus femoris')||n.includes('vastus')||n.includes('biceps femoris')||n.includes('semitendinosus')||n.includes('semimembranosus')||n.includes('sartorius')||n.includes('gracilis')||(n.includes('adductor')&&!n.includes('hallucis')&&!n.includes('pollicis'))||n.includes('iliotibial')) return 'UPPER_LEG';
  if(n.includes('gastrocnemius')||n.includes('soleus')||n.includes('tibialis')||n.includes('fibularis')||n.includes('peroneus')||n.includes('plantaris')||n.includes('popliteus')||n.includes('flexor digitorum longus')||n.includes('flexor hallucis longus')||n.includes('extensor digitorum longus')||n.includes('extensor hallucis')||n.includes('calcaneal tendon')||(n.includes('interosseous membrane')&&n.includes('leg'))) return 'LOWER_LEG';
  if((n.includes('of')&&n.includes('foot'))||(n.includes('lumbrical')&&n.includes('foot'))||(n.includes('interosseous')&&n.includes('foot'))||n.includes('abductor hallucis')||n.includes('adductor hallucis')||n.includes('flexor hallucis brevis')||n.includes('flexor digitorum brevis')||n.includes('flexor accessorius')||n.includes('plantar ligament')||(n.includes('abductor digiti minimi')&&n.includes('foot'))||(n.includes('flexor digiti minimi')&&n.includes('foot'))||(n.includes('opponens digiti minimi')&&n.includes('foot'))) return 'FOOT';
  return null;
}

/* 2. 群メタ */
const GROUPS={HEAD_NECK:{jp:'頭頸部'},SHOULDER:{jp:'肩'},CHEST:{jp:'胸'},BACK:{jp:'背中'},UPPER_ARM:{jp:'上腕'},FOREARM:{jp:'前腕'},ABDOMEN:{jp:'腹'},HIP:{jp:'臀・股'},UPPER_LEG:{jp:'大腿'},LOWER_LEG:{jp:'下腿'},HAND:{jp:'手'},FOOT:{jp:'足'},TRUNK:{jp:'体幹'},OTHER:{jp:'その他'}};
const GROUP_KEYS=Object.keys(GROUPS);

/* 3. 種目→筋群Float */
const EXERCISES={
  chestpress:{jp:'チェストプレス',cue:'胸を張り肩甲骨を寄せて押す。肘は伸ばし切らない。',map:{CHEST:1.0,SHOULDER:0.6,UPPER_ARM:0.55,ABDOMEN:0.2}},
  latpull:{jp:'ラットプルダウン',cue:'鎖骨に引き下ろす。反動を使わず背中で引く。',map:{BACK:1.0,UPPER_ARM:0.6,SHOULDER:0.45,FOREARM:0.35}},
  legpress:{jp:'レッグプレス',cue:'膝はつま先と同じ向き。伸展で押し切らない。',map:{UPPER_LEG:1.0,HIP:0.7,LOWER_LEG:0.4}},
  abdominal:{jp:'アブドミナル',cue:'息を吐きながら丸める。腰を反らせない。',map:{ABDOMEN:1.0,TRUNK:0.5,HIP:0.3}},
  treadmill:{jp:'トレッドミル',cue:'着地は足裏全体。会話できる強度から。',map:{LOWER_LEG:0.85,UPPER_LEG:0.6,HIP:0.45,ABDOMEN:0.25}},
  plank:{jp:'プランク',cue:'頭〜踵を一直線。腰を落とさない。',map:{ABDOMEN:0.9,TRUNK:0.6,HIP:0.4,SHOULDER:0.35}},
  squat:{jp:'スクワット',cue:'股関節から折る。膝を内に入れない。',map:{UPPER_LEG:1.0,HIP:0.8,LOWER_LEG:0.45,ABDOMEN:0.3}},
  pushup:{jp:'腕立て伏せ',cue:'体を板に保つ。肘は45度に開く。',map:{CHEST:0.9,UPPER_ARM:0.6,SHOULDER:0.55,ABDOMEN:0.4}},
  pullup:{jp:'懸垂',cue:'肩を下げてから引く。顎はバーを越える。',map:{BACK:1.0,UPPER_ARM:0.7,SHOULDER:0.5,FOREARM:0.45}}
};

/* 4. 名称整形 / 側 / 情報照会 (BodyExplorer 移植) */
function titleWord(w){return w?w.charAt(0).toUpperCase()+w.slice(1).toLowerCase():w;}
function formatMuscleName(name){
  let c=name.replace(/\s*\(\d+\)\s*$/,'').replace(/_/g,' ').replace(/\s+/g,' ').trim();
  const m=c.match(/^(.+?)\s+(part|head|belly)\s+of\s+(?:(left|right)\s+)?(.+)$/i);
  if(m){const s=m[3]?titleWord(m[3])+' ':'';c=`${s}${m[4]} (${m[1]} ${m[2]})`;}
  const small=new Set(['of','the','and','in','at','to','for','on','by','or']);
  return c.split(' ').map((w,i)=>i>0&&small.has(w.toLowerCase())?w.toLowerCase():titleWord(w)).join(' ');
}
function determineSide(name){const l=name.toLowerCase();return l.includes('left')?'Left':l.includes('right')?'Right':'Center';}
let ANATOMY={};
function getMuscleInfo(meshName){
  const nl=meshName.toLowerCase();
  const stripped=nl.replace(/^(left|right)\s+/,'').replace(/\s+(of\s+)?(left|right)\s+.*$/,'').replace(/\s*\(\d+\)$/,'').trim();
  if(ANATOMY[stripped])return ANATOMY[stripped];
  for(const k in ANATOMY){if(nl.includes(k))return ANATOMY[k];}
  for(const k in ANATOMY){const kw=k.split(' ');if(kw.length>=2&&kw.every(w=>nl.includes(w)))return ANATOMY[k];}
  return null;
}

/* 5. ホログラム shader */
const holoVert=`varying vec3 vN;varying vec3 vV;varying vec3 vW;
void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);vN=normalMatrix*normal;vV=-mv.xyz;vW=(modelMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*mv;}`;
const holoFrag=`precision highp float;uniform float uAct;uniform float uTime;uniform float uGhost;uniform vec3 uBase;uniform vec3 uDark;uniform vec3 uGlow;
varying vec3 vN;varying vec3 vV;varying vec3 vW;
void main(){vec3 N=normalize(vN);vec3 V=normalize(vV);float fres=pow(1.0-abs(dot(N,V)),2.6);float act=max(uGhost,uAct);
float scan=0.85+0.15*sin(vW.y*8.0-uTime*1.6);vec3 body=mix(uDark,uBase,fres)*(0.45+0.35*act);
vec3 glow=uGlow*act*(0.30+0.70*fres)*scan;vec3 col=body+glow;
col+=uGlow*act*act*0.06*(0.5+0.5*sin(uTime*3.0+vW.y*3.0));gl_FragColor=vec4(col,1.0);}`;
function makeHolo(base,glow,ghost){return new THREE.ShaderMaterial({uniforms:{uAct:{value:0},uTime:{value:0},uGhost:{value:ghost==null?0.05:ghost},
  uBase:{value:new THREE.Color(base||0x2e85f2)},uDark:{value:new THREE.Color(0.015,0.05,0.13)},uGlow:{value:new THREE.Color(glow||0x73ebff)}},
  vertexShader:holoVert,fragmentShader:holoFrag,side:THREE.DoubleSide});}

/* 6. 座標変換 (BP3D→Three) */
function transformGeometry(g,c,s){
  const p=g.getAttribute('position');if(p){const a=p.array;for(let i=0;i<a.length;i+=3){const bx=a[i],by=a[i+1],bz=a[i+2];a[i]=(bx-c.x)*s;a[i+1]=(bz-c.z)*s;a[i+2]=-(by-c.y)*s;}p.needsUpdate=true;}
  const nm=g.getAttribute('normal');if(nm){const a=nm.array;for(let i=0;i<a.length;i+=3){const nx=a[i],ny=a[i+1],nz=a[i+2];a[i]=nx;a[i+1]=nz;a[i+2]=-ny;}nm.needsUpdate=true;}
  g.computeBoundingBox();g.computeBoundingSphere();
}

/* 7. scene */
const app=document.getElementById('app');
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x05070d,0.012);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,400);camera.position.set(0,2,46);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;
app.appendChild(renderer.domElement);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.07;controls.minDistance=14;controls.maxDistance=120;controls.target.set(0,1,0);
controls.autoRotate=true;controls.autoRotateSpeed=0.55;

const groupMat={};for(const k of GROUP_KEYS)groupMat[k]=makeHolo();
const defaultMat=makeHolo();
const tendonMat=makeHolo(0x8bb8d9,0xb3d9f2);
const selectMat=makeHolo(0xffb347,0xffd98a,1.0);selectMat.uniforms.uAct.value=1.0;   // 選択ハイライト=金
const boneMat=new THREE.MeshBasicMaterial({color:0xbcd0e6,transparent:true,opacity:0.16,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
const allHolo=[...Object.values(groupMat),defaultMat,tendonMat,selectMat];

const bodyGroup=new THREE.Group();scene.add(bodyGroup);
const skelGroup=new THREE.Group();skelGroup.visible=false;bodyGroup.add(skelGroup);
const muscleMeshes=[];
let anatomyCenter=null,scaleFactor=1,skelLoaded=false,skelLoading=false;

/* particles */
(function(){const N=420,g=new THREE.BufferGeometry(),pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){const r=10+Math.random()*22,a=Math.random()*Math.PI*2;pos[i*3]=Math.cos(a)*r;pos[i*3+1]=(Math.random()-0.5)*40;pos[i*3+2]=Math.sin(a)*r;}
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:0x3fd0ff,size:0.12,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
  const pts=new THREE.Points(g,m);pts.name='dust';scene.add(pts);})();

/* 8. load muscleinfo.json + anatomy.glb */
const loader=new THREE.GLTFLoader();
const loadEl=document.getElementById('load'),loadP=document.getElementById('loadp');
fetch('./muscleinfo.json').then(r=>r.json()).then(j=>{ANATOMY=j;}).catch(()=>{ANATOMY={};});
loader.load('./anatomy.glb',(gltf)=>{
  const root=gltf.scene;const box=new THREE.Box3().setFromObject(root);
  anatomyCenter=box.getCenter(new THREE.Vector3());const size=box.getSize(new THREE.Vector3());scaleFactor=30/size.z;
  let count=0;
  root.traverse((c)=>{
    if(!c.isMesh)return;const name=c.name||('mesh_'+count),nl=name.toLowerCase();
    const isTendon=nl.includes('tendon')||nl.includes('ligament')||nl.includes('retinaculum')||nl.includes('membrane');
    const grp=classifyMuscleGroup(name);
    const geo=c.geometry.clone();transformGeometry(geo,anatomyCenter,scaleFactor);
    const base=isTendon?tendonMat:(grp&&groupMat[grp]?groupMat[grp]:defaultMat);
    const mesh=new THREE.Mesh(geo,base);
    mesh.userData={grp:grp||'OTHER',raw:name,disp:formatMuscleName(name),side:determineSide(name),isTendon,baseMat:base};
    muscleMeshes.push(mesh);bodyGroup.add(mesh);count++;
  });
  bodyGroup.rotation.y=0;bodyGroup.position.y=1;
  console.log('[karada-de-eta] meshes loaded:',count);
  window.__READY__=count;
  loadEl.classList.add('hide');setExercise(null);
},(pr)=>{if(pr&&pr.total>0)loadP.textContent=Math.round(pr.loaded/pr.total*100)+'%';},
(err)=>{console.error('load failed',err);loadP.textContent='LOAD ERROR';window.__READY__=-1;});

/* 9. 種目選択 */
let activeKey=null;
function setExercise(key){
  activeKey=key;const map=key?EXERCISES[key].map:null;
  for(const k of GROUP_KEYS)groupMat[k].uniforms.uAct.value=map&&map[k]?map[k]:0.0;
  const glob=key?0.12:0.0;defaultMat.uniforms.uAct.value=glob;tendonMat.uniforms.uAct.value=glob;
  renderLegend(key);
  document.querySelectorAll('button.ex').forEach(b=>b.classList.toggle('active',b.dataset.k===key));
}
function renderLegend(key){
  const lg=document.getElementById('legend');
  if(!key){lg.classList.remove('show');return;}
  const ex=EXERCISES[key];document.getElementById('lgName').textContent=ex.jp;document.getElementById('lgCue').textContent=ex.cue;
  const es=Object.entries(ex.map).sort((a,b)=>b[1]-a[1]);
  document.getElementById('lgBars').innerHTML=es.map(([g,v])=>`<div class="bar"><span class="nm">${GROUPS[g].jp}</span><span class="track"><span class="fill" style="width:${Math.round(v*100)}%"></span></span><span class="val">${v.toFixed(2)}</span></div>`).join('');
  lg.classList.add('show');
}
function mkBtn(k){const b=document.createElement('button');b.className='ex';b.dataset.k=k;b.textContent=EXERCISES[k].jp;b.onclick=()=>setExercise(activeKey===k?null:k);return b;}
['chestpress','latpull','legpress','abdominal','treadmill'].forEach(k=>document.getElementById('rowGym').appendChild(mkBtn(k)));
['plank','squat','pushup','pullup'].forEach(k=>document.getElementById('rowBody').appendChild(mkBtn(k)));
(function(){const r=document.createElement('button');r.className='ex reset';r.dataset.k='__';r.textContent='ぜんぶ消す';r.onclick=()=>setExercise(null);document.getElementById('rowBody').appendChild(r);})();

/* 10. クリックで筋を同定 */
const ray=new THREE.Raycaster();const ndc=new THREE.Vector2();
let selected=null;
const SIDE_JP={Left:'左',Right:'右',Center:'正中'};
function selectMuscle(mesh){
  if(selected&&selected!==mesh)selected.material=selected.userData.baseMat;
  selected=mesh;mesh.material=selectMat;
  const u=mesh.userData,info=getMuscleInfo(u.raw);
  document.getElementById('ifName').textContent=u.disp;
  document.getElementById('ifSub').textContent=`${GROUPS[u.grp].jp}${u.isTendon?'（腱・靱帯）':''} · ${SIDE_JP[u.side]}`;
  const dl=document.getElementById('ifDl');
  if(info){
    const rows=[['起始',info.origin],['停止',info.insertion],['作用',info.action],['神経',info.innervation],['備考',info.notes]].filter(r=>r[1]);
    dl.innerHTML=rows.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('');
  }else{
    dl.innerHTML='<dt>情報</dt><dd>この構造の詳細DBは未収載。名称と筋群のみ表示。</dd>';
  }
  const q=encodeURIComponent(u.disp.replace(/\s*\(.*\)$/,''));
  document.getElementById('ifLk').innerHTML=`<a href="https://en.wikipedia.org/wiki/Special:Search?search=${q}" target="_blank" rel="noopener">Wikipedia</a><a href="https://www.kenhub.com/en/search?q=${q}" target="_blank" rel="noopener">Kenhub</a>`;
  document.getElementById('info').classList.add('show');
}
function deselect(){if(selected){selected.material=selected.userData.baseMat;selected=null;}document.getElementById('info').classList.remove('show');}
document.getElementById('infoX').onclick=deselect;
let dx=0,dy=0,dt=0;
renderer.domElement.addEventListener('pointerdown',e=>{dx=e.clientX;dy=e.clientY;dt=Date.now();});
renderer.domElement.addEventListener('pointerup',e=>{
  if(Math.hypot(e.clientX-dx,e.clientY-dy)>6||Date.now()-dt>500)return; // ドラッグは無視
  const r=renderer.domElement.getBoundingClientRect();
  ndc.x=((e.clientX-r.left)/r.width)*2-1;ndc.y=-((e.clientY-r.top)/r.height)*2+1;
  ray.setFromCamera(ndc,camera);
  const hits=ray.intersectObjects(muscleMeshes,false);
  if(hits.length){selectMuscle(hits[0].object);}else{deselect();}
});

/* 11. トグル: 骨格 / 回転 */
const btnSkel=document.getElementById('btnSkel'),btnSpin=document.getElementById('btnSpin');
btnSpin.classList.add('on');
btnSpin.onclick=()=>{controls.autoRotate=!controls.autoRotate;btnSpin.classList.toggle('on',controls.autoRotate);};
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);}
btnSkel.onclick=()=>{
  if(skelLoading)return;
  if(skelLoaded){skelGroup.visible=!skelGroup.visible;btnSkel.classList.toggle('on',skelGroup.visible);return;}
  skelLoading=true;toast('骨格を読み込み中…');
  loader.load('./skeleton.glb',(g)=>{
    g.scene.traverse((c)=>{if(!c.isMesh)return;const geo=c.geometry.clone();transformGeometry(geo,anatomyCenter,scaleFactor);
      const b=new THREE.Mesh(geo,boneMat);b.renderOrder=-1;skelGroup.add(b);});
    skelGroup.visible=true;skelLoaded=true;skelLoading=false;btnSkel.classList.add('on');toast('骨格 201本');
  },null,()=>{skelLoading=false;toast('骨格の読込に失敗');});
};

/* 12. animate */
const clock=new THREE.Clock();
function tick(){const t=clock.getElapsedTime();
  for(const m of allHolo)m.uniforms.uTime.value=t;
  bodyGroup.scale.setScalar(1+Math.sin(t*0.9)*0.010);
  const d=scene.getObjectByName('dust');if(d)d.rotation.y=t*0.03;
  controls.update();renderer.render(scene,camera);requestAnimationFrame(tick);}
tick();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
controls.addEventListener('start',()=>{controls.autoRotate=false;btnSpin.classList.remove('on');});
</script>
</body>
</html>
