<meta charset="utf-8"/>

<style>

  header{padding:14px 20px 6px}
  .kick{font-size:10px;letter-spacing:.35em;opacity:.6}
  h1{margin:.1em 0 0;font-size:clamp(20px,4vw,34px);font-family:"Bricolage Grotesque","Shippori Mincho",serif}
  h1 .g{color:var(--gold)}
  .sub{font-size:12px;opacity:.7;margin-top:2px}
  #wrap{position:relative;width:100%;height:74vh;min-height:460px}
  svg{display:block;width:100%;height:100%;touch-action:none}
  .edge{stroke:var(--gold);fill:none}
  .arrow{stroke-linecap:round}
  .nlabel{fill:var(--cream);paint-order:stroke;stroke:var(--void);stroke-width:3px;stroke-linejoin:round;
    pointer-events:none;font-size:10px;opacity:.92}
  /* control panel */
  .panel{position:absolute;backdrop-filter:blur(8px);background:var(--panel);
    border:1px solid var(--gold);border-color:#d4a85340;border-radius:8px;padding:11px 12px}
  #ctl{top:12px;left:12px;width:232px;font-size:12px}
  #ctl .row{display:flex;gap:6px;align-items:center;margin:7px 0}
  .seg{display:flex;border:1px solid #d4a85340;border-radius:6px;overflow:hidden;flex:1}
  .seg button{flex:1;background:none;border:0;color:#f5f0e4aa;padding:5px 0;font:inherit;font-size:11px;cursor:pointer}
  .seg button.on{background:#d4a85320;color:var(--gold)}
  input[type=range]{width:100%;accent-color:var(--gold)}
  .lab{font-size:9px;letter-spacing:.25em;opacity:.55;margin-top:4px}
  .tog{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .chk{width:34px;height:18px;border-radius:9px;border:1px solid #d4a85355;position:relative;cursor:pointer;flex:0 0 auto}
  .chk.on{background:#d4a85322}
  .chk i{position:absolute;top:1px;left:1px;width:14px;height:14px;border-radius:50%;background:#f5f0e480;transition:.15s}
  .chk.on i{left:17px;background:var(--gold)}
  #search{width:100%;background:#0a080799;border:1px solid #d4a85340;border-radius:5px;color:var(--cream);
    padding:5px 7px;font:inherit;font-size:11px}
  #search::placeholder{color:#f5f0e455}
  /* legend */
  #legend{top:12px;right:12px;width:150px;font-size:10px;max-height:74vh;overflow:auto}
  #legend .li{display:flex;align-items:center;gap:6px;margin:2px 0;cursor:pointer;border-radius:4px;padding:1px 3px}
  #legend .li:hover{background:#d4a8531a}
  #legend .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  /* drift top list */
  #top{bottom:12px;right:12px;width:178px;font-size:11px}
  #top .t{font-size:9px;letter-spacing:.2em;opacity:.55;margin-bottom:5px}
  #top .item{display:flex;justify-content:space-between;gap:6px;cursor:pointer;padding:2px 3px;border-radius:4px}
  #top .item:hover{background:#d4a8531a}
  #top .bar{height:3px;background:var(--gold);border-radius:2px;margin-top:1px}
  /* detail */
  #detail{bottom:12px;left:12px;width:300px;display:none}
  #detail .x{float:right;cursor:pointer;opacity:.6;font-size:16px;line-height:1}
  #detail .ttl{font-size:17px;font-weight:700}
  #detail .ly{font-size:9px;letter-spacing:.25em;opacity:.6}
  #detail .desc{font-size:12px;opacity:.88;margin-top:7px;line-height:1.55}
  #detail .met{font-size:11px;margin-top:8px;opacity:.8}
  #detail a{color:var(--gold)}
  footer{padding:8px 20px 14px;font-size:10px;opacity:.5;display:flex;gap:14px;flex-wrap:wrap;justify-content:space-between}
  .hint{font-size:9px;opacity:.5;margin-top:6px;border-top:1px solid #f5f0e418;padding-top:5px}
  @media(max-width:680px){#legend,#top{display:none}#ctl{width:200px}#detail{width:auto;right:12px}}
</style>
</head>

    <div class="lab">ズレ強調しきい値</div>

    <div class="hint">drag背景=移動 / wheel=zoom / click=詳細<br/>矢印 = 主観位置→客観位置（長さ・暖色=ズレ大）</div>
  </div>

  <div class="panel" id="legend"></div>

    <div class="desc" id="ddesc"></div>
    <div class="met" id="dmet"></div>
  </div>
</div>

const LAYER = {
  core:'#d4a853',meta:'#7c6dab',philosophy:'#ff6b6b',state:'#f5f0e4',pillarT:'#5b9eff',
  pillarR:'#4ade80',pillarB:'#f97316',pillarP:'#ec4899',pillarG:'#a855f7',pillarO:'#eab308',
  operation:'#94a3b8',kaizo:'#86efac',tool:'#7dd3fc',game:'#c4b5fd',opaarts:'#fde047',
  paper:'#fb923c',observation:'#22d3ee',compost:'#a16207',asset:'#6b7280'
};
const SVGNS='http://www.w3.org/2000/svg';
const W=1000,H=700,PAD=70;
const $=s=>document.querySelector(s);
const byId={}; DATA.nodes.forEach(n=>byId[n.id]=n);
const ST = JSON.parse(localStorage.getItem('galaxyDrift')||'{}');
let t = ST.t??0, showArrow = ST.showArrow??true, showEdge = ST.showEdge??true, thr = ST.thr??0, sel=null, q='', layerFilter=null;
const save=()=>localStorage.setItem('galaxyDrift',JSON.stringify({t,showArrow,showEdge,thr}));

const map=(p)=>[PAD+p[0]*(W-2*PAD), PAD+p[1]*(H-2*PAD)];
const lerp=(a,b,k)=>a+(b-a)*k;
const pos=(n)=>{const s=map(n.subj),o=map(n.obj);return [lerp(s[0],o[0],t),lerp(s[1],o[1],t)];};
const sizeFor=(l)=> l==='core'?15 : l.startsWith('pillar')?11 : (l==='philosophy'||l==='operation'||l==='kaizo'||l==='state')?8.5 : 6.5;
// 暖色ヒートランプ cream→gold→coral（rainbow回避）
function heat(v){const a=[245,240,228],b=[212,168,83],c=[255,107,107];let r,g,bl;
  if(v<.5){const k=v/.5;r=lerp(a[0],b[0],k);g=lerp(a[1],b[1],k);bl=lerp(a[2],b[2],k);}
  else{const k=(v-.5)/.5;r=lerp(b[0],c[0],k);g=lerp(b[1],c[1],k);bl=lerp(b[2],c[2],k);}
  return `rgb(${r|0},${g|0},${bl|0})`;}

const svg=$('#svg'); svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
// star field
(function(){const g=document.createElementNS(SVGNS,'g');
  for(let i=0;i<160;i++){const c=document.createElementNS(SVGNS,'circle');
    c.setAttribute('cx',Math.random()*W);c.setAttribute('cy',Math.random()*H);
    c.setAttribute('r',Math.random()*1.1+.2);c.setAttribute('fill','#f5f0e4');
    c.setAttribute('opacity',Math.random()*.5+.08);g.appendChild(c);}
  $('#scene').insertBefore(g,$('#gEdges'));})();

const gE=$('#gEdges'),gA=$('#gArrows'),gN=$('#gNodes'),gL=$('#gLabels');
function el(t,a){const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}

const matches=(n)=>{const ok=!q||(n.label.toLowerCase().includes(q)||(n.desc||'').toLowerCase().includes(q)||n.id.toLowerCase().includes(q));return ok&&(!layerFilter||n.layer===layerFilter);};

function build(){
  gE.innerHTML=gA.innerHTML=gN.innerHTML=gL.innerHTML='';
  // edges (手構造)
  DATA.edges.forEach(([s,d])=>{const A=byId[s],B=byId[d];if(!A||!B)return;
    const p=el('path',{class:'edge','stroke-opacity':showEdge?0.16:0,'stroke-width':0.6});
    p.dataset.s=s;p.dataset.d=d;gE.appendChild(p);});
  // arrows subj->obj
  DATA.nodes.forEach(n=>{const p=el('line',{class:'arrow'});p.dataset.id=n.id;gA.appendChild(p);});
  // nodes
  DATA.nodes.forEach(n=>{
    const g=el('g',{}); g.style.cursor='pointer'; g.dataset.id=n.id;
    const r=sizeFor(n.layer);
    g.appendChild(el('circle',{class:'halo',r:r+5,fill:LAYER[n.layer]||'#999','opacity':0.10}));
    g.appendChild(el('circle',{class:'body',r:r,fill:LAYER[n.layer]||'#999',stroke:'#0a0807','stroke-width':1.1}));
    g.addEventListener('click',e=>{e.stopPropagation();select(n.id);});
    gN.appendChild(g);
    const tx=el('text',{class:'nlabel','text-anchor':'middle'});tx.textContent=n.label;tx.dataset.id=n.id;gL.appendChild(tx);
  });
  render();
}
function render(){
  // edges
  [...gE.children].forEach(p=>{const A=byId[p.dataset.s],B=byId[p.dataset.d];
    const a=pos(A),b=pos(B);p.setAttribute('d',`M${a[0]},${a[1]}L${b[0]},${b[1]}`);
    p.setAttribute('stroke-opacity',showEdge?(matches(A)&&matches(B)?0.18:0.04):0);});
  // arrows
  [...gA.children].forEach(l=>{const n=byId[l.dataset.id];const s=map(n.subj),o=map(n.obj);
    const on=showArrow && n.driftN>=thr && matches(n);
    l.setAttribute('x1',s[0]);l.setAttribute('y1',s[1]);l.setAttribute('x2',o[0]);l.setAttribute('y2',o[1]);
    l.setAttribute('stroke',heat(n.driftN));
    l.setAttribute('stroke-width',(0.5+n.driftN*2.6).toFixed(2));
    l.setAttribute('stroke-opacity',on?(0.25+n.driftN*0.6).toFixed(2):0);});
  // nodes + labels
  [...gN.children].forEach(g=>{const n=byId[g.dataset.id];const p=pos(n);
    g.setAttribute('transform',`translate(${p[0]},${p[1]})`);
    const dim = (!matches(n)) || (thr>0 && n.driftN<thr && n.layer!=='core');
    g.style.opacity = sel&&sel!==n.id?0.35:(dim?0.22:1);
    const body=g.querySelector('.body');
    body.setAttribute('stroke', n.driftN>=0.66?heat(n.driftN):'#0a0807');
    body.setAttribute('stroke-width', n.driftN>=0.66?2:1.1);
  });
  [...gL.children].forEach(tx=>{const n=byId[tx.dataset.id];const p=pos(n);
    const big=n.layer==='core'||n.layer.startsWith('pillar');
    const show = big || sel===n.id || (n.driftN>=Math.max(thr,0.55)&&matches(n));
    tx.setAttribute('x',p[0]);tx.setAttribute('y',p[1]+sizeFor(n.layer)+11);
    tx.style.display=show?'':'none';tx.style.opacity=matches(n)?0.92:0.2;});
}
function select(id){sel=id;const n=byId[id];
  $('#detail').style.display='block';
  $('#dly').textContent=n.layerLabel;
  $('#dttl').textContent=n.label;$('#dttl').style.color=LAYER[n.layer];
  $('#ddesc').textContent=n.desc||n.note||'(記述なし)';
  const rank=[...DATA.nodes].sort((a,b)=>b.drift-a.drift).findIndex(x=>x.id===id)+1;
  $('#dmet').innerHTML=`ズレ量 <b>${n.drift.toFixed(3)}</b>（正規化 ${n.driftN.toFixed(2)}） · ズレ順位 <b>${rank}/${DATA.nodes.length}</b><br/>レイヤ: ${n.layerLabel}`;
  render();
}
$('#dx').onclick=()=>{sel=null;$('#detail').style.display='none';render();};
svg.addEventListener('click',()=>{if(sel){sel=null;$('#detail').style.display='none';render();}});

// legend
(function(){const used=[...new Set(DATA.nodes.map(n=>n.layer))];
  const names={core:'核',meta:'メタ',philosophy:'思想',state:'状態',pillarT:'T柱',pillarR:'R柱',pillarB:'B柱',pillarP:'P柱',pillarG:'G柱',pillarO:'O柱',operation:'運用',kaizo:'KAIZO',tool:'Tool',game:'Game',opaarts:'OP編',paper:'論文書籍',observation:'観測',compost:'腐葉土',asset:'資産'};
  $('#legend').innerHTML='<div class="lab" style="margin-bottom:4px">LAYERS</div>'+
    used.map(l=>`<div class="li" data-l="${l}"><span class="dot" style="background:${LAYER[l]}"></span>${names[l]||l}</div>`).join('');
  $('#legend').querySelectorAll('.li').forEach(li=>li.onclick=()=>{
    const l=li.dataset.l; layerFilter = layerFilter===l?null:l;
    $('#legend').querySelectorAll('.li').forEach(x=>x.style.background=x.dataset.l===layerFilter?'#d4a85133':'');
    render();});
})();

// top drift
(function(){const top=[...DATA.nodes].sort((a,b)=>b.drift-a.drift).slice(0,12);
  $('#top').innerHTML='<div class="t">ズレ大 TOP12（再発見候補）</div>'+top.map(n=>
    `<div class="item" data-id="${n.id}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.label}</span><span style="color:${heat(n.driftN)}">${n.drift.toFixed(2)}</span></div><div class="bar" style="width:${(n.driftN*100).toFixed(0)}%;opacity:${0.3+n.driftN*0.7}"></div>`).join('');
  $('#top').querySelectorAll('.item').forEach(it=>it.onclick=()=>select(it.dataset.id));})();

// controls
$('#morph').value=t;
function setT(v){t=+v;$('#morph').value=v;
  document.querySelectorAll('#mode button').forEach(b=>b.classList.toggle('on',+b.dataset.t===t));
  save();render();}
$('#morph').addEventListener('input',e=>setT(e.target.value));
document.querySelectorAll('#mode button').forEach(b=>b.onclick=()=>setT(+b.dataset.t));
$('#tArrow').classList.toggle('on',showArrow);
$('#tEdge').classList.toggle('on',showEdge);
$('#tArrow').onclick=()=>{showArrow=!showArrow;$('#tArrow').classList.toggle('on',showArrow);save();render();};
$('#tEdge').onclick=()=>{showEdge=!showEdge;$('#tEdge').classList.toggle('on',showEdge);save();render();};
$('#thr').value=thr;
$('#thr').addEventListener('input',e=>{thr=+e.target.value;save();render();});
$('#search').addEventListener('input',e=>{q=e.target.value.trim().toLowerCase();layerFilter=null;render();});

$('#fmeta').textContent=`backend ${DATA.meta.backend} · ${DATA.meta.reduce.toUpperCase()} · 主観layout ${DATA.meta.subjLayout} · Procrustes差異 ${DATA.meta.procrustesDisparity} · ${DATA.meta.nodeCount}ノード · ${DATA.meta.generated}`;

// zoom/pan
let scale=1,tx=0,ty=0,drag=false,lx,ly;
const scene=$('#scene');
function applyT(){scene.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);}
svg.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.1:0.9;
  const r=svg.getBoundingClientRect();const mx=(e.clientX-r.left)/r.width*W,my=(e.clientY-r.top)/r.height*H;
  tx=mx-(mx-tx)*f;ty=my-(my-ty)*f;scale*=f;scale=Math.max(0.4,Math.min(5,scale));applyT();},{passive:false});
svg.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('pointermove',e=>{if(!drag)return;const r=svg.getBoundingClientRect();
  tx+=(e.clientX-lx)/r.width*W;ty+=(e.clientY-ly)/r.height*H;lx=e.clientX;ly=e.clientY;applyT();});
window.addEventListener('pointerup',()=>drag=false);

build();
</script>
</body>
</html>
