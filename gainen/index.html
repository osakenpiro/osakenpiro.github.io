", "種別": "原理", "分野": ["認知", "組織"], "名称": "マズローのハンマー"}, {"Source": "Clc", "創作フック": "コメディ・不運キャラの基調。希望側に反転すれば『うまくいきうるものは、信じれば』のHopepunk変奏。", "出典URL": "https://ja.wikipedia.org/wiki/マーフィーの法則", "英名": "Murphy's law", "概念(Float)": ["反転で効く"], "一行定義": "失敗する可能性のあるものは、いずれ必ず失敗する（うまくいかない時は最悪の形でいく）。", "種別": "法則", "分野": ["社会"], "名称": "マーフィーの法則"}, {"Source": "Clc", "創作フック": "「自分を描くには一歩外に出る必要がある」。MIHARASHI＝俯瞰層のメタ構造の裏付け。メタ認知テーマに。", "出典URL": "https://en.wikipedia.org/wiki/Self-reference", "英名": "Meta-level / self-reference limit", "概念(Float)": ["三重がけ種", "Boolean→Float種"], "一行定義": "あるシステムを外部から完全に記述するには、そのシステムより複雑なメタシステムが必要になる。", "種別": "原理", "分野": ["論理", "認知", "科学哲学"], "名称": "メタ視点の原理（自己記述の限界）"}, {"Source": "Clc", "創作フック": "入れ子＝抽象化で人間性が減衰。Color-Bleed MosaicやIMASICAの『二段階抽象化された存在』の理論的裏付け。", "出典URL": "https://karapaia.com/archives/605762.html", "英名": "Medusa effect", "概念(Float)": ["Boolean→Float種", "二項分解"], "一行定義": "写真の中の写真に写る人物は、抽象化の段数が増えるほど感情の薄い存在に見える（九大8実験で逆さ顔/マスク/AI顔でも消えず）。", "種別": "効果", "分野": ["認知", "心理"], "名称": "メデューサ効果"}, {"Source": "Clc", "創作フック": "「奇跡は統計的に必然」。誕生日のパラドックスとセット。「ありえない」を合理的に説明する装置。", "出典URL": "https://en.wikipedia.org/wiki/Littlewood's_law", "英名": "Littlewood's law", "概念(Float)": ["二項分解"], "一行定義": "世界人口が十分多ければ、どんなに奇跡的な偶然も誰かには必ず起こる（十億分の一の奇跡も日々起きる）。", "種別": "法則", "分野": ["統計", "認知"], "名称": "リトルウッドの法則（奇跡の法則）"}, {"Source": "種足し 2026-06-03", "創作フック": "腐葉土設計の数理。蓄積された文脈ほど栄養になり寿命が延びる、を裏打ち。", "出典URL": "", "英名": "Lindy Effect", "概念(Float)": ["腐葉土種"], "一行定義": "古典や技術など“生もの”でないものは、長く生き残るほど残り寿命の期待値も延びる。", "種別": "法則", "分野": ["統計", "社会"], "名称": "リンディ効果"}, {"Source": "種足し 2026-06-03", "創作フック": "三重がけ命名の視覚版——一つの形が複層の意味を同時に持つ。タイトル設計の比喩に。", "出典URL": "", "英名": "Rubin's Vase / Ambiguous Image", "概念(Float)": ["三重がけ種", "反転で効く"], "一行定義": "同じ輪郭が「壺」とも「向き合う二つの顔」とも見える、複数の解を同時に宿す図形。", "種別": "現象", "分野": ["認知", "心理"], "名称": "ルビンの壺（多義図形）"}, {"Source": "Clc", "創作フック": "「混ざったものは元に戻らない」不可逆の比喩。関係・言葉の取り返しのつかなさに。", "出典URL": "https://en.wikipedia.org/wiki/Irreversible_process", "英名": "Irreversibility", "概念(Float)": ["Boolean→Float種"], "一行定義": "抹茶を入れたコーヒーをかき混ぜると混ざるが、逆にかき混ぜて元に戻ることはない―不可逆性の日常例。", "種別": "現象", "分野": ["物理"], "名称": "不可逆性（コーヒーにミルクの例）"}, {"Source": "Clc", "創作フック": "「一方を知るほど他方がぼやける」トレードオフ。完全な認識の不可能性を語るテーマに。", "出典URL": "https://ja.wikipedia.org/wiki/不確定性原理", "英名": "Uncertainty principle", "概念(Float)": ["二項分解", "Boolean→Float種"], "一行定義": "位置と運動量のような対になる量は、両方を同時に任意の精度で知ることはできない。", "種別": "原理", "分野": ["物理"], "名称": "不確定性原理"}, {"Source": "種足し 2026-06-03", "創作フック": "Boolean→Floatが討つべき相手の名前。敵役の論法・煽動描写の設計に。", "出典URL": "", "英名": "False Dilemma", "概念(Float)": ["二項分解", "Boolean→Float種"], "一行定義": "本当は選択肢が複数あるのに「AかBか」の二択しかないと思い込ませる誤謬。", "種別": "バイアス", "分野": ["論理", "認知"], "名称": "偽の二分法（誤った二者択一）"}, {"Source": "Clc", "創作フック": "「全部がぼく」の思想根拠（各柱の総和以上のVisionium）。Boolean→Floatとも接続（連続値の創発）。", "出典URL": "https://ja.wikipedia.org/wiki/創発", "英名": "Emergence", "概念(Float)": ["Boolean→Float種", "腐葉土種"], "一行定義": "足し合わせた全体は、部分の単純な総和よりも大きい性質（創発）を持つ。", "種別": "原理", "分野": ["科学哲学", "認知", "組織"], "名称": "創発（エマージェンス）"}, {"Source": "Clc", "創作フック": "「あの時こうしていたら」の感情描写。IMASICAの分岐・可能世界テーマに直結。", "出典URL": "https://en.wikipedia.org/wiki/Counterfactual_thinking", "英名": "Counterfactual thinking", "概念(Float)": ["Boolean→Float種"], "一行定義": "「もし反転したら」という反事実仮想によって、後悔や安堵の感情が生まれる。", "種別": "理論", "分野": ["心理", "認知"], "名称": "反事実思考"}, {"Source": "種足し 2026-06-03", "創作フック": "Hopepunkの核（逆境が糧）。雨降って地固まるの数理版。キャラ成長弧の設計に。", "出典URL": "", "英名": "Antifragility", "概念(Float)": ["Hopepunk種", "反転で効く"], "一行定義": "衝撃や無秩序によって“壊れる”のでなく“より強くなる”性質。頑健性のさらに上。", "種別": "原理", "分野": ["統計", "社会", "組織"], "名称": "反脆弱性（アンチフラジャイル）"}, {"Source": "Clc", "創作フック": "AI・自己言及キャラの暗示に。「自分を参照すると壊れる」構造。SATORIの自己言及にも。", "出典URL": "https://ja.wikipedia.org/wiki/嘘つきのパラドックス", "英名": "Liar paradox", "概念(Float)": ["二項分解", "反転で効く"], "一行定義": "「この文は偽である」のように、真としても偽としても矛盾する自己言及文。", "種別": "逆説", "分野": ["論理", "科学哲学"], "名称": "嘘つきのパラドックス"}, {"Source": "Clc", "創作フック": "「個々はランダム、全体は規則的」。人類の統計可視化テーマに。個人と集団の見え方の差。", "出典URL": "https://ja.wikipedia.org/wiki/大数の法則", "英名": "Law of large numbers", "概念(Float)": ["二項分解", "Boolean→Float種"], "一行定義": "見た目はランダムなのに、大量に集めると正規分布などの規則性が現れる（大数の法則・中心極限定理）。", "種別": "法則", "分野": ["統計"], "名称": "大数の法則"}, {"Source": "Clc", "創作フック": "推理もの・ミステリの収束描写。読者に「伏線はあった」と思わせる技法としても。", "出典URL": "https://ja.wikipedia.org/wiki/後見バイアス", "英名": "Hindsight bias", "概念(Float)": ["二項分解"], "一行定義": "起こった出来事を、事後に「最初から予測可能だった」と思い込むバイアス。", "種別": "バイアス", "分野": ["認知", "心理"], "名称": "後見バイアス"}, {"Source": "Clc", "創作フック": "「予想外だが納得できる」脱都の原則。オチ・ドンデン返しの黄金比。", "出典URL": "https://en.wikipedia.org/wiki/Surprise_(emotion)", "英名": "Surprising yet inevitable", "概念(Float)": ["反転で効く", "Boolean→Float種"], "一行定義": "面白いアイデアは「それらしさ」と「意外性」の両立で生まれる（ストーリー計画の原則）。", "種別": "原理", "分野": ["認知", "社会"], "名称": "意外性×必然性の原則（surprise yet inevitable）"}, {"Source": "Clc", "創作フック": "キャラの動機設計。「失う恐ろしさ」が行動を駆動する。賭け・天秤勝負の緊張感に。", "出典URL": "https://ja.wikipedia.org/wiki/損失回避", "英名": "Loss aversion", "概念(Float)": ["二項分解", "Boolean→Float種"], "一行定義": "人は利益を得る喜びより、同額の損失を避けたい痛みのほうを大きく感じる。", "種別": "理論", "分野": ["心理", "経済"], "名称": "損失回避（プロスペクト理論）"}, {"Source": "Clc", "創作フック": "思い込みキャラの視野狭窄。読者には見えている事実を主人公だけが見逃すサスペンスに。", "出典URL": "https://ja.wikipedia.org/wiki/確証バイアス", "英名": "Confirmation bias", "概念(Float)": ["二項分解"], "一行定義": "自分の信念に合う情報ばかりを集め、反する情報を無視する傾向。", "種別": "バイアス", "分野": ["認知", "心理"], "名称": "確証バイアス"}, {"Source": "Clc", "創作フック": "構成設計の根拠。章・シーンの冲頭と末尾に最も残したい一文を置く。", "出典URL": "https://ja.wikipedia.org/wiki/系列位置効果", "英名": "Serial position effect", "概念(Float)": ["二項分解"], "一行定義": "件名や見出しのうち、最初と最後に接した項目が記憶に残りやすい（初頭効果＋新近効果）。", "種別": "効果", "分野": ["認知", "心理"], "名称": "系列位置効果"}, {"Source": "Clc", "創作フック": "「見ることが対象を変える」テーマ。メデューサ効果と対。記録・観測が現実を変質させるSF設定に。", "出典URL": "https://ja.wikipedia.org/wiki/観測者効果_(物理学)", "英名": "Observer effect", "概念(Float)": ["Boolean→Float種", "反転で効く"], "一行定義": "ある系の状態を測定する行為そのものが、その系の状態を変えてしまう（量子力学の観測問題、転じて一般に）。", "種別": "効果", "分野": ["物理", "認知"], "名称": "観測者効果"}, {"Source": "Clc", "創作フック": "メデューサ効果の親理論。時間/空間/社会的距離で『人間性の解像度』が変わる＝Boolean→Floatの心理学的基盤。", "出典URL": "https://ja.wikipedia.org/wiki/解釈レベル理論", "英名": "Construal level theory", "概念(Float)": ["Boolean→Float種"], "一行定義": "対象との心理的距離が遠いほど、人はそれをより抽象的にとらえる（近い=具体、遠い=抽象）。", "種別": "理論", "分野": ["心理", "認知"], "名称": "解釈レベル理論"}, {"Source": "Clc", "創作フック": "「ありえない偶然」が実は必然だった、という物語の仕掛け。直感と現実のギャップ描写。", "出典URL": "https://ja.wikipedia.org/wiki/誕生日のパラドックス", "英名": "Birthday paradox", "概念(Float)": ["二項分解"], "一行定義": "23人いれば「同じ誕生日のペア」が存在する確率が50%を超える、直感に反する確率現象。", "種別": "逆説", "分野": ["統計", "認知"], "名称": "誕生日のパラドックス"}, {"Source": "Clc", "創作フック": "物語の誤解エンジン。情報の穴を人物が「最悪の想像」で埋めてすれ違う。", "出典URL": "https://en.wikipedia.org/wiki/Hanlon's_razor", "英名": "Narrative gap-filling (negativity bias)", "概念(Float)": ["反転で効く"], "一行定義": "何かを説明するとき、人は足りない部分を闇スキル・険悪な動機で埋めてしまう傾向。", "種別": "現象", "分野": ["認知", "社会"], "名称": "説明ギャップを悪意で埋める傾向"}, {"Source": "Clc", "創作フック": "Boolean→Floatと逆方向（選択肢を絞る設計論）。UI設計・ツール設計の自戒に。", "出典URL": "https://ja.wikipedia.org/wiki/決定回避", "英名": "Paradox of choice", "概念(Float)": ["Boolean→Float種"], "一行定義": "人は選択肢が多すぎると選べなくなり、満足度も下がる。", "種別": "逆説", "分野": ["心理", "経済"], "名称": "選択のパラドックス（決定回避）"}, {"Source": "Clc", "創作フック": "出会い・運命の演出に。『知った瞬間から世界が変わる』感覚の正体を逆手に取る。", "出典URL": "https://ja.wikipedia.org/wiki/バーダー・マインホフ現象", "英名": "Frequency illusion (Baader–Meinhof phenomenon)", "概念(Float)": ["Boolean→Float種"], "一行定義": "一度知ったものを、その後やたら頻繁に見聞きする気がする認知の錯覚。", "種別": "現象", "分野": ["認知"], "名称": "頻度錯覚（バーダー・マインホフ現象）"}];
const state = {q:"", sel:{}};
CONFIG.axes.forEach(a=>state.sel[a[0]]=new Set());
const $=s=>document.querySelector(s);
function axisValues(key){const s=new Set();DATA.forEach(d=>{const v=d[key];if(Array.isArray(v))v.forEach(x=>s.add(x));else if(v)s.add(v);});return [...s].sort();}
function buildAxes(){const host=$("#axes");CONFIG.axes.forEach(([key])=>{const div=document.createElement("div");div.className="axis";div.innerHTML='<span class="lbl">'+key+'</span>';axisValues(key).forEach(v=>{const c=document.createElement("span");c.className="chip";c.textContent=v;c.onclick=()=>{state.sel[key].has(v)?state.sel[key].delete(v):state.sel[key].add(v);c.classList.toggle("on");render();};div.appendChild(c);});host.appendChild(div);});}
function match(d){const q=state.q.trim().toLowerCase();if(q){const blob=Object.values(d).flat().join(" ").toLowerCase();if(!blob.includes(q))return false;}
for(const [key] of CONFIG.axes){const sel=state.sel[key];if(sel.size){const v=d[key];const arr=Array.isArray(v)?v:[v];if(!arr.some(x=>sel.has(x)))return false;}}return true;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function copyText(d){if(CONFIG.mode==="hyogen")return d[CONFIG.quote]+"\n— "+(d[CONFIG.src]||"")+"（"+d[CONFIG.head]+"）";return d[CONFIG.head]+(d[CONFIG.sub]?"（"+d[CONFIG.sub]+"）":"")+" — "+d[CONFIG.main];}
function card(d,i){const tags=[];CONFIG.axes.forEach(([key])=>{const v=d[key];(Array.isArray(v)?v:v?[v]:[]).forEach(x=>tags.push(x));});
let h='<div class="card" data-i="'+i+'"><button class="copy" title="コピー">写</button>';
h+='<div class="hd">'+esc(d[CONFIG.head])+(d[CONFIG.sub]?'<small>'+esc(Array.isArray(d[CONFIG.sub])?d[CONFIG.sub].join("・"):d[CONFIG.sub])+'</small>':'')+'</div>';
if(CONFIG.quote&&d[CONFIG.quote])h+='<blockquote>'+esc(d[CONFIG.quote])+'</blockquote>';
if(d[CONFIG.main])h+='<p class="main">'+esc(d[CONFIG.main])+'</p>';
if(d[CONFIG.hook])h+='<p class="hook">💡 '+esc(d[CONFIG.hook])+'</p>';
let src='';if(CONFIG.src&&d[CONFIG.src])src+=esc(d[CONFIG.src]);
if(d[CONFIG.srcUrl])src+=(src?' ':'')+'<a href="'+esc(d[CONFIG.srcUrl])+'" target="_blank" rel="noopener">↗出典</a>';
if(src)h+='<div class="src">'+src+'</div>';
h+='<div class="tags">'+tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div></div>';return h;}
let view=[];
function render(){view=DATA.filter(match);$("#list").innerHTML=view.map((d,i)=>card(d,i)).join("");$("#count").textContent=view.length+" / "+DATA.length+" 件";
document.querySelectorAll(".copy").forEach(b=>b.onclick=e=>{const i=+e.target.closest(".card").dataset.i;navigator.clipboard.writeText(copyText(view[i]));e.target.textContent="✓";setTimeout(()=>e.target.textContent="写",900);});}
$("#q").addEventListener("input",e=>{state.q=e.target.value;render();});
$("#rand").onclick=()=>{if(!view.length)return;const i=Math.floor(Math.random()*view.length);const el=document.querySelectorAll(".card")[i];el.scrollIntoView({behavior:"smooth",block:"center"});el.classList.add("flash");setTimeout(()=>el.classList.remove("flash"),1600);};
$("#clear").onclick=()=>{state.q="";$("#q").value="";Object.values(state.sel).forEach(s=>s.clear());document.querySelectorAll(".chip.on").forEach(c=>c.classList.remove("on"));render();};
$("#meta").textContent=DATA.length+"件 ／ 最終同期 "+CONFIG.synced;
buildAxes();render();
</script>
</body>
</html>
