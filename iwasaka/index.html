<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>磐境村 — 深度フィールド v1（真層）</title>
<meta property="og:title" content="磐境村 — painterly 2.5D field"><meta property="og:description" content="灯籠ひとつの光。深度4層パララックスの磐境村。#全人類UX改善計画"><meta property="og:type" content="website"><meta property="og:url" content="https://osakenpiro.github.io/iwasaka/">
<style>
 html,body{margin:0;height:100%;background:#05070c;overflow:hidden;font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;user-select:none}
 #stage{position:fixed;inset:0;overflow:hidden;cursor:crosshair}
 .layer{position:absolute;background-position:center;background-repeat:no-repeat;background-size:cover;will-change:transform}
 #sky{inset:-4%;background-image:url("assets/sky.png");z-index:0}
 #far{inset:-6%;background-image:url("assets/far.png");z-index:1}
 #mid{inset:-9%;background-image:url("assets/mid.png");z-index:2}
 #fg {inset:-16%;background-image:url("assets/fg.png");z-index:4}
 #glow{position:absolute;left:47%;top:57.5%;width:42vmin;height:42vmin;z-index:3;pointer-events:none;mix-blend-mode:screen;filter:blur(2px);
   background:radial-gradient(circle,rgba(255,205,128,.92) 0%,rgba(255,172,92,.46) 26%,rgba(255,150,70,.13) 52%,transparent 72%)}
 #dot{position:absolute;left:50%;bottom:11%;height:17%;z-index:5;transform:translateX(-50%);will-change:transform;filter:drop-shadow(0 7px 7px rgba(0,0,0,.6));transition:opacity .4s}
 #fx{position:absolute;inset:0;z-index:5;pointer-events:none}
 #grade{position:absolute;inset:0;z-index:6;pointer-events:none;background:radial-gradient(ellipse at 52% 56%,transparent 40%,rgba(0,0,0,.6) 100%)}
 #dlg{position:absolute;inset:0;z-index:8;opacity:0;pointer-events:none;transition:opacity .45s}
 #tachie{position:absolute;right:2%;bottom:-2%;height:96%;transform:translateX(8%);opacity:0;transition:transform .5s,opacity .5s;filter:drop-shadow(0 12px 24px rgba(0,0,0,.6))}
 #win{position:absolute;left:50%;bottom:5%;width:min(880px,86%);transform:translateX(-50%) translateY(14px);background:linear-gradient(180deg,rgba(11,14,20,.86),rgba(11,14,20,.95));border:1px solid #d4a85355;border-radius:14px;padding:18px 26px 16px;box-shadow:0 18px 50px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.03)}
 #nm{display:inline-block;color:#0b0e13;background:#d4a853;font-weight:700;font-size:14px;letter-spacing:.08em;padding:3px 14px;border-radius:7px;margin-bottom:10px}
 #tx{color:#eef2f7;font-size:18px;line-height:1.85;min-height:3.2em;text-shadow:0 1px 4px #000}
 #hint{color:#d4a853;font-size:12px;text-align:right;margin-top:8px;opacity:.7}
 body.talk .layer{filter:brightness(.5) saturate(.82)} body.talk #dot{opacity:0}
 body.talk #dlg{opacity:1;pointer-events:auto} body.talk #tachie{transform:translateX(0);opacity:1}
 body.talk #win{transform:translateX(-50%) translateY(0);opacity:1}
 #modebtn{position:absolute;top:16px;right:18px;z-index:9;background:rgba(12,16,24,.7);color:#ffd8a8;border:1px solid #d4a85366;border-radius:9px;padding:8px 14px;font-size:13px;cursor:pointer}
 #modebtn:hover{background:rgba(212,168,83,.22)}
 #lab{position:absolute;left:18px;top:16px;z-index:9;color:#cdd6e3;font-size:12px;text-shadow:0 1px 4px #000;opacity:.85}
 #lab b{color:#ffc89a}
 #ctrl{position:absolute;left:50%;bottom:14px;z-index:9;transform:translateX(-50%);color:#cdd6e3;font-size:12px;opacity:.6;text-shadow:0 1px 4px #000}
 body.talk #ctrl,body.talk #lab{opacity:.25}
</style></head><body>
<div id="stage">
 <div class="layer" id="sky"></div>
 <div class="layer" id="far"></div>
 <div class="layer" id="mid"></div>
 <div id="glow"></div>
 <div class="layer" id="fg"></div>
 <canvas id="fx"></canvas>
 <img id="dot" src="assets/dot.png">
 <div id="grade"></div>
 <div id="dlg"><img id="tachie" src="assets/tachie.png">
   <div id="win"><span id="nm">ナナシ</span><div id="tx"></div><div id="hint">▼ Space / クリックでフィールドへ</div></div></div>
 <button id="modebtn">会話モードへ ▶</button>
 <div id="lab">いま：<b id="modename">フィールド（ドット）</b> — 深度4層パララックス（層ネイティブ生成）｜灯籠＝力の燠火</div>
 <div id="ctrl">← → 歩く ・ Space 会話 ・ マウスで見回す</div>
</div>
<script>
function q(id){return document.getElementById(id);}
const L={sky:q('sky'),far:q('far'),mid:q('mid'),fg:q('fg')};
const gl=q('glow'),dot=q('dot'),btn=q('modebtn'),mn=q('modename'),tx=q('tx');
let camX=0,camY=0,mx=0,my=0,walk=0,dir=0,idle=0,auto=0,talk=false,ti=null,facing=1,phase=0;
const RANGE=440,SPEED=3.4,keys={};
addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5)*2;my=(e.clientY/innerHeight-.5)*2;idle=0;});
addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();setMode(!talk);return;} keys[e.code]=true;idle=0; });
addEventListener('keyup',e=>{keys[e.code]=false;});
const LINE="この灯りだけが、力だったころの名残。……少年に戻っても、まだ消えない。";
function setMode(t){talk=t;document.body.classList.toggle('talk',t);
 btn.textContent=t?"◀ フィールドへ戻る":"会話モードへ ▶";
 mn.textContent=t?"会話（立ち絵 + ウィンドウ）":"フィールド（ドット）";
 if(t){tx.textContent="";let i=0;clearInterval(ti);ti=setInterval(()=>{tx.textContent=LINE.slice(0,++i);if(i>=LINE.length)clearInterval(ti);},42);}}
btn.onclick=()=>setMode(!talk);
q('win').onclick=()=>setMode(false);
if(location.hash==='#talk')setMode(true);
const cv=q('fx'),g=cv.getContext('2d');
function rz(){cv.width=innerWidth;cv.height=innerHeight;}rz();addEventListener('resize',rz);
const N=48,P=[];for(let i=0;i<N;i++)P.push({x:Math.random(),y:Math.random(),s:.4+Math.random()*1.6,vx:(Math.random()-.5)*.0006,vy:-.0004-Math.random()*.0009,ph:Math.random()*6.28,fog:Math.random()<.32});
function frame(t){idle++;auto+=0.0015;
 dir=0; if(!talk){ if(keys['ArrowLeft']||keys['KeyA'])dir=-1; if(keys['ArrowRight']||keys['KeyD'])dir=1; }
 walk=Math.max(-RANGE,Math.min(RANGE,walk+dir*SPEED));
 const useM=idle<120&&!talk;
 const tX=walk+(useM?mx*40:Math.sin(auto)*34);
 const tY=(useM?my*22:Math.cos(auto*.8)*13);
 camX+=(tX-camX)*0.06; camY+=(tY-camY)*0.06;
 L.sky.style.transform=`translate(${-camX*0.06}px,${-camY*0.05}px) scale(1.06)`;
 L.far.style.transform=`translate(${-camX*0.18}px,${-camY*0.12}px) scale(1.10)`;
 L.mid.style.transform=`translate(${-camX*0.45}px,${-camY*0.24}px) scale(1.17)`;
 L.fg.style.transform =`translate(${-camX*1.00}px,${-camY*0.34}px) scale(1.30)`;
 gl.style.transform=`translate(calc(-50% + ${-camX*0.45}px),calc(-50% + ${-camY*0.24}px))`;
 const fl=.74+0.18*(Math.sin(t*0.012)*.6+Math.sin(t*0.031+1.3)*.4);
 gl.style.opacity=(talk?fl*.45:fl);
 if(dir!==0){facing=dir;phase+=0.25;}else{phase*=0.92;}
 const bob=Math.sin(phase)*(dir!==0?5:0);
 dot.style.transform=`translateX(-50%) translate(0px,${bob}px) scaleX(${facing})`;
 g.clearRect(0,0,cv.width,cv.height);
 for(const p of P){p.x+=p.vx;p.y+=p.vy;if(p.y<-.05){p.y=1.05;p.x=Math.random();}
  const k=p.fog?0.16:0.42;
  const X=p.x*cv.width-camX*k*1.2,Y=p.y*cv.height-camY*k;
  if(p.fog){g.fillStyle='rgba(150,170,190,.035)';g.beginPath();g.arc(X,Y,40*p.s,0,6.28);g.fill();}
  else{const a=Math.max(0,.35+.45*Math.sin(t*0.004+p.ph))*(talk?.4:1);
   g.fillStyle=`rgba(255,210,130,${a*.85})`;g.beginPath();g.arc(X,Y,p.s,0,6.28);g.fill();
   g.fillStyle=`rgba(255,188,108,${a*.18})`;g.beginPath();g.arc(X,Y,p.s*3.2,0,6.28);g.fill();}}
 requestAnimationFrame(frame);}requestAnimationFrame(frame);
</script></body></html>
